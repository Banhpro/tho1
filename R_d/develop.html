<!DOCTYPE html>
<html lang="vi">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Hệ Thống Chỉ Huy Bành - Version Final</title>
     <!-- Font chữ Bo tròn, Đáng yêu và Dễ đọc -->
     <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap"
          rel="stylesheet">
     <style>
          :root {
               /* Bảng màu Ngôi Nhà Rừng Nhiệt Đới Cute */
               --wood-light: #E6CCB2;
               --wood-main: #D4A373;
               --wood-dark: #A98467;
               --wood-shadow: #8A5A44;

               --leaf-light: #D9ED92;
               --leaf-main: #99D98C;
               --leaf-dark: #34A0A4;

               --bg-cream: #FEFAE0;
               --text-brown: #5E503F;

               --accent-peach: #F4A261;
               --accent-coral: #E76F51;
          }

          * {
               box-sizing: border-box;
               transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
          }

          /* Thanh cuộn cute */
          ::-webkit-scrollbar {
               width: 12px;
          }

          ::-webkit-scrollbar-track {
               background: var(--bg-cream);
               border-radius: 10px;
          }

          ::-webkit-scrollbar-thumb {
               background: var(--wood-main);
               border-radius: 10px;
               border: 3px solid var(--bg-cream);
          }

          body {
               margin: 0;
               padding: 0;
               background-color: #B5E2FA;
               /* Bầu trời trong xanh */
               color: var(--text-brown);
               font-family: 'Nunito', sans-serif;
               overflow: hidden;
               /* Nền rừng mưa hoạt hình đáng yêu */
               background-image:
                    url('https://images.unsplash.com/photo-1596138663737-2936a28d6268?q=80&w=2070&auto=format&fit=crop');
               background-size: cover;
               background-position: bottom;
               background-attachment: fixed;
          }

          /* Lớp mờ nhẹ để dễ nhìn UI */
          body::before {
               content: "";
               position: fixed;
               top: 0;
               left: 0;
               width: 100%;
               height: 100%;
               background: rgba(255, 255, 255, 0.4);
               backdrop-filter: blur(5px);
               z-index: -1;
          }

          #cockpit-layout {
               padding: 20px;
               display: flex;
               flex-direction: column;
               gap: 25px;
               max-width: 1300px;
               margin: 20px auto;
               background: rgba(254, 250, 224, 0.85);
               border: 6px solid var(--wood-main);
               border-radius: 40px;
               box-shadow: 0 15px 0 var(--wood-shadow), 0 25px 30px rgba(0, 0, 0, 0.2);
               position: relative;
          }

          /* Decor Rừng Dễ Thương */
          #cockpit-layout::before {
               content: "🐒🌴";
               position: absolute;
               top: -35px;
               left: 20px;
               font-size: 50px;
               z-index: 10;
               filter: drop-shadow(0 5px 5px rgba(0, 0, 0, 0.2));
          }

          #cockpit-layout::after {
               content: "🛖✨";
               position: absolute;
               bottom: -20px;
               right: -10px;
               font-size: 70px;
               z-index: 10;
               transform: rotate(-10deg);
          }

          /* --- BẢNG HIỆU GỖ CỬA NHÀ --- */
          .hud-header {
               display: flex;
               justify-content: space-between;
               align-items: center;
               padding: 15px 30px;
               background: var(--wood-light);
               border: 4px dashed var(--wood-dark);
               border-radius: 25px;
               box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.05), 0 6px 0 var(--wood-main);
               position: relative;
          }

          /* Dây treo bảng hiệu */
          .hud-header::before,
          .hud-header::after {
               content: "";
               position: absolute;
               top: -25px;
               width: 6px;
               height: 25px;
               background: var(--text-brown);
               border-radius: 5px;
          }

          .hud-header::before {
               left: 40px;
          }

          .hud-header::after {
               right: 40px;
          }

          .system-title {
               font-family: 'Fredoka', sans-serif;
               font-size: 24px;
               font-weight: 700;
               color: var(--text-brown);
               text-transform: uppercase;
               display: flex;
               align-items: center;
               gap: 10px;
          }

          .system-title::before {
               content: "🌺";
               font-size: 28px;
          }

          .system-title::after {
               content: "🍃";
               font-size: 28px;
          }

          /* --- KHUNG BẢN VẼ NHÀ (VIEWPORT) --- */
          .viewport-panel {
               background: #fff;
               border: 5px solid var(--wood-main);
               border-radius: 25px;
               position: relative;
               overflow: hidden;
               box-shadow: 0 8px 0 var(--wood-shadow);
          }

          .viewport-header {
               background: var(--leaf-light);
               padding: 12px 25px;
               display: flex;
               justify-content: space-between;
               align-items: center;
               border-bottom: 4px solid var(--leaf-main);
          }

          .viewport-header label {
               margin: 0;
               font-family: 'Fredoka';
               font-size: 18px;
               color: var(--leaf-dark);
               display: flex;
               align-items: center;
               gap: 8px;
          }

          .viewport-header label::before {
               content: "📐";
          }

          #previewFrame {
               width: 100%;
               border: none;
               height: 380px;
               display: block;
               background: url('https://www.transparenttextures.com/patterns/blueprint.png'), #E8F1F2;
               /* Giao diện bản thiết kế cute */
               opacity: 1;
          }

          /* Hiệu ứng Matrix -> Hiệu ứng Xây dựng Rừng Cây */
          #hackerOverlay {
               position: absolute;
               top: 60px;
               left: 0;
               width: 100%;
               height: calc(100% - 60px);
               background: rgba(254, 250, 224, 0.9);
               display: none;
               flex-direction: column;
               padding: 20px;
               font-family: 'Fredoka', sans-serif;
               font-size: 24px;
               font-weight: bold;
               color: var(--leaf-main);
               z-index: 100;
               overflow: hidden;
               text-align: center;
          }

          /* --- GÓC CHUẨN BỊ VẬT LIỆU --- */
          .control-grid {
               display: grid;
               grid-template-columns: 1fr 1.5fr;
               gap: 25px;
          }

          .glass-card {
               background: #fff;
               border: 4px solid var(--leaf-light);
               border-radius: 25px;
               padding: 25px;
               position: relative;
               box-shadow: 0 8px 0 var(--leaf-main);
          }

          .glass-card::before {
               content: "📌";
               position: absolute;
               top: -15px;
               left: 20px;
               font-size: 30px;
          }

          label {
               display: block;
               font-family: 'Fredoka', sans-serif;
               font-size: 16px;
               font-weight: 700;
               color: var(--leaf-dark);
               margin-bottom: 10px;
          }

          select,
          textarea {
               width: 100%;
               background: var(--bg-cream);
               border: 3px solid var(--wood-light);
               border-radius: 15px;
               color: var(--text-brown);
               padding: 15px;
               font-family: 'Nunito', sans-serif;
               font-size: 15px;
               font-weight: 600;
               outline: none;
               resize: vertical;
          }

          select:focus,
          textarea:focus {
               border-color: var(--accent-peach);
               box-shadow: 0 0 0 4px rgba(244, 162, 97, 0.2);
          }

          /* Sổ tay Code */
          #codeEditor {
               height: 300px;
               font-family: 'Fira Code', monospace;
               font-size: 14px;
               background: #2A3B47;
               color: #99D98C;
               border-color: #2A3B47;
               border-radius: 15px;
          }

          /* --- NÚT BẤM (PHONG CÁCH GAME) --- */
          .btn {
               background: var(--leaf-main);
               border: none;
               border-radius: 15px;
               color: #fff;
               padding: 15px 25px;
               font-family: 'Fredoka', sans-serif;
               font-weight: 700;
               font-size: 16px;
               cursor: pointer;
               position: relative;
               box-shadow: 0 6px 0 var(--leaf-dark);
               text-transform: uppercase;
          }

          .btn:active {
               transform: translateY(6px);
               box-shadow: 0 0px 0 var(--leaf-dark);
          }

          .btn-refresh {
               padding: 8px 15px;
               font-size: 14px;
               background: var(--accent-peach);
               box-shadow: 0 5px 0 var(--accent-coral);
               border-radius: 12px;
          }

          .btn-refresh:active {
               transform: translateY(5px);
               box-shadow: 0 0px 0 var(--accent-coral);
          }

          .btn-submit {
               width: 100%;
               font-size: 20px;
               padding: 20px;
               background: var(--accent-coral);
               box-shadow: 0 8px 0 #D04F36;
               margin-top: 10px;
               margin-bottom: 20px;
               border-radius: 20px;
          }

          .btn-submit:active {
               transform: translateY(8px);
               box-shadow: 0 0px 0 #D04F36;
          }

          /* --- AVATAR CHỦ NHÀ --- */
          .avatar {
               width: 55px;
               height: 55px;
               background: var(--accent-peach);
               border: 4px solid #fff;
               border-radius: 50%;
               display: flex;
               align-items: center;
               justify-content: center;
               font-family: 'Fredoka';
               font-weight: bold;
               font-size: 24px;
               color: #fff;
               box-shadow: 0 4px 0 var(--accent-coral);
               position: relative;
               animation: bounce 2s infinite ease-in-out;
          }

          .avatar::after {
               content: "🦜";
               position: absolute;
               top: -10px;
               right: -15px;
               font-size: 20px;
          }

          @keyframes bounce {

               0%,
               100% {
                    transform: translateY(0);
               }

               50% {
                    transform: translateY(-5px);
               }
          }

          /* --- HIỆU ỨNG RƠI CHỮ LÚC BUILD --- */
          @keyframes leaf-fall {
               from {
                    transform: translateY(-10%);
               }

               to {
                    transform: translateY(100%);
               }
          }

          .hacker-text {
               animation: leaf-fall 5s linear infinite;
               line-height: 2;
               letter-spacing: 5px;
          }

          @media (max-width: 1000px) {
               .control-grid {
                    grid-template-columns: 1fr;
               }

               #cockpit-layout {
                    border-width: 4px;
                    box-shadow: 0 10px 0 var(--wood-shadow);
               }
          }
     </style>
</head>

<body>
     <div id="cockpit-layout">
          <!-- TOP NAVIGATION -->
          <header class="hud-header">
               <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="avatar" id="uInit">B</div>
                    <div>
                         <div
                              style="font-size: 12px; font-weight: 800; color: var(--wood-dark); text-transform: uppercase;">
                              THỢ XÂY CHÍNH:</div>
                         <div id="uName"
                              style="font-family: 'Fredoka'; font-weight: 700; font-size: 18px; color: var(--text-brown);">
                              BANH_BUILDER</div>
                    </div>
               </div>

               <div class="system-title">XÂY DỰNG NHÀ RỪNG</div>

               <div style="text-align: right; font-family: 'Nunito'; font-weight: 800;">
                    <div style="color: var(--leaf-dark); font-size: 12px; text-transform: uppercase;">MÙA MÀNG: TỐT TƯƠI
                         ☀️</div>
                    <div id="liveClock" style="font-size: 18px; font-family: 'Fredoka'; color: var(--accent-coral);">
                         00:00:00</div>
               </div>
          </header>

          <!-- VIEWPORT -->
          <div class="viewport-panel">
               <div class="viewport-header">
                    <label>BẢN THIẾT KẾ</label>
                    <button class="btn btn-refresh" id="refreshBtn">🔄 XEM LẠI BẢN VẼ</button>
               </div>
               <div id="hackerOverlay">
                    <div style="margin-bottom: 20px; font-size: 30px;">🏗️ CÁC BÉ KHỈ ĐANG XÂY DỰNG... 🌿</div>
                    <div class="hacker-text" id="hackerContent"></div>
               </div>
               <iframe id="previewFrame" scrolling="no"></iframe>
          </div>

          <!-- CONTROLS -->
          <div class="control-grid">
               <div class="glass-card">
                    <label>🪵 GÓC THI CÔNG NGÔI NHÀ</label>
                    <select id="contribType">
                         <option value="ui_ux">Trang trí Nội thất (UI/UX)</option>
                         <option value="feature">Tiện ích Sinh hoạt (Tính năng)</option>
                         <option value="database">Cấu trúc Móng nhà (Database)</option>
                         <option value="logic">Hệ thống Điện Nước (Logic)</option>
                         <option value="security">Hàng Rào Bảo Vệ (Security)</option>
                    </select>

                    <label style="margin-top: 25px;">💡 Ý TƯỞNG CỦA BẠN</label>
                    <textarea id="aiPrompt" placeholder="Vẽ ra ngôi nhà trong mơ của bạn nhé... 🌸"></textarea>
                    <button class="btn" id="aiGenBtn" style="width: 100%; margin-top: 20px;">🪄 NHỜ KHỈ CON XÂY
                         GIÚP</button>
               </div>

               <div class="glass-card">
                    <label>📝 SỔ TAY NGUYÊN VẬT LIỆU (MÃ NGUỒN)</label>
                    <textarea id="codeEditor" spellcheck="false"
                         placeholder="Ghi chép công thức gỗ, lá, gạch... 🪵🌿"></textarea>
               </div>
          </div>

          <button class="btn btn-submit" id="submitBtn">⚒️ HOÀN THÀNH & KHAI TRƯƠNG NHÀ MỚI!</button>
     </div>

     <!-- SFX -->
     <audio id="sndHover" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" volume="0.2"></audio>
     <audio id="bgMusic" src="audio.mp3" loop></audio>
     <audio id="sndClick" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
     <audio id="sndBuild" src="https://assets.mixkit.co/active_storage/sfx/2559/2559-preview.mp3"></audio>
     <audio id="sndSuccess" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

     <script type="module">
          import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
          import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
          import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

          const firebaseConfig = {
               apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
               authDomain: "banhkietgithunbpoem.firebaseapp.com",
               projectId: "banhkietgithunbpoem",
               storageBucket: "banhkietgithunbpoem.firebasestorage.app",
               messagingSenderId: "429631951698",
               appId: "1:429631951698:web:8c5f6854de3ad22113a08b"
          };
          const app = initializeApp(firebaseConfig);
          const db = getFirestore(app);
          const auth = getAuth(app);
          const MY_KEY = "AIzaSyBCeEnzavbMr4mbyZXh4xwg2GCaGONXE4k";

          // --- HỆ THỐNG ÂM THANH ---
          const playSfx = (id) => {
               const sound = document.getElementById(id);
               sound.currentTime = 0; sound.play().catch(e => { });
          };

          document.querySelectorAll('.btn, select, textarea').forEach(el => {
               el.addEventListener('mouseenter', () => playSfx('sndHover'));
          });

          // --- ĐỒNG HỒ ---
          setInterval(() => {
               document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
          }, 1000);

          // --- HIỆU ỨNG XÂY DỰNG NHÀ ---
          const hackerOverlay = document.getElementById('hackerOverlay');
          const hackerContent = document.getElementById('hackerContent');

          function startHackerEffect() {
               hackerOverlay.style.display = 'flex';
               let codeLines = "";
               // Thay đổi ma trận số thành các Emoji đáng yêu xây rừng
               const chars = "🍃🌸🌿🌴🌻🌺🪵✨🍄🪵🥥";
               for (let i = 0; i < 30; i++) {
                    let line = "";
                    for (let j = 0; j < 15; j++) line += chars.charAt(Math.floor(Math.random() * chars.length)) + " ";
                    codeLines += `<div>${line}</div>`;
               }
               hackerContent.innerHTML = codeLines + codeLines;
          }

          // --- XỬ LÝ CHÍNH ---
          const promptArea = document.getElementById('aiPrompt');
          const codeEditor = document.getElementById('codeEditor');
          const previewFrame = document.getElementById('previewFrame');

          let resizeTimeout;
          function sendHeight() {
               clearTimeout(resizeTimeout);
               resizeTimeout = setTimeout(() => {
                    const h = document.getElementById('cockpit-layout').scrollHeight;
                    window.parent.postMessage(h, "*");
               }, 100); // delay 100ms cho mượt
          }


          // AI GENERATE
          document.getElementById('aiGenBtn').onclick = async () => {
               playSfx('sndClick');
               const prompt = promptArea.value;
               if (!prompt) return;

               playSfx('sndBuild');
               startHackerEffect();

               try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${MY_KEY}`, {
                         method: "POST",
                         headers: { "Content-Type": "application/json" },
                         body: JSON.stringify({
                              contents: [{ parts: [{ text: `Tạo code HTML/CSS/JS duy nhất (Tiếng Việt) cho: "${prompt}". Trả về code thô.` }] }]
                         })
                    });
                    const data = await response.json();
                    let code = data.candidates[0].content.parts[0].text;
                    code = code.replace(/```html|```javascript|```css|```/g, "").trim();

                    codeEditor.value = code;
                    previewFrame.srcdoc = code;
                    previewFrame.onload = () => {
                         requestAnimationFrame(() => {
                              const innerH = previewFrame.contentWindow.document.body.scrollHeight;
                              previewFrame.style.height = Math.max(innerH, 380) + 'px';
                              hackerOverlay.style.display = 'none';
                              playSfx('sndSuccess');
                              sendHeight();
                         });
                    };

               } catch (e) {
                    hackerOverlay.style.display = 'none';
                    alert("Ối! Đường truyền bị khỉ cắt đứt rồi!");
               }
          };

          // REFRESH SCAN
          document.getElementById('refreshBtn').onclick = () => {
               playSfx('sndClick');
               previewFrame.srcdoc = codeEditor.value;
               previewFrame.onload = () => {
                    const innerH = previewFrame.contentWindow.document.body.scrollHeight;
                    previewFrame.style.height = Math.max(innerH, 380) + 'px';
                    sendHeight();
               };
          };

          // SUBMIT
          document.getElementById('submitBtn').onclick = async () => {
               playSfx('sndClick');

               if (!codeEditor.value) return;

               const type = document.getElementById('contribType').value;
               const idea = promptArea.value;

               if (!confirm(`BẠN CÓ CHẮC CHẮN MUỐN CHỐT BẢN THIẾT KẾ MỤC [${type.toUpperCase()}] KHÔNG? 🌸`)) return;

               try {
                    // --- LẤY USER ---
                    const user = auth.currentUser;
                    const username = user
                         ? (user.displayName || user.email.split('@')[0])
                         : "guest";

                    const role = "pilot"; // nếu có role thì thay vào đây

                    // --- FORMAT THỜI GIAN ---
                    const now = new Date();

                    const pad = (n) => n.toString().padStart(2, "0");

                    const dateStr = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}`;
                    const timeStr = `${pad(now.getHours())}${pad(now.getMinutes())}`;

                    const docId = `${username}_${role}_${dateStr}_${timeStr}`;

                    // --- FORMAT HIỂN THỊ ---
                    const displayTime = now.toLocaleString('vi-VN');

                    // --- LƯU FIRESTORE ---
                    await setDoc(doc(db, "contributions", docId), {
                         username: username,
                         idea: idea,
                         code: codeEditor.value,
                         type: type,
                         time: displayTime,
                         createdAt: serverTimestamp()
                    });

                    playSfx('sndSuccess');
                    alert("🍄 YAY! BẢN THIẾT KẾ ĐÃ ĐƯỢC CHUYỂN CHO CÁC BÉ KHỈ LƯU TRỮ!");

               } catch (e) {
                    alert("❌ LỖI VẬN CHUYỂN.");
               }
          };

          // Auto height
          promptArea.addEventListener('input', function () {
               this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px';
               sendHeight();
          });
          window.addEventListener('load', sendHeight);

          // AUTH
          onAuthStateChanged(auth, (user) => {
               if (user) {
                    const name = user.displayName || user.email.split('@')[0];
                    document.getElementById('uName').innerText = "THỢ XÂY " + name.toUpperCase();
                    document.getElementById('uInit').innerText = name.charAt(0).toUpperCase();
               }
          });

          // --- NHẠC NỀN ---
          const bgMusic = document.getElementById("bgMusic");
          window.addEventListener("load", () => {
               bgMusic.volume = 0.5;
               bgMusic.playbackRate = 0.95;
               bgMusic.play().catch(() => {
                    document.addEventListener("click", () => {
                         bgMusic.play();
                    }, { once: true });
               });
          });
     </script>
     <script src="../main_js/iframe.js"></script>
</body>

</html>
