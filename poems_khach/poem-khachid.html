<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem bài thơ</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ================= LAYOUT CHUNG ================= */

        body {
            margin: 0;
            padding: 70px 0;
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 0 40px;
        }

        .poem-box {
            position: relative;
            background: rgba(255, 255, 255, 0.65);
            padding: 30px 25px;
            padding-top: 65px;
            border-radius: 16px;
            width: 500px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        /* ===== NÚT BACK ===== */

        .back-btn {
            position: absolute;
            top: -25px;
            left: -10px;
        }

        .back-btn img {
            width: 48px;
            display: block;
            filter: drop-shadow(3px 5px 6px rgba(0, 0, 0, 0.25));
            transition: transform 0.3s ease;
        }

        @keyframes softShake {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-3deg);
            }

            50% {
                transform: rotate(2deg);
            }

            75% {
                transform: rotate(-2deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        .back-btn:hover img {
            animation: softShake 0.6s ease-in-out;
        }

        /* ===== TITLE ===== */

        #poem-title {
            font-size: 34px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 18px;
            color: #3a2e2e;
        }

        /* ===== CONTENT ===== */

        #poem-content {
            line-height: 1.8;
            font-size: 20px;
            text-align: center;
          
    white-space: pre-wrap; /* Giữ xuống dòng, khoảng trắng */
            /* font-style: italic;  <- Bỏ cố định cái này vì Quill đã có sẵn định dạng riêng */
            color: #2b1d1d;
        }

        /* THÊM 3 DÒNG NÀY ĐỂ ĐỌC ĐƯỢC CĂN LỀ CỦA QUILL */
        .ql-align-center { text-align: center; }
        .ql-align-right { text-align: right; }
        .ql-align-justify { text-align: justify; }
#poem-content p {
    margin: 0 0 1em 0; /* Thêm khoảng cách giữa các dòng */
    line-height: 1.6; /* Điều chỉnh cao dòng */
}
        /* ===== IMAGE ===== */

        .poem-image {
            background-size: cover;
            background-position: center;
            width: 300px;
            height: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        /* ================= AUDIO ================= */

        .audio-player {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            padding: 8px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.35s ease;
        }

        .audio-player.show {
            width: 320px;
            opacity: 1;
            display: flex;
            align-items: center;
        }

        .audio-icon {
            font-size: 22px;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .audio-wrapper {
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .audio-icon:hover {
            color: #1e88ff;
        }

        .play-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #1e88ff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .progress-container {
            width: 180px;
            height: 6px;
            background: #ddd;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #1e88ff;
            border-radius: 10px;
        }

        .time {
            font-size: 13px;
            color: #555;
            min-width: 60px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="poem-box">

            <a href="danhsach.html" class="back-btn">
                <img src="icon.jpg">
            </a>

            <div id="poem-title"></div>

            <!-- THAY PRE THÀNH DIV ĐỂ HIỂN THỊ HTML ĐÚNG -->
            <div id="poem-content"></div>

            <div class="audio-wrapper">

                <i class="fa-solid fa-volume-xmark audio-icon" id="audioIcon"></i>
                <div class="audio-player" id="player">

                    <div class="play-btn" id="playBtn">
                        <i class="fa-solid fa-play"></i>
                    </div>

                    <div class="progress-container" id="progressContainer">
                        <div class="progress" id="progress"></div>
                    </div>

                    <div class="time" id="time">00:00</div>

                </div>
            </div>

            <audio id="audio"></audio>

        </div>

        <div class="poem-image" id="poemImage"></div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        /* firebase */

        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /* lấy id */

        const params = new URLSearchParams(window.location.search);
        const poemId = params.get("id");

        /* load poem */
        function loadFont(font) {

            if (!font) return;

            const link = document.createElement("link");

            link.rel = "stylesheet";
            link.href =
                "https://fonts.googleapis.com/css2?family="
                + font.replace(/ /g, "+")
                + "&display=swap";

            document.head.appendChild(link);

        }
        async function loadPoem() {

            if (!poemId) return;

            const ref = doc(db, "uploads", poemId);
            const snap = await getDoc(ref);

            if (!snap.exists()) return;

            const data = snap.data();
            loadFont(data.fontTitle);
            loadFont(data.fontContent);
            
            /* title - SỬA THÀNH INNERHTML */
            const title = document.getElementById("poem-title");
            title.innerHTML = data.title || "";

            /* content - SỬA THÀNH INNERHTML */
            const content = document.getElementById("poem-content");
            content.innerHTML = data.content || "";

            /* font */
            if (data.fontTitle) title.style.fontFamily = data.fontTitle;
            if (data.fontContent) content.style.fontFamily = data.fontContent;

            /* background */
            if (data.back_img) {
                document.body.style.backgroundImage = `url(${data.back_img})`;
            }

            /* image */
            if (data.image) {
                document.getElementById("poemImage").style.backgroundImage = `url(${data.image})`;
            }

            /* audio */
            if (data.audio) {
                document.getElementById("audio").src = data.audio;
            }

        }

        loadPoem();


        /* ================= AUDIO PLAYER ================= */

        document.addEventListener("DOMContentLoaded", () => {

            const audio = document.getElementById("audio");
            const audioIcon = document.getElementById("audioIcon");
            const player = document.getElementById("player");
            const playBtn = document.getElementById("playBtn");
            const progress = document.getElementById("progress");
            const progressContainer = document.getElementById("progressContainer");
            const timeDisplay = document.getElementById("time");

            let isOpen = false;

            audioIcon.style.display = "none";

            audio.addEventListener("loadedmetadata", () => {
                audioIcon.style.display = "inline-block";
            });
            audioIcon.addEventListener("click", () => {

                if (!isOpen) {

                    player.classList.add("show");
                    audio.play();

                    audioIcon.classList.remove("fa-volume-xmark");
                    audioIcon.classList.add("fa-volume-high");

                    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';

                    isOpen = true;

                }
                else {

                    audio.pause();
                    player.classList.remove("show");

                    audioIcon.classList.remove("fa-volume-high");
                    audioIcon.classList.add("fa-volume-xmark");

                    playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';

                    isOpen = false;

                }

            });


            playBtn.addEventListener("click", () => {

                if (audio.paused) {

                    audio.play();
                    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';

                    // đồng bộ icon loa
                    audioIcon.classList.remove("fa-volume-xmark");
                    audioIcon.classList.add("fa-volume-high");

                    isOpen = true;

                }
                else {

                    audio.pause();
                    playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';

                    // đồng bộ icon loa
                    audioIcon.classList.remove("fa-volume-high");
                    audioIcon.classList.add("fa-volume-xmark");

                    isOpen = false;

                }

            });

            audio.addEventListener("timeupdate", () => {

                if (!audio.duration) return;

                const percent = (audio.currentTime / audio.duration) * 100;
                progress.style.width = percent + "%";

                let minutes = Math.floor(audio.currentTime / 60);
                let seconds = Math.floor(audio.currentTime % 60);

                if (seconds < 10) seconds = "0" + seconds;

                timeDisplay.textContent = minutes + ":" + seconds;

            });

            progressContainer.addEventListener("click", (e) => {

                const width = progressContainer.clientWidth;
                const clickX = e.offsetX;

                audio.currentTime = (clickX / width) * audio.duration;

            });

        });

    </script>
    <script src="../main_js/iframe.js"></script>

</body>

</html>
