<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Đăng bài thơ</title>

<script src="../js/selpoem.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:30px;
}

input[type="text"]{
width:100%;
padding:10px;
margin:10px 0;
}

.row{
display:flex;
gap:20px;
}

.left{flex:2;}
.right{flex:1;}

textarea{
width:100%;
height:220px;
padding:10px;
resize:vertical;
}

.checkbox-group{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

.checkbox-row{
display:flex;
align-items:center;
gap:10px;
}

.other-input{
display:none;
padding:6px;
width:200px;
}

.preview-img{
max-width:200px;
margin-top:10px;
display:none;
border-radius:6px;
}

audio{
margin-top:10px;
display:none;
}

button{
padding:12px 20px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
margin-top:20px;
}

button.disabled{
opacity:0.5;
pointer-events:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Đăng bài thơ</h2>

<div class="row">

<div class="left">
<input type="text" id="title" placeholder="Tên bài thơ">
</div>

<div class="right">
<input type="text" id="fontTitle" placeholder="Font tên bài thơ">
</div>

</div>

<textarea id="content" placeholder="Nhập nội dung bài thơ"></textarea>

<input type="text" id="fontContent" placeholder="Font nội dung bài thơ">

<h3>Thể thơ</h3>
<div id="theThoBox" class="checkbox-group"></div>

<h3>Thể loại</h3>
<div id="theLoaiBox" class="checkbox-group"></div>

<h3>Âm thanh giọng đọc (mp3 < 20MB)</h3>
<input type="file" id="audioFile" accept=".mp3">
<br>
<audio id="audioPreview" controls></audio>

<h3>Background (jpg)</h3>
<input type="file" id="backgroundFile" accept=".jpg,.jpeg">
<br>
<img id="bgPreview" class="preview-img">

<h3>Ảnh đại diện (jpg)</h3>
<input type="file" id="imageFile" accept=".jpg,.jpeg">
<br>
<img id="imgPreview" class="preview-img">

<br><br>

<button id="submitBtn">Gửi bài thơ</button>
<button onclick="previewPoem()">Xem trước bài thơ</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain:"banhkietgithunbpoem.firebaseapp.com",
projectId:"banhkietgithunbpoem",
storageBucket:"banhkietgithunbpoem.firebasestorage.app",
messagingSenderId:"429631951698",
appId:"1:429631951698:web:8c5f6854de3ad22113a08b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

/* ================= CLOUDINARY UPLOAD ================= */

async function uploadFile(file){

if(!file) return "";

const url="https://api.cloudinary.com/v1_1/dp6rc7ghq/upload";

const formData=new FormData();
formData.append("file",file);
formData.append("upload_preset","uploadfilepoem");
formData.append("resource_type","auto");

const res=await fetch(url,{
method:"POST",
body:formData
});

const data=await res.json();

return data.secure_url;

}

/* ================= CHECKBOX ================= */

function createCheckbox(container,data){

data.forEach(item=>{

const row=document.createElement("div");
row.className="checkbox-row";

const check=document.createElement("input");
check.type="checkbox";
check.value=item;

const label=document.createElement("span");
label.innerText=item;

row.appendChild(check);
row.appendChild(label);

container.appendChild(row);

});

}

createCheckbox(document.getElementById("theThoBox"),config.theTho);
createCheckbox(document.getElementById("theLoaiBox"),config.theLoai);

/* ================= SUBMIT ================= */

submitBtn.onclick=async function(){

this.classList.add("disabled");

msg.innerText="Đang upload file...";

try{

const user=auth.currentUser;

if(!user){
msg.innerText="Bạn chưa đăng nhập";
return;
}

/* lấy email + role */

const userDoc=await getDoc(doc(db,"users",user.uid));
const userData=userDoc.data();

const email=userData.email;
const role=userData.role;

/* upload file */

const back_img=await uploadFile(backgroundFile.files[0]);
const image=await uploadFile(imageFile.files[0]);
const audio=await uploadFile(audioFile.files[0]);

/* lấy dữ liệu input */

const title=document.getElementById("title").value;
const content=document.getElementById("content").value;
const fontTitle=document.getElementById("fontTitle").value;
const fontContent=document.getElementById("fontContent").value;

/* thể loại */

let theLoai="";
document.querySelectorAll("#theLoaiBox input:checked")
.forEach(el=> theLoai=el.value);

/* thể thơ */

let theTho="";
document.querySelectorAll("#theThoBox input:checked")
.forEach(el=> theTho=el.value);

/* lưu firebase */

await addDoc(collection(db,"uploads"),{

email:email,
role:role,

title:title,
content:content,

fontTitle:fontTitle,
fontContent:fontContent,

theLoai:theLoai,
theTho:theTho,

back_img:back_img,
image:image,
audio:audio,

created:Date.now()

});

msg.innerText="Đã gửi bài thơ. Chờ admin duyệt.";

}catch(e){

console.error(e);
msg.innerText="Upload lỗi";

}

};

</script>

</body>
</html>
