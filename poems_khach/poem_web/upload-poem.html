<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Đăng bài thơ</title>

<script src="../../poems/js/selpoem.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Lora&family=Playfair+Display&family=Roboto&family=Be+Vietnam+Pro&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:30px;
}

input[type="text"],select{
width:100%;
padding:10px;
margin:10px 0;
}

.row{
display:flex;
gap:20px;
}

.left{flex:2;}
.right{flex:1;}

textarea{
width:100%;
height:220px;
padding:10px;
resize:vertical;
}

.checkbox-group{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

.checkbox-row{
display:flex;
align-items:center;
gap:10px;
}

.other-input{
display:none;
padding:6px;
width:200px;
}

.preview-img{
max-width:200px;
margin-top:10px;
display:none;
border-radius:6px;
}

audio{
margin-top:10px;
display:none;
}

button{
padding:12px 20px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
margin-top:20px;
}

button.disabled{
opacity:0.5;
pointer-events:none;
}

/* ===== layout font mới ===== */

.font-row{
display:flex;
gap:10px;
align-items:center;
width:100%;
}

.font-select{
width:180px;
}

.font-other{
flex:1;
display:none;
}

.font-note{
font-size:13px;
color:#555;
margin-top:-5px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Đăng bài thơ</h2>

<!-- ================= TIÊU ĐỀ ================= -->

<label><b>Tên bài thơ</b></label>
<input type="text" id="title" placeholder="Nhập tên bài thơ">

<div class="font-note">
    <p></p>
Chọn kiểu chữ (font) cho <b>tên bài thơ</b>. Nếu chọn <b>Khác</b> bạn có thể tự nhập font mong muốn.
</div>

<div class="font-row">

<select id="fontTitleSelect" class="font-select">

<option value="Times New Roman">Times New Roman</option>
<option value="Georgia">Georgia</option>
<option value="Merriweather">Merriweather</option>
<option value="Playfair Display">Playfair Display</option>
<option value="Lora">Lora</option>
<option value="Roboto">Roboto</option>
<option value="Be Vietnam Pro">Be Vietnam Pro</option>
<option value="other">Khác</option>

</select>

<input
type="text"
id="fontTitleOther"
class="font-other"
placeholder="Nhập tên font tiêu đề (ví dụ: Arial, Tahoma...)"
/>

</div>

<!-- ================= NỘI DUNG ================= -->

<br>

<label><b>Nội dung bài thơ</b></label>
<p></p>
<textarea id="content" placeholder="Nhập nội dung bài thơ"></textarea>

<div class="font-note">
    <p></p>
Chọn kiểu chữ (font) cho <b>nội dung bài thơ</b>. Nếu chọn <b>Khác</b> bạn có thể tự nhập font mong muốn.
</div>

<div class="font-row">

<select id="fontContentSelect" class="font-select">

<option value="Times New Roman">Times New Roman</option>
<option value="Georgia">Georgia</option>
<option value="Merriweather">Merriweather</option>
<option value="Playfair Display">Playfair Display</option>
<option value="Lora">Lora</option>
<option value="Roboto">Roboto</option>
<option value="Be Vietnam Pro">Be Vietnam Pro</option>
<option value="other">Khác</option>

</select>

<input
type="text"
id="fontContentOther"
class="font-other"
placeholder="Nhập tên font nội dung"
/>

</div>

<h3>Thể thơ</h3>
<div id="theThoBox" class="checkbox-group"></div>

<h3>Thể loại</h3>
<div id="theLoaiBox" class="checkbox-group"></div>

<h3>(Có/Không) âm thanh giọng đọc (mp3 < 10MB) </h3>
<input type="file" id="audioFile" accept=".mp3">
<br>
<audio id="audioPreview" controls></audio>

<h3>Background (jpg)</h3>
<input type="file" id="backgroundFile" accept=".jpg,.jpeg">
<br>
<img id="back_imgPreview" class="preview-img">

<h3>Ảnh đại diện (jpg)</h3>
<input type="file" id="imageFile" accept=".jpg,.jpeg">
<br>
<img id="imgPreview" class="preview-img">

<br><br>
<button type="button" id="previewBtn">Xem thử bài thơ</button>
<button id="submitBtn">Gửi bài thơ</button>
<div style="margin-top:10px;width:100%;background:#ddd;height:8px;border-radius:5px;overflow:hidden;">
<div id="progressBar" style="width:0%;height:100%;background:#2e7d32;"></div>
</div>
<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* firebase */

const firebaseConfig={
apiKey:"AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain:"banhkietgithunbpoem.firebaseapp.com",
projectId:"banhkietgithunbpoem",
storageBucket:"banhkietgithunbpoem.firebasestorage.app",
messagingSenderId:"429631951698",
appId:"1:429631951698:web:8c5f6854de3ad22113a08b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
/* xóa ten tieng việt username  */
function cleanText(text){
return text
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/\s+/g,"")
.replace(/[^a-z0-9]/g,"");
}
/* lấy element */

const fontTitleSelect=document.getElementById("fontTitleSelect");
const fontTitleOther=document.getElementById("fontTitleOther");
const previewBtn=document.getElementById("previewBtn");
const fontContentSelect=document.getElementById("fontContentSelect");
const fontContentOther=document.getElementById("fontContentOther");

const backgroundFile=document.getElementById("backgroundFile");
const imageFile=document.getElementById("imageFile");
const audioFile=document.getElementById("audioFile");

const back_imgPreview=document.getElementById("back_imgPreview");
const imgPreview=document.getElementById("imgPreview");
const audioPreview=document.getElementById("audioPreview");

const submitBtn=document.getElementById("submitBtn");
const progressBar=document.getElementById("progressBar");
progressBar.parentElement.style.display="none";
const msg=document.getElementById("msg");

const theThoBox=document.getElementById("theThoBox");
const theLoaiBox=document.getElementById("theLoaiBox");

/* tạo folder định danh cloudary */ 
function createFolder(username,title,email){

const date=new Date().toISOString().split("T")[0];

const u=cleanText(username);
const t=cleanText(title);
const e=cleanText(email);

return `${u}_${t}_${date}_${e}`;

}

/* upload cloudinary */

async function uploadFile(file,folder){

const url="https://api.cloudinary.com/v1_1/dp6rc7ghq/auto/upload";

const formData=new FormData();

formData.append("file",file);
formData.append("upload_preset","uploadfilepoem");

formData.append("folder",folder);

const res=await fetch(url,{
method:"POST",
body:formData
});

const data=await res.json();

return data.secure_url;

}

/* font combobox */

fontTitleSelect.onchange=function(){

fontTitleOther.style.display=
this.value==="other" ? "block":"none";

}

fontContentSelect.onchange=function(){

fontContentOther.style.display=
this.value==="other" ? "block":"none";

}

/* tạo option */

function createOptions(container,data,type){

data.forEach(item=>{

const row=document.createElement("div");
row.className="checkbox-row";

const input=document.createElement("input");

if(type==="radio"){
input.type="radio";
input.name=container.id;
}else{
input.type="checkbox";
}

input.value=item;

const label=document.createElement("span");
label.innerText=item;

row.appendChild(input);
row.appendChild(label);

let otherInput=null;

if(item.toLowerCase()==="khác"){

otherInput=document.createElement("input");
otherInput.type="text";
otherInput.placeholder="Nhập...";
otherInput.className="other-input";

row.appendChild(otherInput);

}

if(type==="radio"){

input.addEventListener("change",()=>{

container.querySelectorAll(".other-input")
.forEach(el=>el.style.display="none");

if(item.toLowerCase()==="khác" && input.checked){

otherInput.style.display="block";

}

});

}

if(type==="checkbox"){

input.addEventListener("change",()=>{

const otherCheck=container.querySelector('input[value="Khác"]');
const otherBox=container.querySelector(".other-input");

if(item.toLowerCase()==="khác"){

if(input.checked){

container.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
if(cb!==input){
cb.checked=false;
cb.disabled=true;
}
});

if(otherBox) otherBox.style.display="block";

}else{

container.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
cb.disabled=false;
});

if(otherBox) otherBox.style.display="none";

}

}else{

if(input.checked && otherCheck){

otherCheck.checked=false;

if(otherBox) otherBox.style.display="none";

}

}

});

}

container.appendChild(row);

});

}

createOptions(theThoBox,config.theTho,"radio");
createOptions(theLoaiBox,config.theLoai,"checkbox");

/* preview */

backgroundFile.onchange=()=>{
msg.innerText="";
const file=backgroundFile.files[0];

if(!file) return;

if(file.size > 5*1024*1024){

msg.style.color="red";
msg.innerText="Background phải nhỏ hơn 5MB";

backgroundFile.value="";
return;

}

back_imgPreview.src=URL.createObjectURL(file);
back_imgPreview.style.display="block";

}

imageFile.onchange=()=>{
msg.innerText="";
const file=imageFile.files[0];

if(!file) return;

if(file.size > 5*1024*1024){

msg.style.color="red";
msg.innerText="Ảnh đại diện phải nhỏ hơn 5MB";

imageFile.value="";
return;

}

imgPreview.src=URL.createObjectURL(file);
imgPreview.style.display="block";

}

audioFile.onchange=()=>{
msg.innerText="";
const file=audioFile.files[0];

if(!file) return;

/* kiểm tra 20MB */

if(file.size > 20*1024*1024){

msg.style.color="red";
msg.innerText="File audio phải nhỏ hơn 20MB";

audioFile.value="";
return;

}

audioPreview.src=URL.createObjectURL(file);
audioPreview.style.display="block";

}
/* ===== kiểm tra form trước khi gửi ===== */

function validateForm(){

msg.style.color="red";

const title=document.getElementById("title").value.trim();
const content=document.getElementById("content").value.trim();

if(!title){
msg.innerText="Bạn chưa nhập tên bài thơ";
return false;
}

if(!content){
msg.innerText="Bạn chưa nhập nội dung bài thơ";
return false;
}

/* kiểm tra thể thơ */

const tho=document.querySelector("#theThoBox input[type=radio]:checked");

if(!tho){
msg.innerText="Bạn chưa chọn thể thơ";
return false;
}

if(tho.value.toLowerCase()==="khác"){

const otherTho=document.querySelector("#theThoBox .other-input");

if(!otherTho.value.trim()){
msg.innerText="Bạn chưa nhập thể thơ";
return false;
}

}

/* kiểm tra thể loại */

const loai=document.querySelectorAll("#theLoaiBox input[type=checkbox]:checked");

if(loai.length===0){
msg.innerText="Bạn chưa chọn thể loại";
return false;
}

const otherLoai=document.querySelector("#theLoaiBox .other-input");

if(otherLoai && otherLoai.style.display==="block"){

if(!otherLoai.value.trim()){
msg.innerText="Bạn chưa nhập thể loại";
return false;
}

}

/* background */

if(!backgroundFile.files[0]){
msg.innerText="Bạn chưa chọn background";
return false;
}

/* ảnh */

if(!imageFile.files[0]){
msg.innerText="Bạn chưa chọn ảnh đại diện";
return false;
}

return true;

}
/* xem trước */
previewBtn.onclick=function(){

const title=document.getElementById("title").value;
const content=document.getElementById("content").value;

/* font */

let fontTitle=
fontTitleSelect.value==="other"
? fontTitleOther.value
: fontTitleSelect.value;

let fontContent=
fontContentSelect.value==="other"
? fontContentOther.value
: fontContentSelect.value;

/* background */

let back_img="";
if(backgroundFile.files[0]){
back_img=URL.createObjectURL(backgroundFile.files[0]);
}

/* avatar */

let avatar="";
if(imageFile.files[0]){
avatar=URL.createObjectURL(imageFile.files[0]);
}

/* audio */

let audio="";
if(audioFile.files[0]){
audio=URL.createObjectURL(audioFile.files[0]);
}

/* lưu dữ liệu */

const previewData={
title,
content,
fontTitle,
fontContent,
back_img,
avatar,
audio
};

localStorage.setItem("preview_poem",JSON.stringify(previewData));

/* mở trang review */

window.open("review_poem.html","_blank");

};
/* submit */

submitBtn.onclick=async function(){

/* kiểm tra dữ liệu */

if(!validateForm()){
return;
}

submitBtn.classList.add("disabled");
submitBtn.innerText="Đang gửi...";
/* kiểm tra dữ liệu */


/* xác nhận gửi */

const ok=confirm("Bạn có chắc muốn gửi bài thơ này không?");

if(!ok){
msg.innerText="Đã huỷ gửi bài";
submitBtn.classList.remove("disabled");
submitBtn.innerText="Gửi bài thơ";
return;
}
progressBar.parentElement.style.display="block";
msg.innerText="Đang upload...";
progressBar.style.width="10%";
try{

const user=auth.currentUser;

if(!user){
msg.innerText="Bạn chưa đăng nhập";
progressBar.parentElement.style.display="none";
submitBtn.classList.remove("disabled");
submitBtn.innerText="Gửi bài thơ";
return;
}

const userDoc=await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists()){
msg.innerText="Không tìm thấy dữ liệu user";
return;
}

const userData=userDoc.data();

const title=document.getElementById("title").value;

const username=userData.username;
const email=userData.email;

/* tạo folder */

const folder=createFolder(username,title,email);

/* upload */

const back_img=await uploadFile(backgroundFile.files[0],folder);
progressBar.style.width="40%";

const image=await uploadFile(imageFile.files[0],folder);
progressBar.style.width="70%";

let audio="";

if(audioFile.files[0]){
audio=await uploadFile(audioFile.files[0],folder);
}

progressBar.style.width="100%";

const titleValue=document.getElementById("title").value;
const contentValue=document.getElementById("content").value;

/* font */

let fontTitle=
fontTitleSelect.value==="other"
? fontTitleOther.value
: fontTitleSelect.value;

let fontContent=
fontContentSelect.value==="other"
? fontContentOther.value
: fontContentSelect.value;

/* thể loại */

let theLoai=[];
const otherLoai=document.querySelector("#theLoaiBox .other-input");

if(otherLoai && otherLoai.style.display==="block"){

theLoai=[otherLoai.value];

}else{

document.querySelectorAll("#theLoaiBox input[type=checkbox]:checked")
.forEach(el=>theLoai.push(el.value));

}

/* thể thơ */

let theTho="";
const tho=document.querySelector("#theThoBox input[type=radio]:checked");

if(tho){

if(tho.value.toLowerCase()==="khác"){

theTho=document.querySelector("#theThoBox .other-input").value;

}else{

theTho=tho.value;

}

}

await addDoc(collection(db,"temp"),{

email:userData.email,
role:userData.role,

folder:folder,

title:titleValue,
content:contentValue,
username:userData.username,

fontTitle,
fontContent,

theLoai,
theTho,

back_img,
image,
audio,

created:Date.now()

});
msg.style.color="green";

msg.innerText="Đã gửi bài thơ chờ admin duyệt";
setTimeout(()=>{
progressBar.parentElement.style.display="none";
msg.innerText="";
progressBar.style.width="0%";
},2000);
/* reset form */
document.getElementById("title").value="";
document.getElementById("content").value="";

backgroundFile.value="";
imageFile.value="";
audioFile.value="";

back_imgPreview.style.display="none";
imgPreview.style.display="none";
audioPreview.style.display="none";

document.querySelectorAll("#theLoaiBox input").forEach(el=>{
el.checked=false;
el.disabled=false;
});

document.querySelectorAll("#theThoBox input").forEach(el=>{
el.checked=false;
});

document.querySelectorAll(".other-input").forEach(el=>{
el.value="";
el.style.display="none";
});
submitBtn.classList.remove("disabled");
submitBtn.innerText="Gửi bài thơ";
}catch(e){
submitBtn.classList.remove("disabled");
submitBtn.innerText="Gửi bài thơ";
console.error(e);
msg.innerText="Upload lỗi rồi!";

}

};
</script>
<script src="../../main_js/iframe.js"></script>
</body>
</html>
