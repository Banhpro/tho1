<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Đăng bài thơ</title>

<script src="../js/selpoem.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:30px;
}

/* input */

input[type="text"]{
width:100%;
padding:10px;
margin:10px 0;
}

/* row */

.row{
display:flex;
gap:20px;
}

.left{flex:2;}
.right{flex:1;}

/* textarea */

textarea{
width:100%;
height:220px;
padding:10px;
resize:vertical;
}

/* checkbox group */

.checkbox-group{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

/* mỗi dòng checkbox */

.checkbox-row{
display:flex;
align-items:center;
gap:10px;
}

/* ô nhập khác */

.other-input{
display:none;
padding:6px;
width:200px;
}

/* preview */

.preview-img{
max-width:200px;
margin-top:10px;
display:none;
border-radius:6px;
}

audio{
margin-top:10px;
display:none;
}

/* button */

button{
padding:12px 20px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
margin-top:20px;
}

button.disabled{
opacity:0.5;
pointer-events:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Đăng bài thơ</h2>

<!-- tên + font -->

<div class="row">

<div class="left">
<input type="text" id="title" placeholder="Tên bài thơ">
</div>

<div class="right">
<input type="text" id="fontTitle" placeholder="Font tên bài thơ">
</div>

</div>

<textarea id="content" placeholder="Nhập nội dung bài thơ"></textarea>

<input type="text" id="fontContent" placeholder="Font nội dung bài thơ">

<!-- THỂ THƠ -->

<h3>Thể thơ</h3>

<div id="theThoBox" class="checkbox-group"></div>

<!-- THỂ LOẠI -->

<h3>Thể loại</h3>

<div id="theLoaiBox" class="checkbox-group"></div>

<!-- AUDIO -->

<h3>Âm thanh giọng đọc (mp3 < 20MB)</h3>

<input type="file" id="audioFile" accept=".mp3">

<br>

<audio id="audioPreview" controls></audio>

<!-- BACKGROUND -->

<h3>Background (jpg)</h3>

<input type="file" id="backgroundFile" accept=".jpg,.jpeg">

<br>

<img id="bgPreview" class="preview-img">

<!-- IMAGE -->

<h3>Ảnh đại diện (jpg)</h3>

<input type="file" id="imageFile" accept=".jpg,.jpeg">

<br>

<img id="imgPreview" class="preview-img">

<br><br>

<button id="submitBtn">Gửi bài thơ</button>

<button onclick="previewPoem()">Xem trước bài thơ</button>

<p id="msg"></p>

</div>

<script>

/* ================= LOAD CHECKBOX ================= */

function createCheckbox(container,data,type){

data.forEach(item=>{

const row=document.createElement("div");
row.className="checkbox-row";

const check=document.createElement("input");
check.type="checkbox";
check.value=item;

const label=document.createElement("span");
label.innerText=item;

row.appendChild(check);
row.appendChild(label);

/* nếu là Khác */

if(item.toLowerCase()=="khác"){

const input=document.createElement("input");
input.type="text";
input.placeholder="Nhập nội dung";
input.className="other-input";

row.appendChild(input);

check.addEventListener("change",function(){

const all=container.querySelectorAll("input[type=checkbox]");

if(this.checked){

all.forEach(c=>{
if(c!==check) c.disabled=true;
});

input.style.display="block";

}else{

all.forEach(c=>c.disabled=false);

input.style.display="none";

}

});

}

container.appendChild(row);

});

}

createCheckbox(
document.getElementById("theThoBox"),
config.theTho
);

createCheckbox(
document.getElementById("theLoaiBox"),
config.theLoai
);

/* ================= AUDIO PREVIEW ================= */

audioFile.onchange=function(){

const file=this.files[0];

if(!file) return;

if(file.size>20*1024*1024){

alert("Audio phải < 20MB");
this.value="";
return;

}

const url=URL.createObjectURL(file);

audioPreview.src=url;
audioPreview.style.display="block";

};

/* ================= IMAGE PREVIEW ================= */

backgroundFile.onchange=function(){

const file=this.files[0];

if(!file) return;

const url=URL.createObjectURL(file);

bgPreview.src=url;
bgPreview.style.display="block";

};

imageFile.onchange=function(){

const file=this.files[0];

if(!file) return;

const url=URL.createObjectURL(file);

imgPreview.src=url;
imgPreview.style.display="block";

};

/* ================= SUBMIT ================= */

submitBtn.onclick=function(){

this.classList.add("disabled");

msg.innerText="Đã gửi bài thơ. Chờ admin duyệt.";

};

/* ================= PREVIEW ================= */

function previewPoem(){

const title=document.getElementById("title").value;
const content=document.getElementById("content").value;

const fontTitle=document.getElementById("fontTitle").value||"serif";
const fontContent=document.getElementById("fontContent").value||"serif";

const bgFile=backgroundFile.files[0];
const imgFile=imageFile.files[0];
const audioFile2=audioFile.files[0];

let bgURL="";
let imgURL="";
let audioURL="";

if(bgFile) bgURL=URL.createObjectURL(bgFile);
if(imgFile) imgURL=URL.createObjectURL(imgFile);
if(audioFile2) audioURL=URL.createObjectURL(audioFile2);

const win=window.open();

win.document.write(`

<html>

<head>

<link rel="stylesheet" href="../../css/unit.css">

<style>

body{
background:url('${bgURL}') center/cover no-repeat;
}

#poem-title{
font-family:${fontTitle};
}

#poem-content{
font-family:${fontContent};
white-space:pre-wrap;
}

.poem-image{
background-image:url('${imgURL}');
}

</style>

</head>

<body>

<div class="container">

<div class="poem-box">

<div id="poem-title">${title}</div>

<pre id="poem-content">${content}</pre>

${audioURL ? `<audio controls src="${audioURL}"></audio>`:""}

</div>

<div class="poem-image"></div>

</div>

</body>

</html>

`);

}

</script>

</body>
</html>
