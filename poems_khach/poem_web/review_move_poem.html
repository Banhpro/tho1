<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Thơ Đã Xóa</title>

    <style>
        body {
            font-family: "Times New Roman", serif;
            background: linear-gradient(135deg, #f5f2eb, #e9e3d6);
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            color: #444;
        }

        .poem-card {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .poem-card:hover {
            transform: translateY(-5px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .meta {
            font-size: 13px;
            color: #888;
        }

        .author {
            margin-top: 5px;
            font-size: 14px;
            color: #555;
        }

        .content {
            margin-top: 15px;
            font-size: 17px;
            line-height: 1.6;
            white-space: pre-line;
            color: #222;
        }

        .images {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .images img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .images img:hover {
            transform: scale(1.1);
        }

        /* modal ảnh */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
        }

        .empty {
            text-align: center;
            color: #777;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h2>🗑️ Bài Thơ Đã Xóa</h2>
<div id="deletedList"></div>

<!-- modal xem ảnh -->
<div class="modal" id="imgModal">
    <img id="modalImg">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "banhkietgithunbpoem.firebaseapp.com",
        projectId: "banhkietgithunbpoem",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const deletedList = document.getElementById("deletedList");

    const modal = document.getElementById("imgModal");
    const modalImg = document.getElementById("modalImg");

    modal.onclick = () => modal.style.display = "none";

    async function loadDeletedPoems() {

        const querySnapshot = await getDocs(collection(db, "deleted_poems"));

        if (querySnapshot.empty) {
            deletedList.innerHTML = `<div class="empty">Chưa có bài thơ nào bị xóa</div>`;
            return;
        }

        querySnapshot.forEach(doc => {

            const data = doc.data();

            const poemCard = document.createElement("div");
            poemCard.className = "poem-card";

            // render ảnh
            let imagesHTML = "";
            if (data.images && data.images.length > 0) {
                imagesHTML = `<div class="images">` +
                    data.images.map(url => `<img src="${url}" />`).join("") +
                    `</div>`;
            }

            poemCard.innerHTML = `
                <div class="header">
                    <div class="title">${data.title || "Không tiêu đề"}</div>
                    <div class="meta">${new Date(data.created).toLocaleString()}</div>
                </div>

                <div class="author">
                    👤 ${data.username || "Ẩn danh"} (${data.role || "user"})
                </div>

                <div class="content">${data.content || ""}</div>

                ${imagesHTML}
            `;

            // click ảnh phóng to
            poemCard.querySelectorAll("img").forEach(img => {
                img.onclick = () => {
                    modal.style.display = "flex";
                    modalImg.src = img.src;
                };
            });

            deletedList.appendChild(poemCard);

        });
    }

    loadDeletedPoems();
</script>

</body>
</html>
