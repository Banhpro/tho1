<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Duyệt bài thơ</title>

<style>

body{
font-family:Segoe UI;
background:#f5f6fa;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

button{
padding:8px 15px;
margin:5px;
border:none;
cursor:pointer;
border-radius:5px;
}

.approve{
background:#2e7d32;
color:white;
}

.reject{
background:#c62828;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>Bài thơ chờ duyệt</h2>

<div id="poemList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "APIKEY",
authDomain: "PROJECT.firebaseapp.com",
projectId: "PROJECT",
storageBucket: "PROJECT.appspot.com",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPoems(){

const list=document.getElementById("poemList");
list.innerHTML="";

const snapshot=await getDocs(collection(db,"poems_pending"));

snapshot.forEach(docItem=>{

const poem=docItem.data();

const card=document.createElement("div");
card.className="card";

card.innerHTML=`

<h3>${poem.title}</h3>

<p style="white-space:pre-line">${poem.content}</p>

<p><b>Thể thơ:</b> ${poem.theTho.join(", ")}</p>
<p><b>Thể loại:</b> ${poem.theLoai.join(", ")}</p>

<button class="approve">DUYỆT</button>
<button class="reject">TỪ CHỐI</button>

`;

card.querySelector(".approve").onclick=()=>approve(docItem.id,poem);
card.querySelector(".reject").onclick=()=>reject(docItem.id);

list.appendChild(card);

});

}

async function approve(id,poem){

await addDoc(collection(db,"poems_public"),poem);

await deleteDoc(doc(db,"poems_pending",id));

loadPoems();

}

async function reject(id){

await deleteDoc(doc(db,"poems_pending",id));

loadPoems();

}

loadPoems();

</script>

</body>
</html>
