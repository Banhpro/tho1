<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Không gian thơ</title>

    <style>
        /* ================= BODY ================= */

        body {
            font-family: "Times New Roman", serif;
            background: #f3f6ff;
            padding: 50px;
            transition: 0.4s;
            overflow-x: hidden;
            color: #222;
        }

        /* ================= CONTAINER ================= */

        .container {
            max-width: 720px;
            margin: auto;
        }

        /* like heart */
        @keyframes flyHeart {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-25px);
                opacity: 0;
            }
        }

        /* ================= TITLE ================= */

        .title {
            font-size: 34px;
            text-align: center;
            margin-bottom: 25px;
        }

        /* ================= POEM ================= */

        .line {
            font-size: 22px;
            margin: 10px 0;
            cursor: pointer;
            line-height: 1.6;
        }

        /* ================= COMMENT ================= */

        .comment-box {
            margin: 10px 0 16px 20px;
            padding: 10px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .input-comment {
            background: #FFE4C4;
            padding: 6px 10px;
            border-radius: 6px;
            margin: 4px 0;
            font-size: 14px;
            white-space: pre-wrap;
        }


        .comment small {
            color: #666;
            margin-left: 6px;
        }

        .username {
            color: #2f4cff;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        .username:hover {
            text-decoration: underline;
        }

        /* ================= BUTTONS ================= */

        button {
            padding: 8px 14px;
            margin: 6px 6px 0 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #toggleComment {
            background: #e6eaff;
        }

        #toggleComment.active {
            background: #ffd966;
            color: #5a3d00;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
            border: 1px solid #e6b800;
            transform: translateY(-2px) scale(1.03);
        }

        #superMode {
            background: #e6eaff;
            transition: 0.25s;
        }

        /* khi bật super mode */
        .super-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 20px;
        }

        .super-mode #superMode {
            background: #2ecc71;
            color: white;
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
            border: 1px solid #1e9e52;
        }

        /* khi khóa comment */

        .disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* ================= SUPER MODE ================= */

        .super-mode {
            background: #0f1117;
            color: white;
        }

        .super-mode .line {
            color: white;
            opacity: 0;
        }

        .super-mode .title {
            color: white;
        }

        .super-mode .echo {
            color: black;
        }

        /*  hieuej uwngs nut */
        button {
            padding: 8px 14px;
            margin: 6px 6px 0 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }

        /* ================= FIREFLY ================= */

        .firefly {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #ffe66d;
            border-radius: 50%;
            opacity: 0.8;
            animation: fly 6s linear infinite;
            box-shadow: 0 0 8px #ffe66d, 0 0 14px #ffe66d;
            animation: fly 4s linear infinite, blink 1.2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: 1
            }
        }

        @keyframes fly {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-900px)
            }
        }

        /* ================= ECHO ================= */
        .echo-text {
            white-space: pre-wrap;
        }

        .echo-comment {
            background: #FFE4C4;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .echo-comment .username {
            color: #2e8b57;
            /* xanh lá cho comment chính */
            font-weight: bold;
        }

        /* reply */

        .reply {
            margin-left: 35px;
            margin-top: 6px;
            padding: 6px 8px;
            background: #FFE4C4;
            border-radius: 6px;
        }

        .reply .username {
            color: #2f4cff;
            font-style: italic;
        }

        /* buttons */

        .sendBtn {
            background: #4caf50;
            color: white;
        }

        .replyBtn {
            background: #e7dcff;
        }

        .deleteBtn {
            background: #ffd6d6;
        }

        /* ================= POEM ================= */
        .line {
            font-size: 22px;
            margin: 10px 0;
            cursor: pointer;
            line-height: 1.6;
        }

        /* Thêm hover cho các ký tự trong dòng khi bật comment */
        .line span {
            transition: color 0.3s ease;
        }

        /* Khi hover vào từng ký tự */
        .line.hover:hover {
            color: #2ecc71;
            text-shadow: 0 0 6px rgba(46, 204, 113, 0.6);
        }

        .line span {
            animation: fadeIn 0.4s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        #reactionBar button {
            background: #e6eaff;
            margin: 4px;
        }

        #reactionBar button.active {
            background: #8ea2ff;
            color: white;
        }

        #reactionStats {
            margin-top: 10px;
            font-size: 14px;
        }


        .reaction-row {
            display: flex;
            align-items: center;
            margin: 12px 0;
            gap: 12px;
        }

        .emoji {
            font-size: 22px;
            cursor: pointer;
        }

        .bar {
            flex: 1;
            height: 8px;
            background: #dde4f2;
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: #4c6ef5;
            transition: 0.4s;
        }

        .avatars {
            display: flex;
        }

        .avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #3a6ea5;
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: -6px;
            border: 2px solid white;
        }

        .echo-comment {
            background: #FFF8E8;
            padding: 8px;
            border-radius: 6px;
            margin: 8px 0;
        }

        /* các nút điều khiển  */
        .control-bar {

            display: flex;
            align-items: center;
            gap: 16px;

            margin-top: 16px;
            flex-wrap: wrap;

        }

        .control-bar button {

            background: #e6eaff;
        }

        .control-bar audio {

            height: 36px;
        }

        /* CÁC NÚT NHẤN PHẢN HỒI GỬI */
        #sendEcho {
            background: #4CAF50;
            color: white;
        }

        .replyBtn {
            background: #e9ddff;
        }

        .deleteBtn {
            background: #ffd7d7;
        }

        button:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }

        .duam {
            background-color: #e9ddff;
        }

        .inputBox {
            width: calc(100% - 10px);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: "Times New Roman", serif;
            resize: vertical;
            white-space: pre-wrap;
            margin-top: 6px;
        }

        #echoInput {
            width: calc(100% - 10px);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: "Times New Roman", serif;
            resize: vertical;
            white-space: pre-wrap;
            margin-top: 6px;
        }

        /* ===== SUPER MODE UI FIX ===== */

        .super-mode .echo {
            background: #1a1d26;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .super-mode .duam {
            background: #2b2f3a;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .super-mode .echo-comment {
            background: #232733;
            color: #ddd;
        }

        .super-mode .reply {
            background: #1e2230;
            color: #ddd;
        }

        .super-mode #echoInput {
            background: #11141c;
            color: white;
            border: 1px solid #333;
        }

        .super-mode button {
            background: #2b2f3a;
            color: white;
        }

        .echo {
            margin-top: 30px;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        /* ===== SUPER MODE CONTROL PANEL ===== */

        .super-mode .poem-control {

            background: #1a1d26;
            color: #ddd;

            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);

        }

        .super-mode .bar {
            background: #3a3f4f;
        }

        .super-mode .fill {
            background: #7c8cff;
        }

        .super-mode .emoji {
            filter: brightness(1.2);
        }


        /* ===== CONTROL PANEL ===== */

        .poem-control {
            background: linear-gradient(135deg, #f6f8ff, #eef2ff);
            padding: 4px 20px 20px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            margin-top: 100px;

            width: 100%;
        }

        /* title */

        .control-title {

            font-size: 18px;
            font-weight: bold;
            text-align: center;

            margin-top: 12px;
            margin-bottom: 12px;
            color: #4c5cff;

        }

        #musicControl {
            display: none;
        }
    </style>

</head>

<body>
    <div id="commentList"></div>
    <div class="container">

        <div class="title">
            Mẹ Già
        </div>

        <div id="poem">

            <div class="line">Mẹ già tóc bạc như sương</div>
            <div class="line">Chiều chiều tựa cửa nhớ thương con hoài</div>
            <div class="line">Cơm nghèo khói bếp đơn côi</div>
            <div class="line">Con đi biền biệt cuối trời chưa về</div>

        </div>
        <div class="poem-control">


            <h3 class="control-title">Cảm xúc người đọc</h3>
            <div class="reaction-row">
                <div class="emoji reactBtn" data-type="sad">😢</div>

                <div class="bar">
                    <div class="fill" id="bar-sad"></div>
                </div>

                <div class="avatars" id="avatar-sad"></div>
            </div>


            <div class="reaction-row">
                <div class="emoji reactBtn" data-type="happy">😊</div>

                <div class="bar">
                    <div class="fill" id="bar-happy"></div>
                </div>

                <div class="avatars" id="avatar-happy"></div>
            </div>


            <div class="reaction-row">
                <div class="emoji reactBtn" data-type="romantic">💖</div>

                <div class="bar">
                    <div class="fill" id="bar-romantic"></div>
                </div>

                <div class="avatars" id="avatar-romantic"></div>
            </div>


            <div class="reaction-row">
                <div class="emoji reactBtn" data-type="fire">🔥</div>

                <div class="bar">
                    <div class="fill" id="bar-fire"></div>
                </div>

                <div class="avatars" id="avatar-fire"></div>
            </div>

            <div class="reaction-row">
                <div class="emoji reactBtn" data-type="cool">❄️</div>

                <div class="bar">
                    <div class="fill" id="bar-cool"></div>
                </div>

                <div class="avatars" id="avatar-cool"></div>
            </div>


            <div id="reactionStats"></div>
            <div class="super-bar">



            </div>
            <div class="control-bar">

                <button id="toggleComment">
                    💬 Bật comment theo dòng
                </button>
                <button id="superMode">
                    🌌 Đọc thơ siu cấp
                </button>

                <div id="musicControl">
                    <audio id="poemAudio" controls src="audio.mp3"></audio>
                </div>
            </div>
        </div>

        <div class="echo">
            <button id="savePoem">📚 Lưu vào sổ thơ</button>
            <h3 class="duam">Dư âm bài thơ</h3>

            <textarea id="echoInput" placeholder="Viết dư âm... (Ctrl + Enter để gửi)"></textarea> <button
                id="sendEcho">Gửi</button>

            <div id="echoList"></div>

        </div>

    </div>

    <script type="module">
        /* import firebase*/
        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

        import {
            getFirestore,
            doc,
            getDoc,
            collection,
            addDoc,
            deleteDoc,
            query,
            orderBy,
            onSnapshot,

            updateDoc,
            increment
        }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        import {
            getAuth,
            onAuthStateChanged
        }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        /* khởi tạo firebase */
        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem"
        };

        const app = initializeApp(firebaseConfig);

        const db = getFirestore(app);

        const auth = getAuth(app);

        /*  khai báo biến chung */
        let username = "Khách";
        let currentUser = null;

        let poemID = new URLSearchParams(location.search).get("id");

        if (!poemID) {

            const title = document.querySelector(".title").innerText;

            poemID = title
                .toLowerCase()
                .replace(/\s+/g, "_")
                .replace(/[^\w]/g, "");

            console.log("poemID tự tạo:", poemID);

        }
        if (!poemID) {

            console.warn("Không có poemID → dùng mặc định");

            poemID = "default_poem";

        }
        const echoList = document.getElementById("echoList");


        /*Realtime comment Firebase*/

        const q = query(
            collection(db, "super_poem", poemID, "comment"),
            orderBy("created", "asc")
        );

        onSnapshot(q, (snapshot) => {

            echoList.innerHTML = "";

            snapshot.forEach(docSnap => {

                const data = docSnap.data();
                const id = docSnap.id;

                if (data.parent) {
                    renderReply(data, id);
                }
                else if (data.lineIndex === undefined) {
                    renderEcho(data, id);
                }

            });

        });




        /* Hiển thị dư âm */
        function renderEcho(data, id) {

            const div = document.createElement("div");
            div.className = "echo-comment";
            div.dataset.id = id;

            div.innerHTML = commentHTML(data);

            echoList.appendChild(div);

            /* delete */

            div.querySelector(".deleteBtn").onclick = async () => {

                if (username !== data.username && username !== "admin") return;

                if (!confirm("Bạn chắc chắn muốn xóa bình luận này?")) return;

                await deleteDoc(doc(db, "super_poem", poemID, "comment", id));

            };

            div.querySelector(".replyBtn").onclick = () => {

                const boxReply = document.createElement("div");

                boxReply.innerHTML = `
<textarea class="inputBox" placeholder="Viết phản hồi..."></textarea>
<button class="sendBtn">Gửi</button>
`;

                div.appendChild(boxReply);

                const textarea = boxReply.querySelector("textarea");
                const btn = boxReply.querySelector("button");

                btn.onclick = send;

                textarea.addEventListener("keydown", e => {
                    if (e.ctrlKey && e.key === "Enter") send();
                });

                async function send() {

                    const text = textarea.value.trim();
                    if (!text) return;

                    await createReply(text, id, data.lineIndex);

                    boxReply.remove();

                }

            };
            const likeBtn = div.querySelector(".likeBtn");

            likeBtn.onclick = async () => {

                const ref = doc(db, "super_poem", poemID, "comment", id);

                await updateDoc(ref, {
                    hearts: increment(1)
                });

            };
        };

        /*Hiển thị cmt theo dòng */
        function renderLineComment(data, id) {

            const lines = document.querySelectorAll(".line");
            const line = lines[data.lineIndex];

            if (!line) return;

            let box = line.nextElementSibling;

            if (!box || !box.classList.contains("comment-box")) {
                box = document.createElement("div");
                box.className = "comment-box";
                line.after(box);
            }

            const div = document.createElement("div");   // tạo trước
            div.className = "comment";
            div.dataset.id = id;

            div.innerHTML = commentHTML(data);

            box.appendChild(div);

            /* reply */
            div.querySelector(".replyBtn").onclick = () => {

                const boxReply = document.createElement("div");

                boxReply.innerHTML = `
<textarea class="inputBox" placeholder="Viết phản hồi..."></textarea>
<button class="sendBtn">Gửi</button>
`;

                div.appendChild(boxReply);

                const textarea = boxReply.querySelector("textarea");
                const btn = boxReply.querySelector("button");

                btn.onclick = send;

                textarea.addEventListener("keydown", e => {
                    if (e.ctrlKey && e.key === "Enter") send();
                });

                async function send() {
                    const text = textarea.value.trim();
                    if (!text) return;

                    await createReply(text, id, null);
                    boxReply.remove();
                }

            };

            const likeBtn = div.querySelector(".likeBtn");

            likeBtn.onclick = async () => {

                const ref = doc(db, "super_poem", poemID, "comment", id);

                await updateDoc(ref, {
                    hearts: increment(1)
                });

            };


            div.querySelector(".deleteBtn").onclick = async () => {

                if (username !== data.username && username !== "admin") return;

                if (!confirm("Bạn chắc chắn muốn xóa bình luận này?")) return;

                await deleteDoc(doc(db, "super_poem", poemID, "comment", id));

            };

        }
        function renderReply(data, id) {
            const parent = document.querySelector(`[data-id="${data.parent}"]`);
            if (!parent) return;

            let replyBox = parent.querySelector(".replyList");

            if (!replyBox) {
                replyBox = document.createElement("div");
                replyBox.className = "replyList";
                parent.appendChild(replyBox);
            }


            const div = document.createElement("div");
            div.className = "reply";
            div.dataset.id = id;

            div.innerHTML = commentHTML(data);

            replyBox.appendChild(div);

            /* delete */

            div.querySelector(".deleteBtn").onclick = async () => {

                if (username !== data.username && username !== "admin") return;
                if (!confirm("Bạn chắc chắn muốn xóa phản hồi này?")) return;
                await deleteDoc(doc(db, "super_poem", poemID, "comment", id));



            };

            const likeBtn = div.querySelector(".likeBtn");

            likeBtn.onclick = async () => {

                const ref = doc(db, "super_poem", poemID, "comment", id);

                await updateDoc(ref, {
                    hearts: increment(1)
                });

            };
        }
        /* Reply cmt */
        async function createReply(text, parent, lineIndex = null) {
            if (username === "Khách") {
                alert("Bạn cần đăng nhập");
                return;
            }
            await addDoc(
                collection(db, "super_poem", poemID, "comment"),
                {
                    username: username,
                    text: text,
                    parent: parent,
                    lineIndex: lineIndex,
                    created: Date.now(),
                    hearts: 0
                }
            );

        }
        /*  Nút super mode */
        const superBtn = document.getElementById("superMode");

        const audio = document.getElementById("poemAudio");
        const musicControl = document.getElementById("musicControl");

        superBtn.onclick = () => {

            const active = document.body.classList.toggle("super-mode");

            if (active) {

                /* TẮT COMMENT THEO DÒNG */
                commentMode = false;
                toggleBtn.classList.remove("active");
                toggleBtn.innerText = "💬 Bật comment theo dòng";

                if (unsubscribeComments) unsubscribeComments();
                document.querySelectorAll(".comment-box").forEach(e => e.remove());

                toggleBtn.classList.add("disabled");

                musicControl.style.display = "block";

                audio.currentTime = 0;
                audio.play();

                animatePoem();
                createFireflies();

            } else {

                toggleBtn.classList.remove("disabled");

                musicControl.style.display = "none";

                audio.pause();

                document.querySelectorAll(".firefly").forEach(f => f.remove());

                restorePoem();
                removeFireflies();

            }

        };
        /*Kiểm tra đăng nhập */
        onAuthStateChanged(auth, async (user) => {

            if (user) {

                currentUser = user;

                const userRef = doc(db, "users", user.uid);

                const snap = await getDoc(userRef);

                if (snap.exists()) {
                    username = snap.data().username || "Khách";
                }

                console.log("Đăng nhập:", username);

            } else {

                username = "Khách";
                currentUser = null;

            }

        });
        /* load */

        let unsubscribeComments = null;
        /* Gửi comment dư âm */

        const echoInput = document.getElementById("echoInput");
        const sendEchoBtn = document.getElementById("sendEcho");

        sendEchoBtn.onclick = sendEchoComment;

        echoInput.addEventListener("keydown", e => {

            if (e.ctrlKey && e.key === "Enter") {
                e.preventDefault();
                sendEchoComment();
            }

        });
        async function sendEchoComment() {

            if (username === "Khách") {
                alert("Bạn cần đăng nhập để bình luận");
                return;
            }

            const text = echoInput.value.trim();

            if (!text) return;

            await addDoc(
                collection(db, "super_poem", poemID, "comment"),
                {
                    username: username,
                    text: text,
                    created: Date.now(),
                    hearts: 0
                }
            );

            echoInput.value = "";

        }
        /*Comment theo dong */
        let commentMode = false;

        const lines = document.querySelectorAll(".line");

        const toggleBtn = document.getElementById("toggleComment");
        toggleBtn.onclick = () => {

            commentMode = !commentMode;

            toggleBtn.classList.toggle("active");

            toggleBtn.innerText = commentMode
                ? "💬 Tắt comment theo dòng"
                : "💬 Bật comment theo dòng";

            lines.forEach(line => {
                line.classList.toggle("hover", commentMode);
            });

            if (commentMode) {

                loadComments();

            } else {

                if (unsubscribeComments) unsubscribeComments();

                document.querySelectorAll(".comment-box").forEach(e => e.remove());

            }

        };
        /*  gưi comment theo dong */
        lines.forEach((line, index) => {

            line.onclick = () => {

                if (!commentMode) return;
                if (document.body.classList.contains("super-mode")) return;

                let box = line.nextElementSibling;

                if (!box || !box.classList.contains("comment-box")) {

                    box = document.createElement("div");
                    box.className = "comment-box";
                    box.innerHTML = `

<textarea class="inputBox" placeholder="Viết bình luận dòng này... (Ctrl+Enter để gửi)"></textarea>
<button class="sendBtn">Gửi</button>

`;

                    line.after(box);

                    const textarea = box.querySelector("textarea");
                    const btn = box.querySelector("button");

                    /* gửi */

                    btn.onclick = send;

                    textarea.addEventListener("keydown", e => {
                        if (e.ctrlKey && e.key === "Enter") send();
                    });

                    async function send() {

                        const text = textarea.value.trim();

                        if (!text) return;

                        await createLineComment(text, index);

                        textarea.value = "";

                    }

                }

            };

        });

        async function createLineComment(text, lineIndex) {

            if (username === "Khách") {
                alert("Bạn cần đăng nhập");
                return;
            }

            await addDoc(
                collection(db, "super_poem", poemID, "comment"),
                {
                    username: username,
                    text: text,
                    lineIndex: lineIndex,
                    created: Date.now(),
                    hearts: 0
                }
            );

        }
        /* load cmt */
        function loadComments() {
            unsubscribeComments = onSnapshot(q, (snapshot) => {

                document.querySelectorAll(".comment-box").forEach(e => e.remove());

                const comments = [];

                snapshot.forEach(docSnap => {
                    comments.push({
                        id: docSnap.id,
                        ...docSnap.data()
                    });
                });

                /* render parent trước */

                comments
                    .filter(c => !c.parent)
                    .forEach(c => {
                        if (c.lineIndex !== undefined) {
                            renderLineComment(c, c.id);
                        }
                    });

                /* render reply sau */

                comments
                    .filter(c => c.parent)
                    .forEach(c => {
                        renderReply(c, c.id);
                    });

            });
        }
        function commentHTML(data) {

            return `
<div>
<a href="profile_cmt.html?username=${data.username}" class="username">
${data.username}
</a>

<small>${new Date(data.created).toLocaleString()}</small>
</div>

<div class="echo-text">${data.text}</div>

<button class="likeBtn">❤️ ${data.hearts || 0}</button>
<button class="replyBtn">Phản hồi</button>
<button class="deleteBtn">Xóa</button>

<div class="replyList"></div>
`;

        }
        function stopAnimation() {

            typeTimers.forEach(t => clearTimeout(t));

            typeTimers = [];

        }
        /* cahyj chư */
        function animatePoem() {

            let delay = 0;

            /* reset timer */


            lines.forEach(line => {

                if (!line.dataset.original) {
                    line.dataset.original = line.innerText;
                }

                const text = line.dataset.original;
                line.style.opacity = 1;

                /* ẨN CHỮ TRƯỚC */
                line.innerHTML = "";

                [...text].forEach((char, i) => {

                    const timer = setTimeout(() => {

                        if (!document.body.classList.contains("super-mode")) return;

                        const span = document.createElement("span");

                        span.innerHTML = char === " " ? "&nbsp;" : char;

                        line.appendChild(span);

                    }, delay + 45 * i);

                    typeTimers.push(timer);

                });

                /* dòng sau chạy khi dòng trước xong */
                delay += text.length * 45 + 350;

            });

        }
        function resetPoem() {

            stopAnimation();

            lines.forEach(line => {

                if (line.dataset.original) {
                    line.innerText = line.dataset.original;
                }

            });

        }

        /* dom dom*/
        function createFireflies() {

            removeFireflies();

            for (let i = 0; i < 100; i++) {

                const f = document.createElement("div");

                f.className = "firefly";

                f.style.left = Math.random() * 100 + "%";
                f.style.bottom = Math.random() * 100 + "px";
                f.style.animationDuration = (2 + Math.random() * 4) + "s";

                document.body.appendChild(f);

                fireflies.push(f);

            }

        }
        function removeFireflies() {

            fireflies.forEach(f => f.remove());

            fireflies = [];

        }
        console.log("poemID:", poemID);
    </script>
    <script src="iframe.js"></script>
