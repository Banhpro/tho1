<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư Viện Thơ</title>

<script src="js/config.js"></script>

<style>

body{
font-family:'Segoe UI', Arial, sans-serif;
margin:0;
padding:0;
background:linear-gradient(to right,#f8f9fa,#eef2f7);
}

h1{
text-align:center;
margin:40px 0 20px;
font-size:38px;
letter-spacing:2px;
}

/* filter */

.filter-wrapper{
width:90%;
margin:auto;
background:white;
padding:30px 30px 50px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
margin-bottom:60px;
}

.search-box{
text-align:center;
margin-bottom:50px;
}

.search-box input{
width:60%;
max-width:420px;
padding:13px 22px;
border-radius:40px;
border:2px solid #6c63ff;
font-size:15px;
outline:none;
}

.filter-bar{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.filter-box{
display:flex;
flex-direction:column;
align-items:center;
}

select{
padding:12px 20px;
border-radius:50px;
border:2px solid #6c63ff;
font-size:14px;
min-width:190px;
}

/* grid */

.poem-container{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
min-height:300px;
}

.poem-card{
background:white;
padding:12px;
text-align:center;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
cursor:pointer;
transition:0.3s;
}

.poem-card:hover{
transform:translateY(-6px);
box-shadow:0 14px 35px rgba(0,0,0,0.15);
}

.poem-card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:14px;
}

/* spotlight */

.poem-title{
margin-top:10px;
font-size:18px;
font-weight:700;
}

.poem-date{
font-size:14px;
color:#444;
margin-top:4px;
}

.poem-user{
font-size:14px;
color:#777;
margin-top:2px;
}

@media(max-width:1024px){
.poem-container{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:600px){
.poem-container{
grid-template-columns:1fr;
}

.search-box input{
width:90%;
}
}

</style>
</head>

<body>

<h1>THƯ VIỆN THƠ</h1>

<div class="filter-wrapper">

<div class="search-box">
<input type="text" id="searchInput" placeholder="Tìm bài thơ...">
</div>

<div class="filter-bar">

<div class="filter-box">
<label>THỂ THƠ</label>
<select id="theTho"></select>
</div>

<div class="filter-box">
<label>THỂ LOẠI</label>
<select id="theLoai"></select>
</div>

<div class="filter-box">
<label>ÂM THANH</label>
<select id="amThanh">
<option value="">Tất cả</option>
<option value="true">Có</option>
<option value="false">Không</option>
</select>
</div>

</div>
</div>

<div id="poemContainer" class="poem-container"></div>

<script type="module">

/* FIREBASE */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain:"banhkietgithunbpoem.firebaseapp.com",
projectId:"banhkietgithunbpoem"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let poems=[];

/* format date */

function formatDate(dateString){

if(!dateString) return "";

const d=new Date(dateString);

const day=String(d.getDate()).padStart(2,"0");
const month=String(d.getMonth()+1).padStart(2,"0");
const year=d.getFullYear();

return `${day}/${month}/${year}`;

}

/* LOAD POEMS */

async function loadPoems(){

const snap=await getDocs(collection(db,"uploads"));

snap.forEach(doc=>{

const data=doc.data();

poems.push({

id:doc.id,
title:data.title,
content:data.content,
image:data.image || "",
audio:!!data.audio,
username:data.username || "Ẩn danh",
date:data.date || data.created || ""

});

});

renderPoems(poems);

}

loadPoems();

/* RENDER */

const container=document.getElementById("poemContainer");
const searchInput=document.getElementById("searchInput");

function renderPoems(data){

container.innerHTML="";

data.forEach(p=>{

const card=document.createElement("div");
card.className="poem-card";

card.innerHTML=`

<img src="${p.image || "img/default.jpg"}">

<div class="poem-title">
${p.title}
${p.audio ? " 🔊" : ""}
</div>

<div class="poem-date">
${formatDate(p.date)}
</div>

<div class="poem-user">
${p.username}
</div>

`;

card.onclick=()=>{

location.href="poem-khach.html?id="+p.id;

};

container.appendChild(card);

});

}

/* SEARCH */

searchInput.addEventListener("input",function(){

const keyword=this.value.toLowerCase();

const filtered=poems.filter(p=>

p.title.toLowerCase().includes(keyword) ||
(p.content || "").toLowerCase().includes(keyword)

);

renderPoems(filtered);

});

</script>

</body>
</html>
