<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bài thơ</title>

<style>

body{
font-family:sans-serif;
max-width:600px;
margin:auto;
}

.comment{
border-bottom:1px solid #ddd;
padding:6px;
}

.username{
color:#2e8b57;
font-weight:bold;
}

#status{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<h2>Bài thơ test</h2>

<p>
Gió chiều qua ngõ nhỏ<br>
Lá rơi bên hiên nhà<br>
Ai còn nhớ ngày qua<br>
Ta chờ nhau rất lâu
</p>

<hr>

<h3>Bình luận</h3>

<input id="username" placeholder="Tên của bạn">

<br><br>

<textarea id="commentInput" placeholder="Viết bình luận..."></textarea>

<br>

<button id="sendBtn">Gửi comment</button>

<div id="status"></div>

<hr>

<div id="commentList"></div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


/* Firebase config */

const firebaseConfig = {
apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain: "banhkietgithunbpoem.firebaseapp.com",
projectId: "banhkietgithunbpoem"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* lấy poem id */

const params = new URLSearchParams(location.search);
const poemID = params.get("id") || "poem1";


const input = document.getElementById("commentInput");
const usernameInput = document.getElementById("username");
const btn = document.getElementById("sendBtn");
const list = document.getElementById("commentList");
const status = document.getElementById("status");


/* gửi comment */

btn.onclick = async ()=>{

const text = input.value.trim();
const username = usernameInput.value.trim() || "Khách";

if(!text){

status.innerText="⚠️ Bạn chưa nhập comment";
status.style.color="orange";

return;
}

try{

await addDoc(
collection(db,"super_poem",poemID,"comment"),
{
username:username,
text:text,
created:Date.now()
}
);

status.innerText="✅ Đã gửi comment thành công";
status.style.color="green";

input.value="";

}catch(err){

status.innerText="❌ Lỗi khi gửi: "+err.message;
status.style.color="red";

}

};


/* realtime load comment */

const q = query(
collection(db,"super_poem",poemID,"comment"),
orderBy("created","asc")
);

onSnapshot(q,(snapshot)=>{

list.innerHTML="";

snapshot.forEach(doc=>{

const data = doc.data();

const div=document.createElement("div");

div.className="comment";

div.innerHTML=`
<span class="username">${data.username}</span>:
${data.text}
`;

list.appendChild(div);

});

},(error)=>{

status.innerText="❌ Lỗi tải comment: "+error.message;
status.style.color="red";

});

</script>

</body>
</html>
