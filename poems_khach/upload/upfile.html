<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Upload Progress</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:40px;
}

.upload-box{
    background:white;
    padding:25px;
    width:380px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

progress{
    width:100%;
    height:20px;
    margin-top:10px;
}

#percent{
    font-weight:bold;
    margin-top:5px;
}

#fileLink{
    margin-top:10px;
    word-break:break-all;
    color:green;
}

</style>
</head>

<body>

<div class="upload-box">

<h3>Upload Image / MP3</h3>

<input type="file" id="fileInput">
<br>

<button id="uploadBtn">Upload</button>

<progress id="progressBar" value="0" max="100"></progress>

<div id="percent">0%</div>

<p id="status"></p>

<div id="fileLink"></div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain:"banhkietgithunbpoem.firebaseapp.com",
projectId:"banhkietgithunbpoem",
storageBucket:"banhkietgithunbpoem.firebasestorage.app",
messagingSenderId:"429631951698",
appId:"1:429631951698:web:8c5f6854de3ad22113a08b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const btn = document.getElementById("uploadBtn");
const progressBar = document.getElementById("progressBar");
const percentText = document.getElementById("percent");
const status = document.getElementById("status");
const fileLink = document.getElementById("fileLink");
btn.onclick = ()=>{
const file = document.getElementById("fileInput").files[0];
if(!file){
status.innerText="Chưa chọn file";
return;
}

status.innerText="Đang upload...";

const url = "https://api.cloudinary.com/v1_1/dp6rc7ghq/upload";

const formData = new FormData();

formData.append("file",file);
formData.append("upload_preset","uploadfilepoem");
formData.append("resource_type","upload");

const xhr=new XMLHttpRequest();

xhr.open("POST",url,true);

xhr.upload.onprogress=function(e){

if(e.lengthComputable){

let percent=Math.round((e.loaded/e.total)*100);

progressBar.value=percent;
percentText.innerText=percent+"%";

}

};

xhr.onload=async function(){

if(xhr.status===200){

const data=JSON.parse(xhr.responseText);
const fileURL=data.secure_url;

await addDoc(collection(db,"uploads"),{
name:file.name,
url:fileURL,
type:file.type,
created:Date.now()
});

status.innerText="Upload thành công";

fileLink.innerHTML=`Link: <a href="${fileURL}" target="_blank">${fileURL}</a>`;

}else{

status.innerText="Upload lỗi";

}

};

xhr.onerror=function(){
status.innerText="Upload thất bại";
};

xhr.send(formData);

};

</script>

</body>
</html>
