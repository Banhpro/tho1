<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Kiểm Duyệt - Bành Vũ Trụ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-cyan: #00f2ff;
            --glow-purple: #bc13fe;
            --accent-gold: #ffcf33;
            --danger-red: #ff0055;
            --success-green: #00ffaa;
            --glass-bg: rgba(0, 15, 30, 0.8);
            --border-light: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); }

        body {
            margin: 0; padding: 0;
            background: #00050a;
            color: #fff;
            font-family: 'Be Vietnam Pro', sans-serif;
            overflow: hidden;
            height: auto; 
          
        }

        /* ----- NỀN VŨ TRỤ ----- */
        .universe-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1b2735 0%, #090a0f 100%);
            background-attachment: fixed;
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border-light) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1; opacity: 0.15; pointer-events: none;
        }

        /* ----- HUD HEADER ----- */
        .hud-header {
            max-width: 1400px; margin: 20px auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-bottom: 2px solid var(--glow-cyan);
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; letter-spacing: 3px;
            color: var(--glow-cyan);
            text-shadow: 0 0 10px var(--glow-cyan);
        }

        /* ----- BỐ CỤC CHÍNH ----- */
        .admin-wrapper {
            max-width: 1400px; margin: 0 auto;
            padding: 0 20px 40px 20px;
            display: grid; grid-template-columns: 400px 1fr; gap: 30px;
        }

        /* ----- DANH SÁCH BÊN TRÁI ----- */
        .signal-feed {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-light);
            border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            max-height: 850px; overflow-y: auto;
        }

        .feed-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid transparent;
            padding: 15px; cursor: pointer; border-radius: 10px;
        }

        .feed-item:hover, .feed-item.active {
            background: rgba(0, 242, 255, 0.1);
            border-left-color: var(--glow-cyan);
            transform: translateX(10px);
        }

        .feed-item .item-title { font-weight: 600; color: var(--glow-cyan); margin-bottom: 5px; font-family: 'Orbitron'; font-size: 14px; }
        .feed-item .item-meta { font-size: 11px; opacity: 0.7; }

        /* ----- MÀN HÌNH CHI TIẾT ----- */
        .analysis-monitor {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-light);
            border-radius: 20px; overflow: hidden;
            display: flex; flex-direction: column; min-height: 800px;
        }

        .hero-banner {
            height: 280px; width: 100%;
            background-size: cover; background-position: center;
            position: relative; border-bottom: 1px solid var(--border-light);
        }

        .hero-banner::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,5,10,1), transparent);
        }

        .detail-body { padding: 40px; flex: 1; }

        .poem-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 38px; color: var(--accent-gold);
            margin: 0 0 15px 0; text-shadow: 0 0 15px rgba(255, 207, 51, 0.3);
        }

        .poem-content {
            white-space: pre-wrap; line-height: 2.2;
            font-size: 19px; color: #f0f0f0;
            margin: 30px 0; padding: 30px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px; border-left: 5px solid var(--glow-purple);
        }

        .illustration-img {
            max-width: 350px; border-radius: 15px;
            border: 2px solid var(--border-light);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        /* ----- THANH LỆNH ----- */
        .command-bar {
            padding: 30px 40px; display: flex; gap: 20px;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid var(--border-light);
        }

        .btn {
            padding: 14px 30px; border-radius: 8px;
            font-family: 'Orbitron', sans-serif; font-size: 13px;
            font-weight: 700; cursor: pointer; letter-spacing: 2px;
            border: none; display: flex; align-items: center; gap: 10px;
        }

        .btn-approve { background: var(--success-green); color: #000; box-shadow: 0 0 20px rgba(0, 255, 170, 0.3); }
        .btn-delete { background: transparent; border: 1px solid var(--danger-red); color: var(--danger-red); }
        .btn-delete:hover { background: var(--danger-red); color: #fff; box-shadow: 0 0 25px rgba(255, 0, 85, 0.4); }

        .clover-tag {
            background: var(--success-green); color: #000;
            padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: bold;
        }

        .empty-view {
            height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; opacity: 0.4; text-align: center;
        }

        #list::-webkit-scrollbar { width: 4px; }
        #list::-webkit-scrollbar-thumb { background: var(--glow-cyan); border-radius: 10px; }

        @media (max-width: 1000px) {
            .admin-wrapper { grid-template-columns: 1fr; }
            .signal-feed { max-height: 400px; }
        }
    </style>
</head>

<body>
    <div class="universe-bg"></div>
    <div class="grid-overlay"></div>

    <div class="hud-header">
        <div class="hud-title">HỆ THỐNG KIỂM DUYỆT BẢN THẢO v3.0</div>
        <div id="adminBadge" style="text-align: right; font-family: 'Orbitron'; font-size: 13px;">
            <span id="uName">ĐANG XÁC MINH...</span><br>
            <span style="color: var(--glow-cyan); font-size: 10px; letter-spacing: 1px;">NHÂN VIÊN VŨ TRỤ</span>
        </div>
    </div>

    <div class="admin-wrapper" id="mainLayout">
        <aside class="signal-feed">
            <div style="font-family: 'Orbitron'; font-size: 12px; color: var(--glow-purple); margin-bottom: 10px; letter-spacing: 2px;">>> TÍN HIỆU ĐANG ĐẾN</div>
            <div id="list"></div>
        </aside>

        <main class="analysis-monitor" id="analysisMonitor">
            <div class="empty-view">
                <div style="font-size: 80px; margin-bottom: 20px;">🛰️</div>
                <p style="font-family: 'Orbitron'; letter-spacing: 3px;">ĐANG ĐỢI CHỌN TÍN HIỆU PHÂN TÍCH...</p>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        // LƯU Ý: Import thêm terminate và clearIndexedDbPersistence nếu cần fix lỗi cache nặng
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, getDoc, initializeFirestore, CACHE_SIZE_UNLIMITED } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem",
            storageBucket: "banhkietgithunbpoem.firebasestorage.app",
            messagingSenderId: "429631951698",
            appId: "1:429631951698:web:8c5f6854de3ad22113a08b"
        };

        const app = initializeApp(firebaseConfig);

        // FIX LỖI BloomFilter: Khởi tạo Firestore với cấu hình sạch
        const db = initializeFirestore(app, {
            experimentalForceLongPolling: true, // Ép sử dụng long-polling để tránh lỗi kết nối/cache
        });

        const auth = getAuth(app);

        let poems = [];
        let userRole = "guest";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    if (snap.exists()) {
                        userRole = snap.data().role || "guest";
                        document.getElementById('uName').innerText = (user.displayName || user.email.split('@')[0]).toUpperCase();
                    }
                } catch (e) { console.error("Lỗi xác thực:", e); }
            }
            loadUploads();
        });

        async function loadUploads() {
            const listContainer = document.getElementById("list");
            listContainer.innerHTML = `<div style="padding:20px; font-size:12px; opacity:0.5;">ĐANG QUÉT TẦN SỐ VŨ TRỤ...</div>`;
            
            try {
                const snap = await getDocs(collection(db, "temp"));
                poems = [];
                listContainer.innerHTML = "";

                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    poems.push({ id, ...data });

                    const item = document.createElement("div");
                    item.className = "feed-item";
                    item.innerHTML = `
                        <div class="item-title">${data.title || "KHÔNG TIÊU ĐỀ"}</div>
                        <div class="item-meta">
                            👤 ${data.username} | 📅 ${new Date(data.created).toLocaleDateString('vi-VN')}
                            ${data.role === 'teacher' ? '<br><span class="clover-tag" style="margin-top:5px; display:inline-block;">🍀 GIÁO VIÊN</span>' : ''}
                        </div>
                    `;
                    item.onclick = () => showPoemDetail(id, item);
                    listContainer.appendChild(item);
                });

                if(poems.length === 0) {
                    listContainer.innerHTML = `<div style="padding:20px; opacity:0.3; font-size:12px;">KHÔNG PHÁT HIỆN TÍN HIỆU MỚI.</div>`;
                }
            } catch (err) {
                listContainer.innerHTML = `<div style="padding:20px; color:red;">LỖI TRUY XUẤT: ${err.name}</div>`;
            }
            sendHeight();
        }

        function showPoemDetail(id, element) {
            const poem = poems.find(p => p.id === id);
            const monitor = document.getElementById("analysisMonitor");

            document.querySelectorAll('.feed-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            const bgUrl = poem.back_img || 'https://images.unsplash.com/photo-1464802686167-b939a6910659?auto=format&fit=crop&w=1200&q=80';

            monitor.innerHTML = `
                <div class="hero-banner" style="background-image: url('${bgUrl}')"></div>
                
                <div class="detail-body">
                    <div style="font-family: 'Fira Code'; font-size: 11px; color: var(--glow-cyan); margin-bottom: 20px; letter-spacing: 1px;">>> BẮT ĐẦU GIẢI MÃ DỮ LIỆU...</div>
                    <h1 class="poem-title">${poem.title || "KHÔNG TIÊU ĐỀ"}</h1>
                    
                    <div style="font-size: 13px; opacity: 0.8; display: flex; gap: 20px; flex-wrap: wrap;">
                        <span>NGƯỜI GỬI: <b style="color:var(--glow-cyan)">${poem.username}</b></span>
                        <span>THỂ THƠ: <b>${poem.theTho || 'Tự do'}</b></span>
                        <span>THỂ LOẠI: <b>${poem.theLoai || 'Chưa phân loại'}</b></span>
                        <span>NGÀY: <b>${new Date(poem.created).toLocaleString('vi-VN')}</b></span>
                    </div>

                    <div class="poem-content">${poem.content}</div>

                    ${poem.image ? `
                        <div style="margin-top:30px;">
                            <label style="font-family:Orbitron; font-size:10px; color:var(--glow-purple); display:block; margin-bottom:15px;">>> HÌNH ẢNH ĐÍNH KÈM</label>
                            <img src="${poem.image}" class="illustration-img">
                        </div>` : ""}

                    ${poem.audio ? `
                        <div style="margin-top:30px;">
                            <label style="font-family:Orbitron; font-size:10px; color:var(--glow-purple); display:block; margin-bottom:15px;">>> DỮ LIỆU ÂM THANH</label>
                            <audio controls src="${poem.audio}" style="width: 100%; border-radius: 50px; filter: hue-rotate(180deg) brightness(1.2);"></audio>
                        </div>` : ""}
                </div>

                ${userRole === 'admin' ? `
                <div class="command-bar">
                    <button class="btn btn-approve" id="btnApprove">✔ DUYỆT BẢN THẢO</button>
                    <button class="btn btn-delete" id="btnDelete">✖ TIÊU HỦY</button>
                </div>` : `
                <div class="command-bar" style="font-size:12px; opacity:0.5; font-style:italic;">
                    Bạn đang ở chế độ quan sát. Chỉ Quản trị viên mới có quyền xử lý bản thảo.
                </div>`}
            `;

            if(userRole === 'admin') {
                document.getElementById('btnApprove').onclick = () => handlePoem(id, 'approve');
                document.getElementById('btnDelete').onclick = () => handlePoem(id, 'delete');
            }
            sendHeight();
        }

        async function handlePoem(id, type) {
            const poem = poems.find(p => p.id === id);
            
            if (type === 'approve') {
                if (!confirm("Bạn có chắc muốn PHÊ DUYỆT bản thảo này lên hệ thống chính không?")) return;
                try {
                    await addDoc(collection(db, "uploads"), { ...poem, status: "approved" });
                    await deleteDoc(doc(db, "temp", id));
                    alert("PHÊ DUYỆT THÀNH CÔNG! Bản thảo đã được đưa vào thư viện.");
                    loadUploads();
                    resetMonitor();
                } catch (e) { alert("Lỗi khi duyệt: " + e.message); }
            } else {
                if (!confirm("HÀNH ĐỘNG NÀY KHÔNG THỂ KHÔI PHỤC! Bạn có chắc muốn TIÊU HỦY bản thảo này?")) return;
                
                // KIỂM TRA CLOUDINARY
                if (poem.folder) {
                    const cloudLink = `https://console.cloudinary.com/console/media_library/folders/${poem.folder}`;
                    if (confirm("Phát hiện dữ liệu trên Cloudinary. Mở trang quản lý Cloudinary để xóa tài nguyên (ảnh/audio) trước?")) {
                        window.open(cloudLink, "_blank");
                    }
                }

                try {
                    await deleteDoc(doc(db, "temp", id));
                    alert("ĐÃ TIÊU HỦY BẢN THẢO VÀ DỮ LIỆU LIÊN QUAN.");
                    loadUploads();
                    resetMonitor();
                } catch (e) { alert("Lỗi khi xóa: " + e.message); }
            }
        }

        function resetMonitor() {
            document.getElementById('analysisMonitor').innerHTML = `
                <div class="empty-view">
                    <div style="font-size: 60px;">✨</div>
                    <p style="font-family: 'Orbitron'; letter-spacing: 2px;">TÍN HIỆU ĐÃ ĐƯỢC XỬ LÝ XONG.</p>
                </div>`;
            sendHeight();
        }

        function sendHeight() {
            setTimeout(() => {
                const height = document.body.scrollHeight + 100;
                window.parent.postMessage(height, "*");
            }, 500);
        }

        window.addEventListener('resize', sendHeight);
    </script>
    <script src="../main_js/iframe.js"></script>
</body>

</html>
