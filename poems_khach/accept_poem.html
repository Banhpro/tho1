<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Kiểm Duyệt - Rừng Nhiệt Đới</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Be+Vietnam+Pro:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --forest-deep: #0a2d1d;
            --leaf-green: #2ecc71;
            --sun-gold: #f1c40f;
            --danger-red: #e74c3c;
            --rain-blue: #3498db;
            --glass-bg: rgba(10, 45, 29, 0.85);
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            transition: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: #05140c;
            color: #ecf0f1;
            font-family: 'Be Vietnam Pro', sans-serif;
            height: auto;
            overflow: hidden;
        }

        /* ----- NỀN RỪNG NHIỆT ĐỚI ----- */
        .forest-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.6);
        }

        /* Hiệu ứng Mưa (Rain Overlay) */
        .rain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            opacity: 0.2;
            animation: rain 1.2s linear infinite;
            pointer-events: none;
        }

        @keyframes rain {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 20px 100px;
            }
        }

        /* Hiệu ứng Nắng (Sunbeams) */
        .sun-beams {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% -10%, rgba(241, 196, 15, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        /* ----- HEADER PHONG CÁCH LÁ CÂY ----- */
        .hud-header {
            max-width: 1400px;
            margin: 20px auto;
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-bottom: 3px solid var(--leaf-green);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .hud-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--leaf-green);
            text-shadow: 0 2px 10px rgba(46, 204, 113, 0.3);
        }

        /* ----- BỐ CỤC CHÍNH ----- */
        .admin-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
        }

        /* ----- DANH SÁCH BÊN TRÁI ----- */
        .signal-feed {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 850px;
            overflow-y: auto;
        }

        .feed-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid transparent;
            padding: 18px;
            cursor: pointer;
            border-radius: 15px;
            transition: transform 0.3s;

        }

        .feed-item:hover,
        .feed-item.active {
            background: rgba(46, 204, 113, 0.15);
            border-left-color: var(--leaf-green);
            transform: translateX(8px);
        }

        .feed-item .item-title {
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .feed-item .item-meta {
            font-size: 12px;
            color: var(--leaf-green);
            opacity: 0.8;
        }

        /* ----- MÀN HÌNH CHI TIẾT ----- */
        .analysis-monitor {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 800px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .hero-banner {
            height: 300px;
            width: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, var(--forest-deep), transparent);
        }

        .detail-body {
            padding: 45px;
            flex: 1;
        }

        .poem-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            color: var(--sun-gold);
            margin: 0 0 15px 0;
            line-height: 1.2;
        }

        .poem-content {
            white-space: pre-wrap;
            line-height: 2.3;
            font-size: 20px;
            color: #fdfdfd;
            margin: 30px 0;
            padding: 35px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border-right: 4px solid var(--leaf-green);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .illustration-img {
            max-width: 400px;
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            margin-top: 20px;
        }

        /* ----- THANH LỆNH ----- */
        .command-bar {
            padding: 35px 45px;
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--border-light);
        }

        .btn {
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .btn-approve {
            background: var(--leaf-green);
            color: var(--forest-deep);
        }

        .btn-approve:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.4);
        }

        .btn-delete {
            background: transparent;
            border: 2px solid var(--danger-red);
            color: var(--danger-red);
        }

        .btn-delete:hover {
            background: var(--danger-red);
            color: #fff;
            box-shadow: 0 0 25px rgba(231, 76, 60, 0.4);
        }

        .clover-tag {
            background: var(--sun-gold);
            color: #000;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .empty-view {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0.5;
            text-align: center;
        }

        #list::-webkit-scrollbar {
            width: 5px;
        }

        #list::-webkit-scrollbar-thumb {
            background: var(--leaf-green);
            border-radius: 10px;
        }

        @media (max-width: 1000px) {
            .admin-wrapper {
                grid-template-columns: 1fr;
            }

            .signal-feed {
                max-height: 400px;
            }
        }
    </style>
</head>

<body>
    <div class="forest-bg"></div>
    <div class="rain-overlay"></div>
    <div class="sun-beams"></div>

    <div class="hud-header">
        <div class="hud-title">🌿 KIỂM DUYỆT BẢN THẢO RỪNG NHIỆT ĐỚI</div>
        <div id="adminBadge" style="text-align: right; font-size: 13px;">
            <span id="uName" style="font-weight: 600; color: var(--leaf-green);">ĐANG XÁC MINH...</span><br>
            <span style="opacity: 0.7; font-size: 11px;">NGƯỜI GIỮ RỪNG</span>
        </div>
    </div>

    <div class="admin-wrapper" id="mainLayout">
        <aside class="signal-feed">
            <div
                style="font-weight: 600; font-size: 12px; color: var(--sun-gold); margin-bottom: 10px; letter-spacing: 1px;">
                🍃 MẦM THƠ ĐANG ĐẾN</div>
            <div id="list"></div>
        </aside>

        <main class="analysis-monitor" id="analysisMonitor">
            <div class="empty-view">
                <div style="font-size: 80px; margin-bottom: 20px;">🎋</div>
                <p style="letter-spacing: 1px;">ĐANG ĐỢI CHỌN MỘT NHÀNH THƠ ĐỂ PHÂN TÍCH...</p>
            </div>
        </main>
    </div>

    <!-- TOÀN BỘ LOGIC GIỮ NGUYÊN 100% -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, getDoc, initializeFirestore } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem",
            storageBucket: "banhkietgithunbpoem.firebasestorage.app",
            messagingSenderId: "429631951698",
            appId: "1:429631951698:web:8c5f6854de3ad22113a08b"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });
        const auth = getAuth(app);

        let poems = [];
        let userRole = "guest";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    if (snap.exists()) {
                        userRole = snap.data().role || "guest";
                        document.getElementById('uName').innerText = (user.displayName || user.email.split('@')[0]).toUpperCase();
                    }
                } catch (e) { console.error("Lỗi xác thực:", e); }
            }
            loadUploads();
        });

        async function loadUploads() {
            const listContainer = document.getElementById("list");
            listContainer.innerHTML = `<div style="padding:20px; font-size:12px; opacity:0.5;">ĐANG TÌM KIẾM TRONG RỪNG SÂU...</div>`;

            try {
                const snap = await getDocs(collection(db, "temp"));
                poems = [];
                listContainer.innerHTML = "";

                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    poems.push({ id, ...data });

                    const item = document.createElement("div");
                    item.className = "feed-item";
                    item.innerHTML = `
                        <div class="item-title">${data.title || "KHÔNG TIÊU ĐỀ"}</div>
                        <div class="item-meta">
                            👤 ${data.username} | 📅 ${new Date(data.created).toLocaleDateString('vi-VN')}
                            ${data.role === 'teacher' ? '<br><span class="clover-tag" style="margin-top:5px; display:inline-block;">🍀 GIÁO VIÊN</span>' : ''}
                        </div>
                    `;
                    item.onclick = () => showPoemDetail(id, item);
                    listContainer.appendChild(item);
                });

                if (poems.length === 0) {
                    listContainer.innerHTML = `<div style="padding:20px; opacity:0.3; font-size:12px;">RỪNG YÊN TĨNH, KHÔNG CÓ BẢN THẢO MỚI.</div>`;
                }
            } catch (err) {
                listContainer.innerHTML = `<div style="padding:20px; color:red;">LỖI TRUY XUẤT: ${err.name}</div>`;
            }
            sendHeight();
        }

        function showPoemDetail(id, element) {
            const poem = poems.find(p => p.id === id);
            const monitor = document.getElementById("analysisMonitor");

            document.querySelectorAll('.feed-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            const bgUrl = poem.back_img || 'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?auto=format&fit=crop&w=1200&q=80';

            monitor.innerHTML = `
                <div class="hero-banner" style="background-image: url('${bgUrl}')"></div>
                
                <div class="detail-body">
                    <div style="font-family: 'Fira Code'; font-size: 11px; color: var(--leaf-green); margin-bottom: 20px; letter-spacing: 1px;">>> ĐANG TRÌNH BÀY BẢN THẢO...</div>
                    <h1 class="poem-title">${poem.title || "KHÔNG TIÊU ĐỀ"}</h1>
                    
                    <div style="font-size: 13px; opacity: 0.8; display: flex; gap: 20px; flex-wrap: wrap;">
                        <span>NGƯỜI GỬI: <b style="color:var(--leaf-green)">${poem.username}</b></span>
                        <span>THỂ THƠ: <b>${poem.theTho || 'Tự do'}</b></span>
                        <span>THỂ LOẠI: <b>${poem.theLoai || 'Chưa phân loại'}</b></span>
                        <span>NGÀY: <b>${new Date(poem.created).toLocaleString('vi-VN')}</b></span>
                    </div>

                    <div class="poem-content">${poem.content}</div>

                    ${poem.image ? `
                        <div style="margin-top:30px;">
                            <label style="font-size:10px; color:var(--leaf-green); display:block; margin-bottom:15px;">>> HÌNH ẢNH MINH HỌA</label>
                            <img src="${poem.image}" class="illustration-img">
                        </div>` : ""}

                    ${poem.audio ? `
                        <div style="margin-top:30px;">
                            <label style="font-size:10px; color:var(--rain-blue); display:block; margin-bottom:15px;">>> ÂM THANH RỪNG GỌI</label>
                            <audio controls src="${poem.audio}" style="width: 100%; border-radius: 50px;"></audio>
                        </div>` : ""}
                </div>

                ${userRole === 'admin' ? `
                <div class="command-bar">
                    <button class="btn btn-approve" id="btnApprove">🍃 DUYỆT BÀN THẢO</button>
                    <button class="btn btn-delete" id="btnDelete">🔥 TIÊU HỦY</button>
                </div>` : `
                <div class="command-bar" style="font-size:12px; opacity:0.5; font-style:italic;">
                    Bạn đang ở chế độ quan sát rừng. Chỉ Quản trị viên mới có quyền duyệt thơ.
                </div>`}
            `;

            if (userRole === 'admin') {
                document.getElementById('btnApprove').onclick = () => handlePoem(id, 'approve');
                document.getElementById('btnDelete').onclick = () => handlePoem(id, 'delete');
            }
requestAnimationFrame(() => {
    setTimeout(sendHeight, 100);
});
monitor.querySelectorAll("img").forEach(img => {
    img.onload = () => {
        sendHeight();
    };
});
        }

        async function handlePoem(id, type) {
            const poem = poems.find(p => p.id === id);

            if (type === 'approve') {
                if (!confirm("Xác nhận đưa bài thơ này chính thức vào rừng (Thư viện)?")) return;
                try {
                    await addDoc(collection(db, "uploads"), { ...poem, status: "approved" });
                    await deleteDoc(doc(db, "temp", id));
                    alert("THÀNH CÔNG! Bài thơ đã nở hoa trong thư viện.");
                    loadUploads();
                    resetMonitor();
                } catch (e) { alert("Lỗi: " + e.message); }
            } else {
                if (!confirm("HÀNH ĐỘNG CỰC ĐOAN! Bạn muốn đốt bỏ bản thảo này?")) return;

                if (poem.folder) {
                    const cloudLink = `https://console.cloudinary.com/console/media_library/folders/${poem.folder}`;
                    if (confirm("Phát hiện tài nguyên trên Cloudinary. Mở trang quản lý để xóa ảnh/âm thanh trước khi xóa dữ liệu?")) {
                        window.open(cloudLink, "_blank");
                    }
                }

                try {
                    await deleteDoc(doc(db, "temp", id));
                    alert("ĐÃ TIÊU HỦY BẢN THẢO.");
                    loadUploads();
                    resetMonitor();
                } catch (e) { alert("Lỗi: " + e.message); }
            }
        }

        function resetMonitor() {
            document.getElementById('analysisMonitor').innerHTML = `
                <div class="empty-view">
                    <div style="font-size: 60px;">🍃</div>
                    <p style="letter-spacing: 1px;">BẢN THẢO ĐÃ ĐƯỢC XỬ LÝ XONG.</p>
                </div>`;
            sendHeight();
        }
        let resizeTimeout;

       
        function sendHeight() {
    const height = document.body.scrollHeight + 50;
    window.parent.postMessage(height, "*");
}

    </script>
    <script src="../main_js/iframe.js"></script>
</body>

</html>
