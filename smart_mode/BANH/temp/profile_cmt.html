<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang tác giả</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f6f8ff, #eef2ff);
            margin: 0;
            padding: 40px;
        }

        /* container */

        .container {
            max-width: 900px;
            margin: auto;
        }

        /* profile card */

        .profile-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;

            animation: fadeUp 0.6s ease;
        }

        /* avatar */

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c8cff, #4b5cff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        /* info */

        .profile-info h2 {
            margin: 0;
            font-size: 28px;
            color: #2c3e50;
        }

        .profile-info p {
            margin: 6px 0;
            color: #6c7a89;
        }

        .stat {
            margin-top: 6px;
            font-weight: 600;
            color: #4b5cff;
        }

        /* poem list */

        .section-title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #34495e;
        }

        /* poem card */

        .poem {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);

            transition: 0.25s;

            opacity: 0;
            transform: translateY(20px);

            animation: fadeUp 0.5s ease forwards;
        }

        .poem:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
        }

        /* title */

        .poem h4 {
            margin: 0 0 8px 0;
            color: #2c3e50;
        }

        /* content */

        .poem p {
            margin: 0;
            color: #555;
            line-height: 1.6;
        }

        /* date */

        .date {
            font-size: 13px;
            color: #999;
            margin-top: 6px;
        }

        /* animations */

        @keyframes fadeUp {

            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        /* BACK BUTTON */

        /* ===== NÚT BACK ===== */

        /* ===== NÚT BACK ===== */

        .back-btn {
            position: fixed;
            top: 15px;
            left: 50px;
            z-index: 999;

            cursor: pointer;
        }

        /* icon */

        .back-btn img {

            width: 46px;

            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.25));

            transition:
                transform 0.25s ease,
                filter 0.25s ease;
        }

        /* hover */

        .back-btn:hover img {

            transform: scale(1.15) translateX(-3px);

            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));

            animation: softShake 0.5s ease;
        }

        /* rung nhẹ */

        @keyframes softShake {

            0% {
                transform: rotate(0deg) scale(1.15);
            }

            25% {
                transform: rotate(-6deg) scale(1.15);
            }

            50% {
                transform: rotate(6deg) scale(1.15);
            }

            75% {
                transform: rotate(-4deg) scale(1.15);
            }

            100% {
                transform: rotate(0deg) scale(1.15);
            }

        }
    </style>

</head>

<body>

    <div class="container">
        <a class="back-btn" href="tho_done_lib.html" target="contentFrame">
            <img src="icon.jpg">
        </a>

        </button>
        <div class="profile-card">

            <div class="avatar" id="avatar">?</div>

            <div class="profile-info">

                <h2 id="name"></h2>

                <p id="role"></p>

                <div class="stat">
                    📜 Đã đăng <span id="count">0</span> bài thơ
                </div>

            </div>

        </div>

        <h3 class="section-title">Những bài thơ đã đăng</h3>

        <div id="poems"></div>

    </div>


    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /* lấy username từ URL */

        const params = new URLSearchParams(location.search);
       const username = params.get("username");
const fixedUsername = username.charAt(0).toUpperCase() + username.slice(1);

        /* elements */

        const nameEl = document.getElementById("name");
        const avatarEl = document.getElementById("avatar");
        const poemsDiv = document.getElementById("poems");
        const countEl = document.getElementById("count");

        /* kiểm tra username */

        if (!username) {

            nameEl.innerText = "Người dùng";
            avatarEl.innerText = "?";

        } else {

            nameEl.innerText = username;
            avatarEl.innerText = username.charAt(0).toUpperCase();

            loadUser();
            loadPoems();

        }

        /* load thông tin user */

        async function loadUser() {

            const q = query(
                collection(db, "users"),
                where("username", "==", fixedUsername)
            );

            const snap = await getDocs(q);

            snap.forEach(doc => {

                const data = doc.data();

                if (data.created) {

                    const date = new Date(data.created)
                        .toLocaleDateString("vi-VN");

                    document.getElementById("role").innerHTML =
                        "📅 Thành viên từ <b>" + date + "</b>";

                }

            });

        }

        /* load bài thơ */

        async function loadPoems() {

    const poemsDiv = document.getElementById("poems");
    poemsDiv.innerHTML = "";

    const q = query(
        collection(db, "uploads"),
        where("username", "==", username),
        where("status", "==", "approved")
    );

    const snap = await getDocs(q);

    document.getElementById("count").innerText = snap.size;

    snap.forEach(doc => {

        const data = doc.data();

        const div = document.createElement("div");
        div.className = "poem";
        div.style.cursor = "pointer";

        div.onclick = () => {
            window.location = "poem_profile_cmt.html?id=" + doc.id;
        };

        div.innerHTML = `
<h4>${data.title}</h4>
<p>${(data.content || "").substring(0,180)}...</p>

<div class="date">
📅 ${new Date(data.created).toLocaleDateString("vi-VN")}
</div>
`;

        poemsDiv.appendChild(div);

    });

}

    </script>
    <script src="iframe.js"></script>
    <script>
    </script>
</body>

</html>
