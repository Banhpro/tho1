<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <title>Xem bài thơ</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f6fa;
        }

        /* container */

        .poem-container {
            max-width: 900px;
            margin: auto;
            padding: 40px;
            position: relative;
        }

        /* background */

        .poem-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.25;
        }

        /* avatar */

        .poem-avatar {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* title */

        .poem-title {
            font-size: 36px;
            margin-bottom: 20px;
        }

        /* content */

        .poem-content {
            font-size: 20px;
            line-height: 1.7;
            white-space: pre-line;
        }

        /* meta */

        .meta {
            margin-top: 30px;
            color: #555;
            font-size: 14px;
        }

        audio {
            margin-top: 20px;
            width: 100%;
        }
    </style>

</head>

<body>

    <div class="poem-container">

        <img id="bg" class="poem-bg">

        <img id="avatar" class="poem-avatar">

        <h1 id="title" class="poem-title"></h1>

        <div id="content" class="poem-content"></div>

        <audio id="audio" controls></audio>

        <div class="meta">

            <div id="theLoai"></div>
            <div id="theTho"></div>

        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        /* firebase config */

        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem",
            storageBucket: "banhkietgithunbpoem.firebasestorage.app",
            messagingSenderId: "429631951698",
            appId: "1:429631951698:web:8c5f6854de3ad22113a08b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /* ===== hàm load bài thơ ===== */

        async function loadPoem() {

            /* lấy bài mới nhất */

            const q = query(
                collection(db, "uploads"),
                orderBy("created", "desc"),
                limit(1)
            );

            const snapshot = await getDocs(q);

            snapshot.forEach(doc => {

                const data = doc.data();

                /* title */

                const title = document.getElementById("title");
                title.innerText = data.title;
                title.style.fontFamily = data.fontTitle;

                /* content */

                const content = document.getElementById("content");
                content.innerText = data.content;
                content.style.fontFamily = data.fontContent;

                /* background */

                if (data.back_img) {

                    const bg = document.getElementById("bg");
                    bg.src = data.back_img;

                }

                /* avatar */

                if (data.image) {

                    document.getElementById("avatar").src = data.image;

                }

                /* audio */

                if (data.audio) {

                    const audio = document.getElementById("audio");
                    audio.src = data.audio;

                }

                /* thể loại */

                document.getElementById("theLoai").innerText =
                    "Thể loại: " + data.theLoai.join(", ");

                /* thể thơ */

                document.getElementById("theTho").innerText =
                    "Thể thơ: " + data.theTho;

            });

        }

        /* chạy */

        loadPoem();

    </script>

</body>

</html>
