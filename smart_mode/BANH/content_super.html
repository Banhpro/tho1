    function loadFont(fontName) {

        if (!fontName) return;

        const id = "font-" + fontName.replace(/\s+/g, "-");

        if (document.getElementById(id)) return;

        const link = document.createElement("link");

        link.id = id;
        link.rel = "stylesheet";

        link.href =
            "https://fonts.googleapis.com/css2?family=" +
            fontName.replace(/ /g, "+") +
            "&display=swap";

        document.head.appendChild(link);

    }

    function animatePoem() {

        let delay = 0;

        stopAnimation();

        lines.forEach(line => {

            if (!line.dataset.original) {
                line.dataset.original = line.innerText;
            }

            const text = line.dataset.original;

            line.innerHTML = "";

            [...text].forEach(char => {

                const timer = setTimeout(() => {

                    if (!document.body.classList.contains("super-mode")) return;

                    const span = document.createElement("span");

                    span.innerHTML = char === " " ? "&nbsp;" : char;

                    span.style.display = "inline-block";
                    span.style.opacity = "0";

                    line.appendChild(span);
                    /* chọn hướng bay ngẫu nhiên */
                    const dx = (Math.random() - 0.5) * 300;
                    const dy = (Math.random() - 0.5) * 200;
                    const rot = (Math.random() - 0.5) * 180;

                    span.animate(
                        [
                            { transform: `translate(${dx}px,${dy}px) rotate(${rot}deg) scale(0.4)`, opacity: 0 },

                            { transform: `translate(${dx * 0.2}px,${dy * 0.2}px) rotate(${rot * 0.2}deg) scale(1.1)`, opacity: 1 },

                            { transform: "translate(0px,0px) rotate(0deg) scale(1.05)" },

                            { transform: "translate(0px,0px) rotate(0deg) scale(1)" }

                        ],
                        {
                            duration: 700,
                            easing: "cubic-bezier(.22,1,.36,1)",
                            fill: "forwards"
                        }
                    );

                }, delay);

                typeTimers.push(timer);

                delay += 90;

            });

            delay += 350;

        });

    }

        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 40;

        const x = Math.cos(angle) * dist + "px";
        const y = Math.sin(angle) * dist + "px";

        fire.style.setProperty("--x", x);
        fire.style.setProperty("--y", y);

        const rect = portal.getBoundingClientRect();

        fire.style.left = rect.left + 35 + "px";
        fire.style.top = rect.top + 35 + "px";

        document.body.appendChild(fire);

        setTimeout(() => fire.remove(), 900);

    }
    let fireLoop = null;

    function startPortalFire() {

        if (fireLoop) return;

        fireLoop = setInterval(() => {

            if (document.body.classList.contains("super-mode")) {
                spawnFire();
            }

        }, 120);

    }

    function stopPortalFire() {

        clearInterval(fireLoop);
        fireLoop = null;

    }
</script>
