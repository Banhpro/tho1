<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Sổ thơ của tôi</title>

    <style>
        /* ===== NỀN ĐÊM ===== */

        body {
            font-family: "Segoe UI", sans-serif;
            background: radial-gradient(circle at 20% 20%, #1b1f3a, #090b1a 70%);
            margin: 0;
            padding: 40px;
            color: #e6e8ff;
            overflow: hidden;
        }

        /* ===== SAO ===== */

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20% 30%, white, transparent),
                radial-gradient(2px 2px at 70% 20%, white, transparent),
                radial-gradient(1.5px 1.5px at 40% 80%, white, transparent),
                radial-gradient(1.5px 1.5px at 90% 60%, white, transparent);
            animation: twinkle 6s infinite alternate;
            pointer-events: none;
        }

        @keyframes twinkle {
            from {
                opacity: .5
            }

            to {
                opacity: 1
            }
        }

        /* ===== TRĂNG ===== */

        .moon {
            position: fixed;
            top: 60px;
            right: 80px;
            width: 90px;
            height: 90px;
            background: #fdf7c2;
            border-radius: 50%;
            box-shadow: 0 0 40px #fff8b5;
            opacity: .9;
        }

        #spacePortal {

            position: fixed;
            bottom: 40px;
            right: 40px;

            width: 70px;
            height: 70px;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            opacity: 0.7;
            transition: 0.4s;

            z-index: 999;

        }

        .portal-core {

            width: 60px;
            height: 60px;

            border-radius: 50%;

            background:
                radial-gradient(circle, #7c8cff, #3a3f8f, #0f1117);

            box-shadow:
                0 0 20px #7c8cff,
                0 0 40px #5b6fff,
                inset 0 0 20px #ffffff33;

            animation: portalSpin 6s linear infinite;

        }

        @keyframes portalSpin {

            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }

        }

        .loading {
            text-align: center;
            margin-top: 80px;
            font-size: 18px;
            color: #cfd3ff;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: .3
            }

            50% {
                opacity: 1
            }

            100% {
                opacity: .3
            }
        }

        /* ===== SAO BĂNG ===== */

        /* ===== SAO BĂNG ===== */

        .comet {
            position: fixed;

            width: 420px;
            /* đuôi dài */
            height: 2px;

            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 1),
                    rgba(230, 240, 255, .95),
                    rgba(200, 220, 255, .7),
                    rgba(170, 200, 255, .4),
                    transparent);

            border-radius: 50px;

            transform: rotate(45deg);

            box-shadow:
                0 0 6px #ffffff,
                0 0 12px #dfe7ff,
                0 0 22px #b7c7ff;

            animation: meteor linear forwards;
            opacity: .95;
        }

        .comet::before {
            content: "";

            position: absolute;
            left: 0;
            top: -3px;

            width: 8px;
            height: 8px;

            background: white;
            border-radius: 50%;

            box-shadow:
                0 0 8px white,
                0 0 16px #dfe7ff,
                0 0 30px #b7c7ff;
        }

        @keyframes meteor {

            0% {
                transform: translate(-200px, -200px) rotate(45deg);
                opacity: 0;
            }

            3% {
                opacity: 1;
            }

            100% {
                transform: translate(120vw, 120vh) rotate(45deg);
                opacity: 0;
            }

        }

        /* ===== LAYOUT ===== */

        .container {
            max-width: 900px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #f5f6ff;
        }

        /* ===== CARD THƠ ===== */

        .poem {
            background: rgba(20, 22, 45, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            transition: .3s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, .05);
        }

        .poem:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, .9);
        }

        .poem h4 {
            margin: 0 0 6px 0;
            color: #ffffff;
        }

        .poem p {
            margin: 0;
            color: #cfd3ff;
            line-height: 1.6;
        }

        .meta {
            margin-top: 8px;
            font-size: 13px;
            color: #9da3ff;
        }

        .saved {
            margin-top: 6px;
            font-style: italic;
            color: #c5c9ff;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: #999;
        }

        /* ===== SAO BAY NGẪU NHIÊN ===== */

        .star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .8;
            animation: starFloat linear infinite;
        }

        @keyframes starFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: .2;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) translateX(40px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div id="spacePortal">
        <div class="portal-core"></div>
    </div>
    <div class="moon"></div>
    <div class="comet"></div>

    <div class="firefly" style="top:60%;left:20%"></div>
    <div class="firefly" style="top:70%;left:70%"></div>
    <div class="firefly" style="top:50%;left:40%"></div>

    <div class="container">

        <h2>📚 Sổ thơ của bạn</h2>
        <div id="loading" class="loading">
            🌙 Đang mở sổ thơ...
        </div>
        <div id="poems"></div>

        <div id="empty" class="empty" style="display:none">
            Bạn chưa lưu bài thơ nào.
        </div>

    </div>
    <script src="../poems/js/poems-data.js"></script>
    <script type="module">

        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

        import {
    getFirestore,
    collection,
    doc,
    getDoc,
    onSnapshot,
    query,
    orderBy
}
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        import {
            getAuth,
            onAuthStateChanged
        }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const poemsDiv = document.getElementById("poems");

        /* kiểm tra đăng nhập */

        onAuthStateChanged(auth, (user) => {

            if (!user) {

                document.getElementById("empty").innerText =
                    "Bạn cần đăng nhập để xem sổ thơ.";

                document.getElementById("empty").style.display = "block";
                return;

            }

            loadSavedPoems(user.uid);

        });

        /* load sổ thơ */

        function loadSavedPoems(uid) {

const ref = query(
    collection(db, "users", uid, "saved_poems"),
    orderBy("savedAt", "desc")
);
            onSnapshot(ref, async (snapshot) => {

                document.getElementById("loading").style.display = "none";

                poemsDiv.innerHTML = "";

                if (snapshot.empty) {

                    document.getElementById("empty").style.display = "block";
                    return;

                }

                document.getElementById("empty").style.display = "none";

                for (const d of snapshot.docs) {

                    const data = d.data();

                    const poemID = data.poemID || d.id;

                    const div = document.createElement("div");

                    div.className = "poem";

                    const poemRef = doc(db, "uploads", poemID);
                    const poemSnap = await getDoc(poemRef);

                    /* ===== bài thơ từ Firebase ===== */

                    if (poemSnap.exists()) {

                        const poem = poemSnap.data();

                        div.onclick = () => {
                            location.href = "KHACH/lib_hu.html?id=" + poemID;
                        };

                        div.innerHTML = `

<h4>${poem.title}</h4>

<p>${poem.content.substring(0, 160)}...</p>

<div class="meta">
✍️ ${poem.author || "Khuyết danh"}
</div>

<div class="saved">
Đã lưu vào ngày ${new Date(data.savedAt).toLocaleDateString("vi-VN")}
</div>

`;

                    }

                    /* ===== bài thơ từ folder ===== */

                    else {

                        const poemInfo = poems.find(p => p.name === poemID);

                        const title = poemInfo ? poemInfo.title : poemID;

                        div.onclick = () => {
                            location.href = "BANH/content_super.html?poem=" + poemID;
                        };

                        div.innerHTML = `

<h4>${title}</h4>

<p>Bài thơ trong thư viện</p>

<div class="saved">
Đã lưu vào ngày ${new Date(data.savedAt).toLocaleDateString("vi-VN")}
</div>

`;

                    }

                    poemsDiv.appendChild(div);

                }

            });

        }
        /* tạo nhiều sao */

        for (let i = 0; i < 120; i++) {

            const s = document.createElement("div");
            s.className = "star";

            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 100 + "vh";

            s.style.animationDuration =
                (20 + Math.random() * 40) + "s";

            document.body.appendChild(s);

        }


        /* tạo nhiều sao băng */

        /* tạo sao băng */

        function createMeteor() {

            const m = document.createElement("div");
            m.className = "comet";

            /* spawn ở phía trên màn hình */

            m.style.left = Math.random() * 100 + "vw";
            m.style.top = (-100 - Math.random() * 200) + "px";

            /* tốc độ */

            m.style.animationDuration =
                (0.9 + Math.random() * 0.8) + "s";

            document.body.appendChild(m);

            setTimeout(() => m.remove(), 2000);

        }

        /* tạo nhiều sao băng */

        setInterval(createMeteor, 300);

        /* spawn liên tục */

        setInterval(createMeteor, 900);
        const portal = document.getElementById("spacePortal");

        portal.onclick = () => {

            document.body.style.transition = "0.8s";

            document.body.style.transform = "scale(1.3)";
            document.body.style.opacity = "0";

            setTimeout(() => {

                history.back();

            }, 600);

        };
    </script>
    <script src="../main_js/iframe.js"></script>

</body>

</html>
