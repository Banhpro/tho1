<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Emotion Public Today</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(120deg,#89f7fe,#66a6ff);
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    margin-top:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.item{
    border-bottom:1px solid #eee;
    padding:12px;
}

.user{
    font-weight:bold;
    color:#6c5ce7;
}

.status{
    padding:10px;
    background:#ffeaa7;
    border-radius:10px;
    margin-bottom:10px;
    text-align:center;
}

img{
    max-width:200px;
    border-radius:10px;
    margin-top:6px;
}

audio{
    width:220px;
    margin-top:6px;
}
</style>
</head>

<body>

<div class="container">
<h2>🌍 Emotion public hôm nay</h2>

<div id="status" class="status">⏳ đang đọc dữ liệu...</div>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collectionGroup,
getDocs
} from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain: "banhkietgithunbpoem.firebaseapp.com",
projectId: "banhkietgithunbpoem",
storageBucket: "banhkietgithunbpoem.firebasestorage.app",
messagingSenderId: "429631951698",
appId: "1:429631951698:web:8c5f6854de3ad22113a08b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const statusBox = document.getElementById("status");

function getTodayPrefix(){

    const now = new Date();

    const day = String(now.getDate()).padStart(2,"0");
    const month = String(now.getMonth()+1).padStart(2,"0");
    const year = now.getFullYear();

    return `${day}-${month}-${year}`;
}

async function loadToday(){

try{

    const prefix = getTodayPrefix();

    const snap = await getDocs(collectionGroup(db,"logs"));

    let count = 0;

    snap.forEach(doc=>{

        const id = doc.id; // ví dụ 18-03-2026_15-34
        const d = doc.data();

        if(!id.startsWith(prefix)) return;
        if(d.privacy !== "public") return;

        count++;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="user">👤 ${d.username} (${d.role})</div>
            <div>${d.text || ""}</div>
            <div>😊 mood: ${d.mood}</div>
            ${d.imgUrl ? `<img src="${d.imgUrl}">` : ``}
            ${d.audioUrl ? `<audio controls src="${d.audioUrl}"></audio>` : ``}
        `;

        list.appendChild(div);
    });

    if(count === 0){
        statusBox.innerHTML = "😶‍🌫️ hôm nay chưa có emotion public";
    }else{
        statusBox.innerHTML = "✅ đã đọc " + count + " emotion hôm nay";
        statusBox.style.background = "#55efc4";
    }

}catch(err){

    console.error(err);
    statusBox.innerHTML = "❌ lỗi quyền firebase hoặc query";
    statusBox.style.background = "#ff7675";
}

}

loadToday();

</script>

</body>
</html>
