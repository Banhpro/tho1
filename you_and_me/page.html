<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Collector PRO</title>

  <style>
    /* Các kiểu dáng và phần style của trang */
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(120deg, #89f7fe, #66a6ff);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      width: 95%;
      max-width: 820px;
      padding: 28px;
      border-radius: 22px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      animation: fade .6s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1
      }
    }

    h2 {
      text-align: center;
      margin-top: 0;
    }

    textarea {
      width: 100%;
      height: 130px;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 12px;
      font-size: 15px;
    }

    .gridMood {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .moodItem {
      background: #f1f3f6;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
    }

    button {
      border: none;
      padding: 11px 16px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
    }

    .mic {
      background: #ff7675;
      color: white
    }

    .rec {
      background: #6c5ce7;
      color: white
    }

    .send {
      background: #00b894;
      color: white;
      width: 100%;
      font-size: 16px
    }

    .skip {
      background: #636e72;
      color: white;
      width: 100%
    }

    .previewImg {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 12px;
    }

    audio {
      width: 100%;
      margin-top: 10px
    }

    .rowBtn {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>🧠 Ghi nhận cảm xúc người dùng</h2>
    <hr>
    <label>🔒 Quyền riêng tư</label>
    <div>
      <label><input type="radio" name="privacy" value="public" checked> 🌍 Công khai</label>
      <label><input type="radio" name="privacy" value="private"> 🔐 Chỉ mình tôi</label>
    </div>
    <label>Mô tả cảm xúc</label>
    <textarea id="text"></textarea>
    <button class="mic" onclick="startSpeech()">🎤 nói để nhập</button>

    <hr>

    <label>🎧 giữ để ghi âm nhanh</label><br>
    <button class="rec" id="holdRec">Giữ để ghi</button>
    <audio id="audioPlayback" controls></audio>

    <hr>

    <label>📷 tải ảnh cảm xúc</label>
    <input type="file" id="imgInput" accept="image/*" />
    <img id="preview" class="previewImg" />

    <hr>

    <label>😶‍🌫️ chọn mood</label>
    <div class="gridMood">
      <label class="moodItem">
        <input type="radio" name="mood" value="happy"> 😊 Vui
      </label>
      <label class="moodItem">
        <input type="radio" name="mood" value="sad"> 😢 Buồn
      </label>
    </div>

    <hr>
    <div id="updateBox"
      style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); justify-content: center; align-items: center;">
      <div style="background:white; padding: 20px; border-radius: 16px; text-align: center; width: 300px">
        <h3>💖 Nhật kí hôm nay</h3>
        <p>Bạn đã ghi rồi, cập nhật lại không?</p>
        <button onclick="confirmUpdate(true)">OK luôn</button>
        <button onclick="confirmUpdate(false)">Thôi</button>
      </div>
    </div>
    <div class="rowBtn">
      <button class="skip" onclick="skipPage()">Bỏ qua</button>
      <button class="send" id="submitEmotion" onclick="confirmSend()">Gửi</button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc,
      query, where, getDocs, deleteDoc, doc, getDoc, setDoc
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
      authDomain: "banhkietgithunbpoem.firebaseapp.com",
      projectId: "banhkietgithunbpoem",
      storageBucket: "banhkietgithunbpoem.firebasestorage.app",
      messagingSenderId: "429631951698",
      appId: "1:429631951698:web:8c5f6854de3ad22113a08b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;

    onAuthStateChanged(auth, user => {
      currentUser = user || null;
    });
    const text = document.getElementById("text");
    const holdRec = document.getElementById("holdRec");
    const imgInput = document.getElementById("imgInput");
    const audioPlayback = document.getElementById("audioPlayback");
    const preview = document.getElementById("preview");
    // ===== util =====
    function cleanText(text) {
      return text.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "")
        .replace(/[^a-z0-9]/g, "");
    }

    // 🔥 public_id overwrite
    function createFolder(username, role) {
      const now = new Date();

      const day = String(now.getDate()).padStart(2, "0");
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const year = now.getFullYear();

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");

      const u = cleanText(username);
      const r = cleanText(role);

      return `emotion/${u}_${r}/${day}-${month}-${year}_${hours}:${minutes}`;
    }

    // 🔥 upload (đã FIX 400)
    async function uploadCloudinary(file, folder) {

      const url = "https://api.cloudinary.com/v1_1/dp6rc7ghq/auto/upload";

      const fd = new FormData();
      fd.append("file", file);
      fd.append("upload_preset", "uploadfilepoem");

      fd.append("folder", folder); // ✅ đúng chuẩn
      fd.append("resource_type", "auto");

      const res = await fetch(url, {
        method: "POST",
        body: fd
      });

      const data = await res.json();

      if (!res.ok) {
        console.error("Cloudinary:", data);
        throw new Error(data.error?.message || "Upload fail");
      }

      return data.secure_url;
    }

    // ===== speech =====
    window.startSpeech = function () {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return alert("trình duyệt không hỗ trợ voice");

      const r = new SR();
      r.lang = "vi-VN";
      r.start();
      r.onresult = e => text.value += e.results[0][0].transcript;
    };

    // ===== record =====
    let mediaRecorder;
    let chunks = [];

    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => {
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = e => chunks.push(e.data);

        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'audio/ogg' });
          chunks = [];
          const url = URL.createObjectURL(blob);
          audioPlayback.src = url;
          audioPlayback.blob = blob;
        };
      })
      .catch(() => console.log("⚠️ không có mic"));

    holdRec.onmousedown = () => {
      if (!mediaRecorder) return alert("⚠️ chưa cấp quyền micro");
      audioPlayback.src = "";
      mediaRecorder.start();
    };

    holdRec.onmouseup = () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
    };

    // ===== image =====
    imgInput.onchange = e => {
      if (e.target.files[0]) {
        preview.src = URL.createObjectURL(e.target.files[0]);
      }
    };

    // ===== nav =====
    window.skipPage = () => location.href = "../index.html";

    // ===== send =====
    window.confirmSend = async function () {

      if (!auth.currentUser) {
        alert("⚠️ chưa đăng nhập");
        return;
      }

      const user = auth.currentUser;

      let username = "guest";
      let role = "user";

      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        const userData = userDoc.data();
        username = userData.username || "guest";
        role = userData.role || "user";
      }

      const t = getTimeKeys();

      const docId =
        `${cleanText(username)}_${cleanText(role)}_${t.dayKey}_${t.timeKey}`;



      // ✅ mood đặt ở đây
      const moodEl = document.querySelector("input[name='mood']:checked");
      const mood = moodEl ? moodEl.value : "";

      if (!mood) {
        alert("⚠️ hãy chọn cảm xúc (vui hoặc buồn)");
        return;
      }

      const privacyEl = document.querySelector("input[name='privacy']:checked");
      const privacy = privacyEl ? privacyEl.value : "public";

      const folder = createFolder(username, role);

      let imgUrl = "";
      let audioUrl = "";

      if (imgInput.files[0]) {
        imgUrl = await uploadCloudinary(imgInput.files[0], folder);
      }

      if (audioPlayback.blob) {
        const audioFile = new File([audioPlayback.blob], "record.ogg", { type: "audio/ogg" });
        audioUrl = await uploadCloudinary(audioFile, folder);
      }

      const data = {
        uid: user.uid,
        username,
        role,
        text: text.value,
        mood,
        imgUrl,
        audioUrl,
        privacy,

        createdAt: new Date(),

        dayKey: t.dayKey,
        weekKey: t.weekKey,
        monthKey: t.monthKey,
        yearKey: t.yearKey
      };


      console.log("DATA SAVE:", data);

      await setDoc(
        doc(db, "emotions", docId),
        data
      );


      alert("✅ lưu thành công");
      location.reload();
    };
    let resolveUpdate;
    // Hàm để hiển thị hộp thoại xác nhận cập nhật
    function showUpdateBox() {
      document.getElementById("updateBox").style.display = "flex";

      return new Promise(res => {
        resolveUpdate = res;
      });
    }

    // Hàm để xử lý lựa chọn cập nhật của người dùng
    window.confirmUpdate = function (choice) {
      document.getElementById("updateBox").style.display = "none";
      resolveUpdate(choice);
    };
    function getTimeKeys() {

      const now = new Date();

      const day = String(now.getDate()).padStart(2, "0");
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const year = now.getFullYear();

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");

      // ⭐ tính tuần trong năm
      const firstDay = new Date(now.getFullYear(), 0, 1);
      const pastDays = Math.floor((now - firstDay) / 86400000);
      const week = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);

      return {
        dayKey: `${day}-${month}-${year}`,
        monthKey: `${month}-${year}`,
        yearKey: `${year}`,
        weekKey: `W${week}-${year}`,
        timeKey: `${hours}-${minutes}`
      };
    }


    function getTimeKey() {
      const now = new Date();

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");

      return `${hours}-${minutes}`;
    }
  </script>
  <script src="../main_js/iframe.js"></script>

</body>

</html>
