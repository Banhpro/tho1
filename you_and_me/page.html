<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Emotion Forest</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ---------------- GLOBAL ---------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

overflow:hidden;

transition:background 0.6s,color 0.6s;

}

/* ---------------- THEMES ---------------- */

:root{

--sky:#cfeeff;
--forest:#dfffd9;
--river:#6ec6ff;

--panel:#fffef6;
--text:#243434;

--button:#5cc4a5;
--buttonHover:#44b594;

}

.dark{

--sky:#0e1b2b;
--forest:#1c3a3a;
--river:#2c7da0;

--panel:#1e2a34;
--text:#e6f3f3;

--button:#48bfa2;
--buttonHover:#37a18a;

}

body{

background:
linear-gradient(
180deg,
var(--sky),
var(--forest)
);

color:var(--text);

}

/* ---------------- CANVAS RIVER ---------------- */

canvas{

position:absolute;
bottom:0;
left:0;
width:100%;

}

/* ---------------- PANEL ---------------- */

.panel{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:500px;

background:var(--panel);

border-radius:24px;

padding:26px;

box-shadow:
0 20px 60px rgba(0,0,0,.25);

transition:background .6s,color .6s;

}

/* ---------------- TITLE ---------------- */

h1{

text-align:center;

margin-bottom:12px;

}

/* ---------------- TEXTAREA ---------------- */

textarea{

width:100%;
height:110px;

border-radius:14px;

border:1px solid #ddd;

padding:12px;

resize:none;

transition:.3s;

}

textarea:focus{

outline:none;

border-color:var(--button);

box-shadow:0 0 0 3px rgba(90,200,150,.2);

}

/* ---------------- BUTTONS ---------------- */

.controls{

display:flex;

gap:10px;

margin-top:10px;

}

button{

flex:1;

border:none;

border-radius:12px;

padding:11px;

cursor:pointer;

font-weight:600;

background:var(--button);

color:white;

transition:.25s;

}

/* hover */

button:hover{

background:var(--buttonHover);

transform:translateY(-2px);

box-shadow:0 6px 14px rgba(0,0,0,.2);

}

/* active */

button:active{
transform:scale(.95);
}

/* recording */

.recording{
background:#ff6b6b;
}

/* delete button */

.deleteBtn{

margin-top:8px;

background:#ff7a7a;

}

.deleteBtn:hover{
background:#ff4d4d;
}

/* ---------------- PLAYER ---------------- */

.player{

display:none;

margin-top:10px;

}

/* ---------------- UPLOAD ---------------- */

.upload{

margin-top:12px;

border:2px dashed #b7e0cf;

border-radius:12px;

padding:10px;

text-align:center;

cursor:pointer;

transition:.3s;

}

.upload:hover{
background:#f0fff7;
}

.preview{

max-width:100%;

margin-top:8px;

border-radius:10px;

}

/* ---------------- MOODS ---------------- */

.moods{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

margin-top:12px;

}

.mood{

display:flex;

flex-direction:column;

align-items:center;

background:#f0f7f5;

padding:10px;

border-radius:16px;

cursor:pointer;

transition:.2s;

font-size:22px;

}

.mood span{

font-size:12px;

margin-top:3px;

}

.mood:hover{

transform:scale(1.1);

background:#dff5ee;

}

.mood input{
display:none;
}

.mood input:checked + div{

background:var(--button);

color:white;

border-radius:12px;

padding:6px;

}

/* ---------------- FOOTER ---------------- */

.footer{

display:flex;

gap:10px;

margin-top:14px;

}

.send{
background:#3dbb8a;
}

.send:hover{
background:#2ea475;
}

.cancel{
background:#b0bec5;
}

.cancel:hover{
background:#90a4ae;
}

/* ---------------- THEME BUTTON ---------------- */

.theme{

position:absolute;

top:15px;

right:15px;

width:44px;

height:44px;

border-radius:50%;

font-size:18px;

}

/* ---------------- LEAVES ---------------- */

.leaf{

position:absolute;

font-size:18px;

opacity:.8;

animation:leafFall linear infinite;

}

@keyframes leafFall{

0%{transform:translateY(-40px) rotate(0deg)}

100%{transform:translateY(110px) rotate(360deg)}

}

</style>

</head>

<body>

<button class="theme" id="themeBtn">🌙</button>

<canvas id="river"></canvas>

<div class="panel">

<h1>🌿 Emotion Forest</h1>

<textarea id="text" placeholder="Hôm nay bạn cảm thấy thế nào..."></textarea>

<div class="controls">

<button onclick="startSpeech()">🎤 Voice</button>

<button id="recBtn">🎙 Record</button>

</div>

<div class="player" id="audioPlayer">

<audio id="audioPlayback" controls></audio>

<button class="deleteBtn" onclick="deleteAudio()">🗑 Xóa ghi âm</button>

</div>

<div class="upload">

<input type="file" id="imgInput" accept="image/*">

<div>📷 Tải ảnh cảm xúc</div>

<img id="preview" class="preview">

<button class="deleteBtn" onclick="deleteImage()">🗑 Xóa ảnh</button>

</div>

<div class="moods">

<label class="mood">
<input type="checkbox">
<div>😊<span>Vui vẻ</span></div>
</label>

<label class="mood">
<input type="checkbox">
<div>😢<span>Buồn</span></div>
</label>

<label class="mood">
<input type="checkbox">
<div>😫<span>Căng thẳng</span></div>
</label>

<label class="mood">
<input type="checkbox">
<div>🥰<span>Yêu thương</span></div>
</label>

<label class="mood">
<input type="checkbox">
<div>😡<span>Tức giận</span></div>
</label>

<label class="mood">
<input type="checkbox">
<div>😴<span>Mệt mỏi</span></div>
</label>

</div>

<div class="footer">

<button class="cancel" onclick="resetForm()">Cancel</button>

<button class="send" onclick="confirmSend()">Send</button>

</div>

</div>

<script>

/* THEME SWITCH */

const themeBtn=document.getElementById("themeBtn")

themeBtn.onclick=()=>{

document.body.classList.toggle("dark")

themeBtn.innerText=
document.body.classList.contains("dark")
? "☀"
: "🌙"

}

/* RIVER */

const canvas=document.getElementById("river")
const ctx=canvas.getContext("2d")

let w,h

function resize(){

w=canvas.width=window.innerWidth
h=canvas.height=canvas.offsetHeight

}

resize()
window.addEventListener("resize",resize)

let offset=0

function draw(){

ctx.clearRect(0,0,w,h)

ctx.fillStyle=getComputedStyle(document.body)
.getPropertyValue("--river")

ctx.fillRect(0,0,w,h)

ctx.strokeStyle="rgba(255,255,255,.4)"

for(let i=0;i<5;i++){

ctx.beginPath()

for(let x=0;x<w;x++){

let y=Math.sin((x+offset)/120)*10 + h/2 + i*8

ctx.lineTo(x,y)

}

ctx.stroke()

}

offset+=2

requestAnimationFrame(draw)

}

draw()

/* SPEECH */

function startSpeech(){

const SR=window.SpeechRecognition||window.webkitSpeechRecognition

const r=new SR()

r.lang="vi-VN"

r.start()

r.onresult=e=>{
text.value+=e.results[0][0].transcript
}

}

/* RECORD */

let mediaRecorder
let chunks=[]

navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{

mediaRecorder=new MediaRecorder(stream)

mediaRecorder.ondataavailable=e=>chunks.push(e.data)

mediaRecorder.onstop=()=>{

const blob=new Blob(chunks,{type:'audio/ogg'})

chunks=[]

audioPlayback.src=URL.createObjectURL(blob)

audioPlayer.style.display="block"

}

})

recBtn.onclick=()=>{

recBtn.classList.add("recording")

mediaRecorder.start()

setTimeout(()=>{

mediaRecorder.stop()

recBtn.classList.remove("recording")

},4000)

}

/* DELETE AUDIO */

function deleteAudio(){

audioPlayback.src=""

audioPlayer.style.display="none"

}

/* IMAGE */

imgInput.onchange=e=>{

preview.src=URL.createObjectURL(e.target.files[0])

}

/* DELETE IMAGE */

function deleteImage(){

preview.src=""

imgInput.value=""

}

/* RESET */

function resetForm(){

if(confirm("Bạn muốn hủy và xóa dữ liệu?")){

text.value=""

deleteImage()

deleteAudio()

}

}

/* SEND */

function confirmSend(){

if(confirm("Xác nhận gửi cảm xúc?")){

alert("Đã gửi thành công 🌿")

resetForm()

}

}

/* LEAVES */

for(let i=0;i<10;i++){

let leaf=document.createElement("div")

leaf.className="leaf"

leaf.innerHTML="🍃"

leaf.style.left=Math.random()*100+"vw"

leaf.style.animationDuration=8+Math.random()*8+"s"

document.body.appendChild(leaf)

}

</script>
    <script src="../main_js/iframe.js"></script>

</body>
</html>
