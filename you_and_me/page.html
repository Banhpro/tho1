<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khu Rừng Kỷ Niệm 🌲✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Patrick+Hand&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #6c5ce7;
      --secondary: #00b894;
      --paper: rgba(255, 255, 255, 0.85);
      --text: #2d3436;
    }

    /* TRIỆT TIÊU THANH CUỘN NỘI BỘ TUYỆT ĐỐI */
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: 'Patrick Hand', cursive;
      overflow: hidden !important;
      /* Không cho phép hiện thanh cuộn trong iframe */
      height: auto;
      background: transparent;
    }

    .bg-fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('forest.jpg') no-repeat center center fixed;
      background-size: cover;
      z-index: -3;
    }

    .rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      animation: rain 0.3s linear infinite;
      z-index: -2;
      pointer-events: none;
      opacity: 0.4;
    }

    @keyframes rain {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 20% 100%;
      }
    }

    .sun-rays {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 255, 224, 0.2) 0%, transparent 50%, rgba(255, 255, 224, 0.1) 100%);
      z-index: -1;
      pointer-events: none;
      animation: sunshine 5s ease-in-out infinite alternate;
    }

    @keyframes sunshine {
      from {
        opacity: 0.3;
        transform: scale(1);
      }

      to {
        opacity: 0.7;
        transform: scale(1.1);
      }
    }

    .container {
      background: var(--paper);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      width: 90%;
      max-width: 550px;
      padding: 30px;
      border-radius: 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin: 20px auto;
      /* Margin nhỏ để tránh hụt chiều cao */
    }

    h2 {
      text-align: center;
      font-family: 'Dancing Script', cursive;
      font-size: 2.5em;
      color: #1e3799;
      margin-top: 0;
      margin-bottom: 15px;
    }

    .section {
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.5);
      padding: 12px;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #2c3e50;
      font-size: 1.1em;
    }

    textarea {
      width: 100%;
      height: 100px;
      border: none;
      border-radius: 20px;
      padding: 15px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 1.1em;
      background: rgba(255, 255, 255, 0.9);
      resize: none;
      outline: none;
      overflow: hidden;
      transition: height 0.15s ease;

    }

    /* HIỆU ỨNG NÚT MICROPHONE KHI ĐANG NÓI */
    .mic-btn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: #0984e3;
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mic-btn.speaking {
      background: #95a5a6 !important;
      /* Chuyển sang màu xám */
      opacity: 0.5;
      /* Làm mờ đi */
      transform: scale(0.9);
      pointer-events: none;
      /* Tránh bấm liên tục khi đang nhận diện */
    }

    #holdRec {
      background: #eb4d4b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
      touch-action: none !important;
    }

    .previewImg {
      width: 100%;
      max-height: none;
      object-fit: contain;
      border-radius: 15px;
      display: none;
      margin-top: 10px;
      border: 3px solid white;
    }

    .rowBtn {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 15px;
      margin-top: 15px;
    }

    button.send {
      background: linear-gradient(to right, #00b894, #55efc4);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 20px;
      font-size: 1.2em;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button.send:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 20px rgba(0, 184, 148, 0.4);
      filter: brightness(1.1);
    }

    button.skip {
      background: rgba(0, 0, 0, 0.05);
      color: #636e72;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button.skip:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
    }

    .file-label {
      display: block;
      background: #fff;
      padding: 10px;
      text-align: center;
      border-radius: 15px;
      border: 2px dashed #74b9ff;
      cursor: pointer;
      color: #0984e3;
    }

    .moodItem {
      flex: 1;
      text-align: center;
      background: white;
      padding: 10px;
      border-radius: 15px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .moodItem:has(input:checked) {
      border: 2px solid #f1c40f;
      background: #fff9db;
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3);
    }
  </style>
</head>

<body>
  <div class="bg-fixed"></div>
  <div class="rain"></div>
  <div class="sun-rays"></div>

  <div class="container" id="mainContainer">
    <h2>🍃 Nhật Ký Rừng Xanh</h2>

    <div id="diaryForm">
      <div class="section" style="display: flex; justify-content: space-between; align-items: center;">
        <label style="margin-bottom:0">🔒 Chế độ hiển thị:</label>
        <div style="display: flex; gap: 10px;">
          <label style="font-weight:normal; cursor:pointer"><input type="radio" name="privacy" value="public" checked>
            🌍</label>
          <label style="font-weight:normal; cursor:pointer"><input type="radio" name="privacy" value="private">
            🔐</label>
        </div>
      </div>

      <div class="section">
        <label>💭 Tâm sự với lá rừng...</label>
        <div style="position: relative;">
          <textarea id="text" placeholder="Hôm nay lòng bạn có mưa hay có nắng?"></textarea>
          <button class="mic-btn" id="micBtn" onclick="startSpeech()">🎤</button>
        </div>
      </div>

      <div class="section" style="display: flex; align-items: center; gap: 15px;">
        <label style="margin-bottom:0">🎙️ Ghi âm:</label>
        <button id="holdRec">Giữ để nói</button>
        <audio id="audioPlayback" controls style="display:none; height: 35px;"></audio>
      </div>

      <div class="section">
        <label>📸 Chụp lại khoảnh khắc</label>
        <label class="file-label" for="imgInput">Gửi một tấm ảnh vào rừng...</label>
        <input type="file" id="imgInput" accept="image/*" style="display:none" />
        <img id="preview" class="previewImg" />
      </div>

      <div class="section">
        <label>🎭 Cảm xúc hiện tại</label>
        <div class="gridMood" style="display: flex; gap: 10px;">
          <label class="moodItem">
            <input type="radio" name="mood" value="happy" style="display:none">
            <span style="font-size:1.5em; display:block">☀️</span> Vui vẻ
          </label>
          <label class="moodItem">
            <input type="radio" name="mood" value="sad" style="display:none">
            <span style="font-size:1.5em; display:block">🌧️</span> Trầm tư
          </label>
        </div>
      </div>

      <div class="rowBtn">
        <button class="skip" onclick="skipPage()">Để sau</button>
        <button class="send" id="submitEmotion" onclick="confirmSend()">Gửi vào mây trời ✨</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
      authDomain: "banhkietgithunbpoem.firebaseapp.com",
      projectId: "banhkietgithunbpoem",
      storageBucket: "banhkietgithunbpoem.firebasestorage.app",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

   onAuthStateChanged(auth, async user => {
  if (user) {
    const t = getTimeKeys();
    const q = query(collection(db, "emotions"), where("uid", "==", user.uid), where("dayKey", "==", t.dayKey));
    const querySnapshot = await getDocs(q);

    if (!querySnapshot.empty) {
      document.getElementById("mainContainer").innerHTML = `
        <h2>🍃 Nhật Ký Rừng Xanh</h2>
        <div id="contentFrame" class="section" style="text-align:center; padding: 40px 20px;">
          <p style="font-size: 1.4em; color: #1e3799; line-height: 1.6;">
            Bạn đã viết nhật ký hôm nay rồi,<br>không cần phải viết lại đâu, ahaha! ✨
          </p>
          <button class="send" onclick="window.top.location.replace('../index.html')">
            Quay lại khu rừng
          </button>
        </div>
      `;
      if (typeof sendHeight === "function") sendHeight();
    }
  }
});
    // HÀM TÍNH CHIỀU CAO THỰC TẾ VÀ GỬI CHO PAGE CHA
    function sendHeight() {
      // Dùng offsetHeight của body để lấy chính xác kích thước nội dung đang hiển thị
      const height = document.body.offsetHeight;
      window.parent.postMessage(height, "*");
    }

    const preview = document.getElementById("preview");
    const audioPlayback = document.getElementById("audioPlayback");
    preview.onload = () => sendHeight();
    audioPlayback.onloadedmetadata = () => sendHeight();

    const imgInput = document.getElementById("imgInput");
    imgInput.onchange = e => {
      if (e.target.files[0]) {
        preview.src = URL.createObjectURL(e.target.files[0]);
        preview.style.display = "block";
      }
    };

    // Theo dõi mọi thay đổi trong DOM để cập nhật chiều cao iframe liên tục
    const observer = new MutationObserver(() => sendHeight());
    observer.observe(document.body, { childList: true, subtree: true });

    window.addEventListener("load", () => { setTimeout(sendHeight, 500); });

    const text = document.getElementById("text");
    function autoResize() {
      const minHeight = 100;

      text.style.height = "auto";

      if (text.scrollHeight > minHeight) {
        text.style.height = text.scrollHeight + "px";
      } else {
        text.style.height = minHeight + "px";
      }

      sendHeight(); // cập nhật iframe
    }

    text.addEventListener("input", autoResize);
    const holdRec = document.getElementById("holdRec");
    const micBtn = document.getElementById("micBtn");

    function cleanText(text) { return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "").replace(/[^a-z0-9]/g, ""); }
    function getTimeKeys() {
      const now = new Date();
      return {
        dayKey: `${String(now.getDate()).padStart(2, "0")}-${String(now.getMonth() + 1).padStart(2, "0")}-${now.getFullYear()}`,
        timeKey: `${String(now.getHours()).padStart(2, "0")}-${String(now.getMinutes()).padStart(2, "0")}`
      };
    }

    async function uploadCloudinary(file, folder) {
      const fd = new FormData();
      fd.append("file", file);
      fd.append("upload_preset", "uploadfilepoem");
      fd.append("folder", folder);
      const res = await fetch("https://api.cloudinary.com/v1_1/dp6rc7ghq/auto/upload", { method: "POST", body: fd });
      return (await res.json()).secure_url;
    }

    // SPEECH RECOGNITION VỚI HIỆU ỨNG NÚT
    window.startSpeech = function () {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return alert("Trình duyệt không hỗ trợ.");
      const r = new SR();
      r.lang = "vi-VN";

      // Khi bắt đầu nói: Thêm hiệu ứng
      r.onstart = () => {
        micBtn.classList.add("speaking");
      };

      // Khi kết thúc hoặc có lỗi: Xóa hiệu ứng
      r.onend = () => micBtn.classList.remove("speaking");
      r.onerror = () => micBtn.classList.remove("speaking");

      r.onresult = e => {
        text.value += e.results[0][0].transcript;
        sendHeight();
      }
      r.start();
    };

    let mediaRecorder, chunks = [];
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'audio/ogg' });
        chunks = [];
        audioPlayback.src = URL.createObjectURL(blob);
        audioPlayback.blob = blob;
        audioPlayback.style.display = "block";
        sendHeight();
      };
    });

    function startRecording(e) { if (e.cancelable) e.preventDefault(); if (mediaRecorder && mediaRecorder.state === "inactive") { mediaRecorder.start(); holdRec.innerText = "Ghi âm..."; } }
    function stopRecording(e) { if (e.cancelable) e.preventDefault(); if (mediaRecorder && mediaRecorder.state !== "inactive") { mediaRecorder.stop(); holdRec.innerText = "Giữ để nói"; } }
    holdRec.oncontextmenu = (e) => { e.preventDefault(); return false; };
    holdRec.onmousedown = startRecording; holdRec.onmouseup = stopRecording; holdRec.onmouseleave = stopRecording;
    holdRec.addEventListener('touchstart', startRecording, { passive: false });
    holdRec.addEventListener('touchend', stopRecording, { passive: false });

    window.skipPage = () => location.href = "../index.html";

    window.confirmSend = async function () {
      if (!auth.currentUser) return alert("Hãy đăng nhập trước nhé!");

      if (!text.value.trim()) return alert("🍃 Bạn ơi, đừng để trống tâm sự nhé! Hãy viết vài lời với rừng xanh nào... ✨");
      if (!imgInput.files[0]) return alert("📸 Rừng xanh muốn ngắm nhìn khoảnh khắc của bạn. Hãy gửi kèm một tấm ảnh nhé! 🌸");

      const moodEl = document.querySelector("input[name='mood']:checked");
      if (!moodEl) return alert("🎭 Chọn một tâm trạng cho hôm nay nhé!");

      const btn = document.getElementById("submitEmotion");
      btn.innerText = "Đang gửi..."; btn.disabled = true;

      try {
        const user = auth.currentUser;
        const userDoc = await getDoc(doc(db, "users", user.uid));
        const { username = "guest", role = "user" } = userDoc.exists() ? userDoc.data() : {};
        const t = getTimeKeys();
        const folder = `emotion/${cleanText(username)}_${cleanText(role)}/${t.dayKey}_${t.timeKey}`;

        let imgUrl = await uploadCloudinary(imgInput.files[0], folder);
        let audioUrl = audioPlayback.blob ? await uploadCloudinary(new File([audioPlayback.blob], "rec.ogg"), folder) : "";

        const data = {
          uid: user.uid, username, role, text: text.value, mood: moodEl.value,
          imgUrl, audioUrl, privacy: document.querySelector("input[name='privacy']:checked").value,
          createdAt: new Date(), ...t,
          like: 0, heart: 0, sad: 0, comments: []
        };

        await setDoc(doc(db, "emotions", `${cleanText(username)}_${cleanText(role)}_${t.dayKey}_${t.timeKey}`), data);
        alert("✨ Tâm sự đã được gửi vào mây trời thành công!");
        location.reload();
      } catch (err) { alert("Lỗi: " + err.message); btn.disabled = false; btn.innerText = "Gửi vào mây trời ✨"; }
    };
  </script>
</body>

</html>
