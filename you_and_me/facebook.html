<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Khu Rừng Cảm Xúc Hôm Nay 🌿</title>

  <style>
    :root {
      /* Tông màu rừng ban mai sáng sủa */
      --forest-bg: #f0fdf4; 
      --forest-accent: #166534;
      --leaf-light: #4ade80;
      --text-main: #064e3b;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* Background xanh lá nhạt tươi sáng */
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
      color: var(--text-main);
    }

    /* Hiệu ứng tia nắng nhẹ */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.8) 0%, transparent 40%);
      pointer-events: none;
      z-index: 1;
    }

    h1 {
      margin-top: 40px;
      margin-bottom: 30px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--forest-accent);
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
      animation: floatWind 5s ease-in-out infinite;
      transition: .3s;
      cursor: default;
      z-index: 10;
    }

    @keyframes floatWind {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    h1:hover {
      animation: shake .35s linear infinite;
      color: #10b981;
    }

    .deck {
      position: relative;
      width: 1000px;
      height: 550px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
    }

    /* ⭐ Card thiết kế gọn gàng, tươi sáng */
    .card {
      position: absolute;
      width: 240px;
      height: 360px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
      transform-origin: bottom center;
      border: 2px solid white;
    }

    .card:hover {
      transform: translateY(-60px) scale(1.1) rotate(0deg) !important;
      z-index: 500;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.15);
    }

    .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: .85;
      transition: 0.5s;
    }

    .glass {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(3px);
      background: linear-gradient(to bottom, transparent 40%, rgba(255, 255, 255, 0.4) 100%);
    }

    /* ⭐ Slogan (Giữ nguyên) */
    .slogan {
      position: absolute;
      left: 15px;
      right: 15px;
      bottom: 25px;
      font-size: 13px;
      line-height: 1.5;
      color: #111;
      font-weight: 500;
      font-style: italic;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
      border-left: 3px solid #166534;
      padding-left: 10px;
    }

    .inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: .8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flip .inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
    }

    .back {
      background: url("sunrain.jpg");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      color: #fff;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      transform: rotateY(180deg);
    }

    .card.focus {
      left: 50% !important;
      top: 40% !important;
      transform: translate(-50%, -50%) scale(1.3) rotate(0deg) !important;
      z-index: 999;
    }

    /* Hiệu ứng lá rụng (màu xanh tươi) */
    .leaf-particle {
      position: absolute;
      color: #22c55e;
      opacity: 0.4;
      user-select: none;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 2;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      20% { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0) }
      25% { transform: translateX(1px) }
      75% { transform: translateX(-1px) }
    }
  </style>
</head>

<body>

  <h1>Những chiếc cảm xúc hôm nay 🌿</h1>
  <div class="deck" id="deck"></div>

  <script>
    // Tạo lá bay
    for (let i = 0; i < 12; i++) {
      const leaf = document.createElement('div');
      leaf.className = 'leaf-particle';
      leaf.innerHTML = '🍃';
      leaf.style.left = Math.random() * 100 + 'vw';
      leaf.style.fontSize = (Math.random() * 20 + 15) + 'px';
      leaf.style.animationDuration = (Math.random() * 10 + 7) + 's';
      leaf.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(leaf);
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      query, 
      getDocs, 
      orderBy, 
      where, 
      Timestamp 
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "banhkietgithunbpoem.firebaseapp.com",
      projectId: "banhkietgithunbpoem"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const deck = document.getElementById("deck");

    async function load() {
      // --- LOGIC LỌC THEO NGÀY HÔM NAY ---
      const now = new Date();
      // Bắt đầu ngày (00:00:00)
      const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
      // Kết thúc ngày (23:59:59)
      const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);

      // Truy vấn Firebase có lọc theo khoảng thời gian
      const q = query(
        collection(db, "emotions"),
        where("createdAt", ">=", Timestamp.fromDate(startOfDay)),
        where("createdAt", "<=", Timestamp.fromDate(endOfDay)),
        orderBy("createdAt", "desc")
      );

      const snap = await getDocs(q);

      let arr = [];
      snap.forEach(d => {
        const e = d.data();
        if (e.privacy !== "public") return;
        arr.push({ id: d.id, e });
      });

      if (arr.length === 0) {
        deck.innerHTML = `<p style="color: #166534; font-style: italic;">Hôm nay chưa có chiếc cảm xúc nào được gửi lại...</p>`;
        return;
      }

      const total = arr.length;
      const spread = 85; 
      const center = 500;

      arr.forEach((obj, i) => {
        const angle = (i - (total / 2)) * 6;
        const left = center + (i - (total / 2)) * spread - 120;
        const offsetTop = Math.abs(i - (total / 2)) * 12;

        const mood = (obj.e.mood || "").toLowerCase();
        let img = "sun.jpg";
        if (mood.includes("buồn") || mood.includes("sad")) img = "rain.jpg";

        let username = obj.e.username || "A";
        if (username.length > 8) username = username.charAt(0);

        const card = document.createElement("div");
        card.className = "card";
        card.style.left = left + "px";
        card.style.top = (80 + offsetTop) + "px";
        card.style.transform = `rotate(${angle}deg)`;

        card.innerHTML = `
          <div class="inner">
            <div class="face front">
                <div class="bg" style="background-image:url(${img})"></div>
                <div class="glass"></div>
                <div class="slogan">
                "Hãy thích một cuộc sống<br>
                và sống một cuộc sống mình thích"<br>
                <small style="opacity:0.6">---NTK---</small>
                </div>
            </div>
            <div class="face back">
                ${username}
            </div>
          </div>
        `;

        card.onclick = () => {
          document.querySelectorAll(".card").forEach(c => {
             if(c !== card) c.style.opacity = "0.2";
             c.classList.remove("focus");
          });

          card.classList.add("focus");
          card.style.opacity = "1";

          setTimeout(() => {
            card.classList.add("flip");
          }, 400);

          setTimeout(() => {
            window.location.href = "emotion.html?id=" + obj.id;
          }, 2500);
        };

        deck.appendChild(card);
      });
    }

    load();
  </script>
  <script src="../main_js/iframe.js"></script>

</body>
</html>
