<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Những chiếc cảm xúc hôm nay 💗</title>

  <style>
    body {
      margin: 0;
      font-family: Segoe UI;
      background: linear-gradient(140deg, #eef2ff, #fdf2f8, #ecfeff);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }

    h1 {
      margin-bottom: 30px;
      font-weight: 600;
      color: #334155;
      animation: floatWind 4s ease-in-out infinite;
      transition: .3s;
      cursor: default;
    }

    /* gió đưa */
    @keyframes floatWind {
      0% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-6px) rotate(-1deg);
      }

      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    /* hover rung nhẹ */
    h1:hover {
      animation: shake .35s linear infinite;
    }

    @keyframes shake {
      0% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(1px)
      }

      50% {
        transform: translateX(-1px)
      }

      75% {
        transform: translateX(1px)
      }

      100% {
        transform: translateX(0)
      }
    }


    .deck {
      position: relative;
      width: 1000px;
      height: 520px;
    }

    /* ⭐ card */
    .card {
      position: absolute;
      width: 260px;
      height: 380px;
      border-radius: 30px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, .25);
      cursor: pointer;
      transition: .5s;
      overflow: hidden;
      transform-origin: center;
    }

    /* ⭐ hover */
    .card:hover {
      transform: translateY(-40px) scale(1.08) rotate(0deg) !important;
      z-index: 500;
      box-shadow: 0 45px 90px rgba(0, 0, 0, .35);
    }

    /* ⭐ background mood */
    .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: .78;
    }

    /* ⭐ lớp kính */
    .glass {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(6px);
    }

    /* ⭐ slogan */
    .slogan {
      position: absolute;
      right: 18px;
      bottom: 16px;
      font-size: 12px;
      color: white;
      opacity: .85;
      font-style: italic;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .5);
    }

    /* ⭐ mặt sau */
    .inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: .7s;
    }

    .card.flip .inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 30px;
    }

    .back {
      background: url("sunrain.jpg");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: #0f172a;
      font-weight: 600;
      text-shadow: 0 3px 12px rgba(255, 255, 255, .6);
      transform: rotateY(180deg);
    }


    /* ⭐ zoom focus */
    .card.focus {
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) scale(1.45) rotate(0deg) !important;
      z-index: 999;
    }
  </style>
</head>

<body>

  <h1>Những chiếc cảm xúc hôm nay 💗</h1>
  <div class="deck" id="deck"></div>
  <script type="module">

    import { initializeApp } from
      "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      query,
      getDocs,
      orderBy
    } from
      "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "banhkietgithunbpoem.firebaseapp.com",
      projectId: "banhkietgithunbpoem"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const deck = document.getElementById("deck");

    async function load() {

      const snap = await getDocs(
        query(collection(db, "emotions"), orderBy("createdAt", "desc"))
      );

      let arr = [];
      snap.forEach(d => {
        const e = d.data();
        if (e.privacy !== "public") return;
        arr.push({ id: d.id, e });
      });

      const total = arr.length;
      const spread = 75;
      const center = 500;

      arr.forEach((obj, i) => {

        const angle = (i - (total / 2)) * 7;
        const left = center + (i - (total / 2)) * spread;

        const mood = (obj.e.mood || "").toLowerCase();

        let img = "sun.jpg";
        if (mood.includes("buồn") || mood.includes("sad"))
          img = "rain.jpg";

        let username = obj.e.username || "A";
        if (username.length > 8)
          username = username.charAt(0);

        const card = document.createElement("div");
        card.className = "card";
        card.style.left = left + "px";
        card.style.top = "70px";
        card.style.transform = `rotate(${angle}deg)`;

        card.innerHTML = `
   <div class="inner">

     <div class="face front">
        <div class="bg" style="background-image:url(${img})"></div>
        <div class="glass"></div>

        <div class="slogan">
        "Hãy thích một cuộc sống<br>
        và sống một cuộc sống mình thích"<br>
        ---NTK---
        </div>
     </div>

     <div class="face back">
        ${username}
     </div>

   </div>
   `;

        card.onclick = () => {

          document.querySelectorAll(".card")
            .forEach(c => c.classList.remove("focus"));

          card.classList.add("focus");

          setTimeout(() => {
            card.classList.add("flip");
          }, 500);

          setTimeout(() => {
            window.location.href =
              "emotion.html?id=" + obj.id;
          }, 3000);

        };

        deck.appendChild(card);

      });

    }

    load();

  </script>
    <script src="../main_js/iframe.js"></script>

</body>

</html>
