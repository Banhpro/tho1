<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhật Ký Cảm Xúc 📖</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Patrick+Hand&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --sad-color: #5D4037;
      --happy-color: #4CAF50;
      --paper-bg: #fdfaf0;
    }

    body {
      margin: 0; padding: 10px;
      font-family: 'Patrick Hand', cursive;
      background: #cfd8dc;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }

    /* Cuốn sổ lớn hơn */
    .diary-book {
      display: flex; width: 98%; max-width: 1200px; height: 90vh;
      background: var(--paper-bg);
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      border-radius: 5px 40px 40px 5px;
      position: relative;
      border-left: 18px solid #3d2b1f;
    }

    .diary-book::before {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
      background: rgba(0,0,0,0.08); z-index: 5;
    }

    .page-left { flex: 1; padding: 25px; display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.05); }
    .page-right { flex: 1; padding: 25px; overflow-y: auto; position: relative; }

    h1 { font-family: 'Dancing Script', cursive; color: #3d2b1f; text-align: center; margin: 0 0 15px 0; }

    /* Bộ lọc */
    .filters { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
    .filters button {
      padding: 6px 15px; border: 1px solid #3d2b1f; background: #fff;
      cursor: pointer; border-radius: 6px; font-family: inherit; transition: 0.3s;
    }
    .filters button.active { background: #3d2b1f; color: white; }

    /* Checklist Area */
    .checklist-box {
      background: rgba(255,255,255,0.5);
      padding: 10px; border-radius: 10px; border: 1px solid #ddd;
      margin-bottom: 15px; min-height: 60px;
    }
    .day-row { display: flex; justify-content: space-around; font-size: 12px; text-align: center; }
    .check-item { display: flex; flex-direction: column; align-items: center; width: 30px; }
    .status-icon { font-size: 18px; height: 20px; }

    /* Grid cho tháng */
    .month-grid { 
        display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; 
        font-size: 10px; margin-top: 5px;
    }
    .month-day { border: 1px solid #eee; padding: 2px; height: 25px; position: relative;}

    /* Chart */
    .chart-container { flex-grow: 1; min-height: 250px; width: 100%; }

    /* Tabs 12 Tháng */
    .year-tabs {
      position: absolute; right: -45px; top: 20px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .month-tab {
      width: 40px; height: 35px; background: #e67e22; color: white;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0 5px 5px 0; font-size: 12px; cursor: pointer;
      transition: 0.3s; transform-origin: left;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
      border-left: 2px solid rgba(0,0,0,0.1);
    }
    .month-tab:hover { transform: scaleX(1.3) translateX(5px); z-index: 100; background: #d35400; }
    /* Hiệu ứng 3D xếp lớp */
    .month-tab { transform: translateZ(calc(var(--idx) * -1px)); }

    /* List bên phải tối giản */
    .entry-mini {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; border-bottom: 1px dashed #ccc;
    }
    .mood-tag {
      padding: 2px 10px; border-radius: 15px; color: white; font-size: 12px;
      text-transform: uppercase; font-weight: bold;
    }

    .footer-note {
      text-align: center; margin-top: auto; font-size: 13px; color: #555;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="diary-book">
    <!-- Trang trái -->
    <div class="page-left">
      <h1>Kỷ niệm cá nhân</h1>
      
      <div class="filters">
        <button onclick="changeMode('day')" id="btn-day">Hôm nay</button>
        <button onclick="changeMode('week')" id="btn-week" class="active">Tuần này</button>
        <button onclick="changeMode('month')" id="btn-month">Tháng này</button>
        <button onclick="changeMode('year')" id="btn-year">Năm nay</button>
      </div>

      <!-- Checklist Section -->
      <div id="check-section" class="checklist-box">
        <!-- Content dynamic -->
      </div>

      <div class="chart-container">
        <canvas id="emotionChart"></canvas>
      </div>
      
      <div class="footer-note">
        Nhật ký của: <strong id="display-name">...</strong><br>
        <i style="opacity: 0.8;">"Viết ra để nhẹ lòng, giữ lại để trân trọng."</i>
      </div>
    </div>

    <!-- Trang phải -->
    <div class="page-right">
      <div id="year-tabs-container" class="year-tabs hidden">
        <!-- 12 tabs generated by JS -->
      </div>
      <div id="entries-list">
        <!-- List mini entries -->
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, getDocs, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
      authDomain: "banhkietgithunbpoem.firebaseapp.com",
      projectId: "banhkietgithunbpoem"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let allData = [];
    let currentMode = 'week';
    let myChart;

    onAuthStateChanged(auth, async user => {
      if (user) {
        const q = query(collection(db, "emotions"), where("uid", "==", user.uid));
        const snap = await getDocs(q);
        allData = snap.docs.map(d => d.data());
        
        // Lấy username từ bản ghi đầu tiên có username
        const firstWithUser = allData.find(d => d.username);
        document.getElementById("display-name").innerText = firstWithUser ? firstWithUser.username : user.email.split('@')[0];
        
        render();
      }
    });

    function render() {
      const listContainer = document.getElementById("entries-list");
      const checkSection = document.getElementById("check-section");
      const tabsContainer = document.getElementById("year-tabs-container");
      
      listContainer.innerHTML = "";
      checkSection.innerHTML = "";
      tabsContainer.classList.add("hidden");

      if (currentMode === 'week') renderWeek();
      else if (currentMode === 'month') renderMonth();
      else if (currentMode === 'year') renderYear();
      else renderDay();
    }

    // --- LOGIC TUẦN ---
    function renderWeek() {
      const now = new Date();
      const dayNames = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
      const labels = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
      const happyData = Array(7).fill(0);
      const sadData = Array(7).fill(0);

      let html = '<div class="day-row">';
      
      // Tính ngày Thứ 2 của tuần này
      let monday = new Date(now);
      monday.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));

      for(let i=0; i<7; i++) {
        let loopDate = new Date(monday);
        loopDate.setDate(monday.getDate() + i);
        let dateStr = formatDate(loopDate);
        
        let hasEntry = allData.some(d => d.dayKey === dateStr);
        let isPast = loopDate < new Date().setHours(0,0,0,0);
        let status = "";
        if (hasEntry) status = '<span style="color:green">✔</span>';
        else if (isPast) status = '<span style="color:red">✘</span>';

        html += `<div class="check-item"><div class="status-icon">${status}</div><div>${labels[i]}</div></div>`;

        // Gom data cho biểu đồ
        allData.filter(d => d.dayKey === dateStr).forEach(d => {
            if(isSad(d.mood)) sadData[i]++; else happyData[i]++;
        });

        // Hiện danh sách bên phải
        renderRightList(allData.filter(d => d.dayKey === dateStr));
      }
      html += '</div>';
      document.getElementById("check-section").innerHTML = html;
      updateChart(labels, happyData, sadData);
    }

    // --- LOGIC THÁNG ---
    function renderMonth() {
      const now = new Date();
      const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      const labels = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
      const happyData = Array(7).fill(0);
      const sadData = Array(7).fill(0);

      let html = '<div class="month-grid">';
      for(let i=1; i<=lastDay; i++) {
        let loopDate = new Date(now.getFullYear(), now.getMonth(), i);
        let dateStr = formatDate(loopDate);
        let hasEntry = allData.some(d => d.dayKey === dateStr);
        let isPast = loopDate < new Date().setHours(0,0,0,0);
        
        let content = "";
        if (hasEntry) content = "✔"; else if (isPast) content = "✘";
        let color = hasEntry ? "green" : "red";

        html += `<div class="month-day" style="color:${color}">${i}<br>${content}</div>`;

        // Gom data theo Thứ (T2-CN) cho tháng
        let dayIdx = loopDate.getDay(); // 0:CN, 1:T2...
        let chartIdx = dayIdx === 0 ? 6 : dayIdx - 1;
        allData.filter(d => d.dayKey === dateStr).forEach(d => {
            if(isSad(d.mood)) sadData[chartIdx]++; else happyData[chartIdx]++;
        });
        
        renderRightList(allData.filter(d => d.dayKey === dateStr));
      }
      html += '</div>';
      document.getElementById("check-section").innerHTML = html;
      updateChart(labels, happyData, sadData);
    }

    // --- LOGIC NĂM ---
    function renderYear() {
      const tabsContainer = document.getElementById("year-tabs-container");
      tabsContainer.classList.remove("hidden");
      tabsContainer.innerHTML = "";
      const labels = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
      const happyData = Array(12).fill(0);
      const sadData = Array(12).fill(0);

      for(let i=1; i<=12; i++) {
        const tab = document.createElement("div");
        tab.className = "month-tab";
        tab.style.setProperty('--idx', i);
        tab.innerText = "T" + i;
        tab.onclick = () => {
            const monthEntries = allData.filter(d => {
                const date = d.createdAt.toDate();
                return (date.getMonth() + 1) === i && date.getFullYear() === new Date().getFullYear();
            });
            renderRightList(monthEntries, true);
        };
        tabsContainer.appendChild(tab);

        // Gom data biểu đồ theo tháng
        allData.filter(d => {
             const date = d.createdAt.toDate();
             return (date.getMonth() + 1) === i && date.getFullYear() === new Date().getFullYear();
        }).forEach(d => {
            if(isSad(d.mood)) sadData[i-1]++; else happyData[i-1]++;
        });
      }
      updateChart(labels, happyData, sadData);
    }

    // --- HELPERS ---
    function isSad(mood) {
        const m = (mood||"").toLowerCase();
        return m.includes("buồn") || m.includes("sad") || m.includes("tệ");
    }

    function formatDate(date) {
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();
        return `${d}-${m}-${y}`;
    }

    function renderRightList(entries, clear = false) {
        const container = document.getElementById("entries-list");
        if(clear) container.innerHTML = "";
        entries.sort((a,b) => b.createdAt.toDate() - a.createdAt.toDate()).forEach(e => {
            const time = e.createdAt.toDate().toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
            const color = isSad(e.mood) ? 'var(--sad-color)' : 'var(--happy-color)';
            container.innerHTML += `
                <div class="entry-mini">
                    <div>
                        <small>${e.dayKey}</small> <strong>${time}</strong>
                    </div>
                    <div class="mood-tag" style="background:${color}">${e.mood}</div>
                </div>
            `;
        });
    }

    function updateChart(labels, happy, sad) {
      const ctx = document.getElementById('emotionChart').getContext('2d');
      if (myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Vui', data: happy, backgroundColor: '#4CAF50' },
            { label: 'Buồn', data: sad, backgroundColor: '#5D4037' }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { stacked: true },
            y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } }
          }
        }
      });
    }

    window.changeMode = (m) => {
        currentMode = m;
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+m).classList.add('active');
        render();
    }

  </script>
</body>
</html>
