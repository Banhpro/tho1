<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Emotion Detail</title>
  <style>
    /* ... (Giữ nguyên phần CSS của bạn ở trên) ... */
    body { margin: 0; font-family: Segoe UI; display: flex; justify-content: center; padding: 60px; background: #eef2ff; position: relative; }
    .card { width: 820px; background: rgba(255, 255, 255, .85); backdrop-filter: blur(10px); border-radius: 26px; box-shadow: 0 40px 90px rgba(0, 0, 0, .25); padding: 35px; }
    .contentRow { display: flex; gap: 30px; }
    .textBox { flex: 1; font-size: 20px; line-height: 1.7; color: #0f172a; }
    .sideImg { width: 240px; border-radius: 18px; object-fit: cover; }
    .user { font-size: 24px; font-weight: 600; }
    .time { color: #64748b; margin-bottom: 20px; }
    .reactBar { margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px; display: flex; gap: 20px; font-size: 22px; }
    .reactBtn { cursor: pointer; transition: .2s; }
    .commentBox { margin-top: 15px; display: none; }
    textarea { width: 100%; height: 90px; border-radius: 14px; padding: 10px; }
    .sendBtn { margin-top: 10px; padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 10px; cursor: pointer; }
    .cmt { background: #f1f5ff; padding: 12px; border-radius: 12px; margin-top: 12px; }
    .cUser { font-weight: 600; }
    .cTime { font-size: 12px; color: #64748b; }
    .backBtn { position: fixed; top: 25px; left: 25px; width: 50px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="card">
    <div class="user" id="displayUser">Đang tải...</div>
    <div class="time" id="displayTime"></div>

    <div class="contentRow">
      <div class="textBox" id="displayText"></div>
      <img id="displayImg" class="sideImg" style="display:none">
    </div>

    <div class="reactBar">
      <div class="reactBtn" onclick="react('heart')">❤️ <span id="heart">0</span></div>
      <div class="reactBtn" onclick="react('like')">👍 <span id="like">0</span></div>
      <div class="reactBtn" onclick="react('sad')">😢 <span id="sad">0</span></div>
      <div class="reactBtn" onclick="react('wow')">😮 <span id="wow">0</span></div>
    </div>

    <div style="margin-top:20px; color:#6366f1; cursor:pointer; font-weight:600" onclick="toggleCmt()">💬 Bình luận</div>

    <div class="commentBox" id="cmtBox">
      <textarea id="cText" placeholder="Viết bình luận..."></textarea>
      <button class="sendBtn" onclick="sendCmt()">Gửi</button>
      <div id="cList"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 1. DÁN CONFIG ĐẦY ĐỦ CỦA BẠN VÀO ĐÂY (Lấy từ Firebase Console)
    const firebaseConfig = {
      apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4", 
      authDomain: "banhkietgithunbpoem.firebaseapp.com",
      projectId: "banhkietgithunbpoem",
      storageBucket: "banhkietgithunbpoem.appspot.com",
      messagingSenderId: "776019313368",
      appId: "1:776019313368:web:..." // QUAN TRỌNG: Phải có dòng này
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const emotionId = params.get("id");
    const emotionRef = doc(db, "emotions", emotionId);

    let currentUsername = "Khách";
    let currentUser = null;
    let emotionData = null;

    /* =========================================
       2. KIỂM TRA ĐĂNG NHẬP (Dùng code của bạn)
    ========================================= */
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);

        if (snap.exists()) {
          const userData = snap.data();
          currentUsername = userData.username || "Khách";
          currentUser.role = userData.role || "user";

          if (currentUser.role === "admin") {
            console.log("✅ Bạn là ADMIN");
          }
        }
        console.log("✅ Đã nhận diện người dùng:", currentUsername);
      } else {
        console.log("⚠️ Chưa đăng nhập");
        currentUsername = "Khách";
        currentUser = null;
      }
      // Load dữ liệu bài viết sau khi biết user là ai
      loadEmotionDetail();
    });

    /* =========================================
       3. LOAD CHI TIẾT BÀI VIẾT
    ========================================= */
    async function loadEmotionDetail() {
      if (!emotionId) return;
      const snap = await getDoc(emotionRef);
      if (!snap.exists()) {
        alert("Không tìm thấy bài viết!");
        return;
      }

      emotionData = snap.data();
      document.getElementById('displayUser').innerText = emotionData.username || "Ẩn danh";
      document.getElementById('displayText').innerText = emotionData.text || "";
      
      if (emotionData.createdAt) {
        const t = new Date(emotionData.createdAt.seconds * 1000);
        document.getElementById('displayTime').innerText = t.toLocaleString();
      }

      if (emotionData.imgUrl) {
        const img = document.getElementById('displayImg');
        img.src = emotionData.imgUrl;
        img.style.display = "block";
      }

      renderReactions();
      renderComments();
    }

    function renderReactions() {
      ['heart', 'like', 'sad', 'wow'].forEach(type => {
        document.getElementById(type).innerText = emotionData[type] || 0;
      });
    }

    /* =========================================
       4. HÀM GỬI BÌNH LUẬN (FIXED)
    ========================================= */
    window.sendCmt = async function() {
      if (!currentUser) {
        alert("Bạn cần đăng nhập để bình luận!");
        return;
      }

      const msg = document.getElementById('cText').value.trim();
      if (!msg) return;

      const newCmt = {
        user: currentUsername, // Lấy tên từ Firestore users/{uid}
        msg: msg,
        time: new Date().toLocaleString()
      };

      try {
        await updateDoc(emotionRef, {
          comments: arrayUnion(newCmt)
        });

        // Cập nhật UI ngay lập tức
        if (!emotionData.comments) emotionData.comments = [];
        emotionData.comments.push(newCmt);
        renderComments();
        document.getElementById('cText').value = "";
      } catch (e) {
        console.error("Lỗi gửi cmt:", e);
      }
    }

    function renderComments() {
      const list = document.getElementById('cList');
      list.innerHTML = "";
      (emotionData.comments || []).forEach(c => {
        const div = document.createElement("div");
        div.className = "cmt";
        div.innerHTML = `
          <div class="cUser">🧑 ${c.user}</div>
          <div>${c.msg}</div>
          <div class="cTime">${c.time}</div>
        `;
        list.appendChild(div);
      });
    }

    window.react = async function(type) {
      emotionData[type] = (emotionData[type] || 0) + 1;
      document.getElementById(type).innerText = emotionData[type];
      await updateDoc(emotionRef, { [type]: emotionData[type] });
    }

    window.toggleCmt = function() {
      const box = document.getElementById('cmtBox');
      box.style.display = box.style.display === "block" ? "none" : "block";
    }
  </script>
</body>
</html>
