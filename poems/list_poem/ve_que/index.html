<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Về quê</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* giữ nguyên toàn bộ CSS của bạn */
</style>
</head>

<body>

<div class="container">

    <div class="poem-header">
        <div class="poem-title">Về quê</div>
        <i class="fa-solid fa-volume-high audio-icon" id="audioIcon"></i>
    </div>

    <div class="audio-player" id="player">
        <div class="play-btn" id="playBtn">
            <i class="fa-solid fa-play"></i>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="time" id="time">00:00</div>
    </div>

    <audio id="audio">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <div class="poem-content">
        Đĩa quê kịp bữa cơm chiều<br>
        Canh rau mẹ đã thêm nhiều khổ qua<br>
        Đầu năm xuôi ngược gần xa<br>
        Cuối năm dìa lại quê nhà ăn rau...
    </div>

</div>

<script src="../../js/audio.js"></script>

</body>
</html>
