<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thơ Đêm</title>

<!-- Google Font cho chữ đẹp -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:url("images/dem.jpg") no-repeat center center/cover;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    font-family:'Playfair Display', serif;
}

/* Lớp nền tối bên phải */
.overlay{
    width:50%;
    height:100%;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    padding:60px;
}

/* Nội dung thơ */
.poem{
    color:white;
    font-size:28px;
    line-height:1.8;
    font-style:italic;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="poem">
        Bên đây ký túc là nhà<br>
        Bên kia Hồ cũng là quê hương<br>
        Bên này tui chả ai thương<br>
        Bên kia bọn họ cũng thường hôn nhau
    </div>
</div>

</body>
</html>
