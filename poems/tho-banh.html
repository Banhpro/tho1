<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư Viện Thơ Của Bành</title>

<script src="js/poems-data.js"></script>

<style>

body{
    font-family: 'Segoe UI', Arial, sans-serif;
    margin:0;
    padding:0;
    background:linear-gradient(to right,#f8f9fa,#eef2f7);
}

/* ===== TITLE ===== */
h1{
    text-align:center;
    margin:40px 0 30px 0;
    font-size:38px;
    letter-spacing:2px;
}

/* ===== FILTER WRAPPER ===== */
.filter-wrapper{
    width:90%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin-bottom:60px;
}

/* SEARCH */
.search-box{
    position:relative;
    text-align:center;
    margin-bottom:30px;
}

.search-box input{
    width:60%;
    max-width:420px;
    padding:12px 20px;
    border-radius:30px;
    border:2px solid #6c63ff;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.search-box input:focus{
    box-shadow:0 0 12px rgba(108,99,255,0.3);
}

/* Suggestions */
.suggestions{
    position:absolute;
    top:55px;
    left:50%;
    transform:translateX(-50%);
    width:60%;
    max-width:420px;
    background:white;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    text-align:left;
    z-index:100;
    overflow:hidden;
    display:none;
}

.suggestion-item{
    padding:12px 16px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.suggestion-item:hover{
    background:#f3f3ff;
}

.highlight{
    background:yellow;
    font-weight:bold;
}

/* FILTER BAR */
.filter-bar{
    display:flex;
    justify-content:center;
    gap:60px;
    flex-wrap:wrap;
}

.filter-box{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.filter-box label{
    font-weight:600;
    margin-bottom:8px;
    font-size:14px;
    letter-spacing:1px;
}

select{
    padding:10px 18px;
    border-radius:30px;
    border:2px solid #6c63ff;
    font-size:14px;
    cursor:pointer;
    background:white;
    outline:none;
    min-width:170px;
    transition:0.3s;
}

select:hover{
    box-shadow:0 0 10px rgba(108,99,255,0.2);
}

/* ===== POEM GRID ===== */
.poem-container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:35px;
    min-height:300px;
}

.poem-card{
    background:white;
    padding:12px;
    text-align:center;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.06);
    transition:0.3s ease;
    cursor:pointer;
    opacity:0;
    transform:translateY(20px);
    animation:fadeUp 0.5s forwards;
}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.poem-card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

.poem-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:12px;
}

.poem-title{
    font-weight:600;
    margin-top:12px;
    font-size:16px;
}

.poem-date{
    font-size:13px;
    color:#777;
}

.poem-author{
    font-size:14px;
    margin-top:5px;
}

/* NO RESULT */
.no-poem-wrapper{
    grid-column: 1 / -1;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:300px;
}

.no-poem{
    font-style:italic;
    font-size:28px;
    color:#888;
}

/* Responsive */
@media(max-width:1024px){
    .poem-container{
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width:600px){
    .poem-container{
        grid-template-columns: 1fr;
    }

    .search-box input{
        width:90%;
    }
}

</style>
</head>

<body>

<h1>THƯ VIỆN THƠ CỦA BÀNH</h1>

<div class="filter-wrapper">

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tìm theo tên hoặc nội dung bài thơ...">
        <div id="suggestions" class="suggestions"></div>
    </div>

    <div class="filter-bar">

        <div class="filter-box">
            <label>THỂ LOẠI</label>
            <select id="filterCategory">
                <option value="">TẤT CẢ</option>
                <option value="THƠ TÌNH">THƠ TÌNH</option>
                <option value="QUÊ HƯƠNG">QUÊ HƯƠNG</option>
                <option value="HỌC TRÒ">HỌC TRÒ</option>
                <option value="GIA ĐÌNH">GIA ĐÌNH</option>
                <option value="ĐỜI NGƯỜI">ĐỜI NGƯỜI</option>
            </select>
        </div>

        <div class="filter-box">
            <label>THỂ THƠ</label>
            <select id="filterType">
                <option value="">TẤT CẢ</option>
                <option value="LỤC BÁT">LỤC BÁT</option>
                <option value="SONG THẤT LỤC BÁT">SONG THẤT LỤC BÁT</option>
                <option value="THẤT NGÔN">THẤT NGÔN</option>
                <option value="NGŨ NGÔN">NGŨ NGÔN</option>
                <option value="BÁT NGÔN">BÁT NGÔN</option>
                <option value="TỰ DO">TỰ DO</option>
                <option value="HAIKU">HAIKU</option>
                <option value="BIẾN THỂ">BIẾN THỂ</option>
            </select>
        </div>

        <div class="filter-box">
            <label>ÂM THANH</label>
            <select id="filterAudio">
                <option value="">TẤT CẢ</option>
                <option value="true">CÓ GIỌNG ĐỌC</option>
                <option value="false">KHÔNG GIỌNG ĐỌC</option>
            </select>
        </div>

    </div>
</div>

<div class="poem-container" id="poemContainer"></div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    if(typeof poems === "undefined"){
        alert("Không tìm thấy poems-data.js");
        return;
    }

    const container = document.getElementById("poemContainer");
    const searchInput = document.getElementById("searchInput");
    const suggestionBox = document.getElementById("suggestions");
    const filterCategory = document.getElementById("filterCategory");
    const filterType = document.getElementById("filterType");
    const filterAudio = document.getElementById("filterAudio");

    /* ================= REMOVE VIETNAMESE TONES ================= */
    function removeVietnameseTones(str){
        return str.normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/đ/g, "d")
            .replace(/Đ/g, "D")
            .toLowerCase();
    }

    /* ================= HIGHLIGHT ================= */
    function highlight(text, keyword){
        if(!keyword) return text;

        const normalizedText = removeVietnameseTones(text);
        const normalizedKeyword = removeVietnameseTones(keyword);

        const index = normalizedText.indexOf(normalizedKeyword);
        if(index === -1) return text;

        return text.substring(0,index)
            + "<span class='highlight'>"
            + text.substring(index,index+keyword.length)
            + "</span>"
            + text.substring(index+keyword.length);
    }

    /* ================= EXTRACT SNIPPET ================= */
    function extractSnippet(content, keyword){
        if(!content) return "";

        const normalizedContent = removeVietnameseTones(content);
        const normalizedKeyword = removeVietnameseTones(keyword);

        const index = normalizedContent.indexOf(normalizedKeyword);
        if(index === -1) return "";

        const start = Math.max(0, index - 25);
        const end = Math.min(content.length, index + keyword.length + 25);

        let snippet = content.substring(start, end);

        if(start > 0) snippet = "..." + snippet;
        if(end < content.length) snippet += "...";

        return snippet;
    }

    /* ================= AUTO LOAD CONTENT ================= */
    async function loadAllPoemContents(){

        for (let poem of poems){

            try{
                const response = await fetch(poem.file);
                const html = await response.text();

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, "text/html");

                const contentDiv = doc.querySelector("#poem-content");

                poem.content = contentDiv
                    ? contentDiv.innerText
                    : "";

            }catch(error){
                poem.content = "";
            }
        }
    }

    /* ================= FILTER LOGIC ================= */
    function applyFilters(){

        const keywordRaw = searchInput.value.trim();
        const keyword = removeVietnameseTones(keywordRaw);

        const category = filterCategory.value;
        const type = filterType.value;
        const audio = filterAudio.value;

        const filtered = poems.filter(p => {

            const title = removeVietnameseTones(p.title);
            const content = removeVietnameseTones(p.content || "");

            const matchKeyword =
                keyword === "" ||
                title.includes(keyword) ||
                content.includes(keyword);

            const matchCategory =
                category === "" ||
                (Array.isArray(p.category)
                    ? p.category.includes(category)
                    : p.category === category);

            const matchType =
                type === "" || p.type === type;

            const matchAudio =
                audio === "" || String(p.audio) === audio;

            return matchKeyword && matchCategory && matchType && matchAudio;
        });

        renderPoems(filtered);
        renderSuggestions(filtered);
    }

    /* ================= RENDER POEMS ================= */
    function renderPoems(data){

        container.innerHTML = "";

        if(data.length === 0){
            container.innerHTML = `
                <div class="no-poem-wrapper">
                    <div class="no-poem">Không có bài thơ phù hợp</div>
                </div>
            `;
            return;
        }

        const keywordRaw = searchInput.value.trim();
        const keyword = removeVietnameseTones(keywordRaw);

        data.forEach((poem,index) => {

            const card = document.createElement("div");
            card.className = "poem-card";
            card.style.animationDelay = (index * 0.05) + "s";

            const normalizedTitle = removeVietnameseTones(poem.title);
            const matchInTitle = normalizedTitle.includes(keyword);

            const titleDisplay = (matchInTitle && keywordRaw)
                ? highlight(poem.title, keywordRaw)
                : poem.title;

            card.innerHTML = `
                <img src="${poem.image}" alt="">
                <div class="poem-title">
                    ${titleDisplay}
                    ${poem.audio ? " 🔊" : ""}
                </div>
                <div class="poem-date">${poem.date}</div>
                <div class="poem-author">${poem.author}</div>
            `;

            card.onclick = () => {
                window.location.href = poem.file;
            };

            container.appendChild(card);
        });
    }

    /* ================= RENDER SUGGESTIONS ================= */
    function renderSuggestions(data){

        const keywordRaw = searchInput.value.trim();

        if(keywordRaw.length < 2){
            suggestionBox.style.display = "none";
            return;
        }

        suggestionBox.innerHTML = "";

        const top5 = data.slice(0,5);

        top5.forEach(p => {

            const normalizedTitle = removeVietnameseTones(p.title);
            const normalizedKeyword = removeVietnameseTones(keywordRaw);

            const matchInTitle = normalizedTitle.includes(normalizedKeyword);

            let displayText = "";

            if(matchInTitle){
                displayText = highlight(p.title, keywordRaw);
            }else{
                const snippet = extractSnippet(p.content || "", keywordRaw);
                displayText = highlight(snippet, keywordRaw);
            }

            const div = document.createElement("div");
            div.className = "suggestion-item";

            div.innerHTML = `
                <span>${displayText}</span>
                ${p.audio ? "<span>🔊</span>" : ""}
            `;

            div.onclick = () => {
                window.location.href = p.file;
            };

            suggestionBox.appendChild(div);
        });

        suggestionBox.style.display = top5.length ? "block" : "none";
    }

    /* ================= EVENTS ================= */
    searchInput.addEventListener("input", applyFilters);
    filterCategory.addEventListener("change", applyFilters);
    filterType.addEventListener("change", applyFilters);
    filterAudio.addEventListener("change", applyFilters);

    document.addEventListener("click", function(e){
        if(!e.target.closest(".search-box")){
            suggestionBox.style.display = "none";
        }
    });

    /* ================= INIT ================= */
    (async function init(){
        await loadAllPoemContents();
        renderPoems(poems);
    })();

});
</script>

</body>
</html>
