<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thư Viện Thơ Của Bành</title>

<script src="poems-data.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f4f4f4;
}

h1{
    text-align:center;
    margin:30px 0;
    font-size:40px;
}

/* ===== FILTER BAR ===== */
.filter-bar{
    display:flex;
    justify-content:center;
    gap:80px;
    margin-bottom:40px;
    font-weight:bold;
}

.filter-box{
    text-align:center;
}

select{
    padding:8px 15px;
    margin-top:10px;
    font-size:14px;
}

/* ===== GRID POEMS ===== */
.poem-container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:40px;
}

.poem-card{
    background:white;
    padding:10px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
    border-radius:6px;
}

.poem-card:hover{
    background:#eaeaea;
    transform:scale(1.02);
}

.poem-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:4px;
}

.poem-title{
    font-weight:bold;
    margin-top:10px;
}

.poem-date{
    font-size:13px;
    color:gray;
}

.poem-author{
    font-size:14px;
    margin-top:5px;
}
</style>
</head>

<body>

<h1>THƯ VIỆN THƠ CỦA BÀNH</h1>

<!-- FILTER -->
<div class="filter-bar">

    <div class="filter-box">
        <div>THỂ LOẠI</div>
        <select id="filterCategory">
            <option value="">TẤT CẢ</option>
            <option value="THƠ TÌNH">THƠ TÌNH</option>
            <option value="QUÊ HƯƠNG">QUÊ HƯƠNG</option>
            <option value="HỌC TRÒ">HỌC TRÒ</option>
            <option value="GIA ĐÌNH">GIA ĐÌNH</option>
            <option value="ĐỜI NGƯỜI">ĐỜI NGƯỜI</option>
        </select>
    </div>

    <div class="filter-box">
        <div>THỂ THƠ</div>
        <select id="filterType">
            <option value="">TẤT CẢ</option>
            <option value="LỤC BÁT">LỤC BÁT</option>
            <option value="SONG THẤT LỤC BÁT">SONG THẤT LỤC BÁT</option>
            <option value="THẤT NGÔN">THẤT NGÔN</option>
            <option value="NGŨ NGÔN">NGŨ NGÔN</option>
            <option value="BÁT NGÔN">BÁT NGÔN</option>
            <option value="TỰ DO">TỰ DO</option>
            <option value="HAIKU">HAIKU</option>
            <option value="BIẾN THỂ">BIẾN THỂ</option>
        </select>
    </div>

    <div class="filter-box">
        <div>ÂM THANH</div>
        <select id="filterAudio">
            <option value="">TẤT CẢ</option>
            <option value="true">CÓ GIỌNG ĐỌC</option>
            <option value="false">KHÔNG GIỌNG ĐỌC</option>
        </select>
    </div>

</div>

<!-- DANH SÁCH BÀI THƠ -->
<div class="poem-container" id="poemContainer"></div>

<script>

const container = document.getElementById("poemContainer");
const categorySelect = document.getElementById("filterCategory");
const typeSelect = document.getElementById("filterType");
const audioSelect = document.getElementById("filterAudio");

/* ===== RENDER ===== */
function renderPoems(data){
    container.innerHTML = "";

    data.forEach(poem => {

        const card = document.createElement("div");
        card.className = "poem-card";

        card.innerHTML = `
            <img src="${poem.image}" alt="">
            <div class="poem-title">${poem.title}</div>
            <div class="poem-date">${poem.date}</div>
            <div class="poem-author">${poem.author}</div>
        `;

        card.onclick = () => {
            window.location.href = poem.file;
        };

        container.appendChild(card);
    });
}

renderPoems(poems);


/* ===== FILTER ===== */
categorySelect.addEventListener("change", filterPoems);
typeSelect.addEventListener("change", filterPoems);
audioSelect.addEventListener("change", filterPoems);

function filterPoems(){
    const cat = categorySelect.value;
    const type = typeSelect.value;
    const audio = audioSelect.value;

    const filtered = poems.filter(p =>
        (cat === "" || p.category === cat) &&
        (type === "" || p.type === type) &&
        (audio === "" || String(p.audio) === audio)
    );

    renderPoems(filtered);
}

</script>

</body>
</html>
