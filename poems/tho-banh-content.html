<h1 style="text-align:center;margin-bottom:30px;">
THƯ VIỆN THƠ CỦA BÀNH
</h1>

<div style="display:flex;justify-content:center;gap:40px;margin-bottom:30px;">

<select id="filterCategory">
<option value="">TẤT CẢ THỂ LOẠI</option>
<option value="THƠ TÌNH">THƠ TÌNH</option>
<option value="QUÊ HƯƠNG">QUÊ HƯƠNG</option>
</select>

<select id="filterType">
<option value="">TẤT CẢ THỂ THƠ</option>
<option value="LỤC BÁT">LỤC BÁT</option>
<option value="THẤT NGÔN">THẤT NGÔN</option>
</select>

</div>

<div id="poemContainer" style="
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
"></div>

<script src="../poems-data.js"></script>

<script>
const container = document.getElementById("poemContainer");

function renderPoems(data){
container.innerHTML = "";

data.forEach(poem => {

const card = document.createElement("div");
card.style.background="white";
card.style.padding="10px";
card.style.cursor="pointer";

card.innerHTML = `
<img src="../${poem.image}" style="width:100%;height:200px;object-fit:cover;">
<div style="font-weight:bold;margin-top:10px;">${poem.title}</div>
<div style="font-size:13px;color:gray;">${poem.date}</div>
`;

card.onclick = () => {
loadPage(poem.file);
};

container.appendChild(card);

});
}

renderPoems(poems);
</script>
