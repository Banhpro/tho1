<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Kiểm Duyệt Bản Vẽ - Nhà Cây Dễ Thương</title>
    <!-- Đổi sang Font chữ Bo tròn, Đáng yêu (Giống trang xây dựng) -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Bảng màu Gỗ và Rừng Mưa Cute */
            --wood-light: #E6CCB2;
            --wood-main: #D4A373;
            --wood-dark: #A98467;
            --wood-shadow: #8A5A44;
            
            --leaf-light: #D9ED92;
            --leaf-main: #99D98C;
            --leaf-dark: #34A0A4;
            
            --bg-cream: #FEFAE0;
            --text-brown: #5E503F;
            
            --accent-peach: #F4A261;
            --accent-coral: #E76F51;
            --accent-blue: #90E0EF;
        }

        /* TRIỆT TIÊU THANH CUỘN ĐỂ TỰ ĐỘNG GIÃN */
        html, body {
            margin: 0;
            padding: 0;
            height: auto;
            min-height: 100%;
            overflow: hidden; /* Quan trọng nhất: Không để iframe có thanh cuộn riêng */
        }

        body {
            font-family: 'Nunito', sans-serif;
            /* Hình nền Rừng Cây Tươi Sáng */
            background: #B5E2FA url('https://images.unsplash.com/photo-1596138663737-2936a28d6268?q=80&w=2070&auto=format&fit=crop') fixed center/cover;
            color: var(--text-brown);
        }
        
        /* Lớp mờ để làm nổi bật bảng gỗ */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(254, 250, 224, 0.6);
            backdrop-filter: blur(4px);
            z-index: -1;
        }

        .admin-layout {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box; 
        }

        /* HUD HEADER -> BẢNG GỖ TREO BẢN ĐỒ */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: var(--wood-light);
            border: 4px dashed var(--wood-dark);
            border-radius: 25px;
            margin-bottom: 40px;
            box-shadow: 0 10px 0 var(--wood-shadow), 0 15px 20px rgba(0,0,0,0.15);
            position: relative;
        }

        /* Đinh ghim treo bảng */
        .hud-header::before, .hud-header::after {
            content: "📍";
            position: absolute;
            top: -15px;
            font-size: 30px;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.2));
        }
        .hud-header::before { left: 20px; }
        .hud-header::after { right: 20px; }

        .system-status {
            font-family: 'Fredoka', sans-serif;
            font-size: 14px;
            color: var(--leaf-dark);
            font-weight: 600;
            margin-top: 5px;
        }

        /* GRID DANH SÁCH BẢN VẼ */
        .contribution-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            padding-bottom: 50px; 
        }

        /* TỪNG BẢN VẼ (CARD) -> NHƯ TỜ GIẤY NOTE KẸP TRÊN BẢNG GỖ */
        .draft-card {
            background: #fff;
            border: 4px solid var(--wood-main);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 8px 0 var(--wood-shadow);
            position: relative;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .draft-card::before {
            content: "📌";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            z-index: 2;
        }

        .draft-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 13px 0 var(--wood-shadow);
            border-color: var(--accent-peach);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px dashed var(--wood-light);
            padding-bottom: 12px;
            margin-top: 10px; /* Nhường chỗ cho ghim */
        }

        .user-info { 
            font-family: 'Fredoka'; 
            font-size: 16px; 
            font-weight: 700;
            color: var(--accent-coral); 
        }
        
        .type-tag { 
            font-size: 12px; 
            font-weight: 800;
            padding: 4px 10px; 
            background: var(--leaf-light); 
            border: 2px solid var(--leaf-main);
            border-radius: 10px;
            color: var(--leaf-dark); 
        }

        .idea-box {
            font-size: 15px;
            color: var(--text-brown);
            line-height: 1.6;
            background: var(--bg-cream);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #f1e5c3;
        }

        /* NÚT ĐIỀU KHIỂN -> PHONG CÁCH GAME */
        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            padding: 12px 10px;
            font-family: 'Fredoka';
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            color: #fff;
            transition: 0.15s;
            text-transform: uppercase;
        }
        
        .btn:active {
            transform: translateY(4px);
        }

        .btn-sim { background: var(--accent-blue); box-shadow: 0 5px 0 #00B4D8; color: #03045E;}
        .btn-sim:active { box-shadow: 0 0px 0 #00B4D8; }
        
        .btn-copy { background: var(--accent-peach); box-shadow: 0 5px 0 #E76F51; }
        .btn-copy:active { box-shadow: 0 0px 0 #E76F51; }

        .btn-approve { background: var(--leaf-main); box-shadow: 0 5px 0 var(--leaf-dark); }
        .btn-approve:active { box-shadow: 0 0px 0 var(--leaf-dark); }

        .btn-delete { background: var(--accent-coral); box-shadow: 0 5px 0 #D04F36; }
        .btn-delete:active { box-shadow: 0 0px 0 #D04F36; }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 80px 20px;
            font-family: 'Fredoka';
            font-size: 24px;
            font-weight: bold;
            color: var(--wood-dark);
            background: rgba(255,255,255,0.8);
            border-radius: 20px;
            border: 4px dashed var(--wood-main);
            margin: 40px auto;
            max-width: 600px;
        }

        /* MODAL SIMULATION -> KHUNG CỬA SỔ NHÌN RA RỪNG */
        #simOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(94, 80, 63, 0.9);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: none;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
        }

        .sim-window { 
            flex: 1; 
            background: #fff; 
            border: 8px solid var(--wood-main); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        #simFrame { width: 100%; height: 100%; border: none; background: #fff;}
    </style>
</head>

<body>

    <div class="admin-layout" id="mainContainer">
        <header class="hud-header">
            <div>
                <h1 style="margin:0; font-family: 'Fredoka'; font-size: 28px; color: var(--text-brown);">🪵 BẢNG KIỂM DUYỆT BẢN VẼ</h1>
                <div class="system-status" id="statusText">🌳 TRẠM KIỂM LÂM & QUẢN LÝ THI CÔNG NHÀ CÂY</div>
            </div>
            <div style="text-align: right;">
                <div id="countInfo" style="color: var(--accent-coral); font-family: 'Fredoka'; font-size: 18px; font-weight: 700;">CHỜ DUYỆT: 0</div>
                <div id="liveClock" style="font-family: 'Nunito'; font-weight: 800; font-size: 14px; color: var(--wood-dark);">00:00:00</div>
            </div>
        </header>

        <div id="loading" class="loading">🐒 CÁC BÉ KHỈ ĐANG TÌM KIẾM BẢN VẼ... CHỜ CHÚT NHÉ!</div>
        <div id="contributionList" class="contribution-grid"></div>
    </div>

    <!-- Màn hình mô phỏng -->
    <div id="simOverlay">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; background: var(--bg-cream); padding: 10px 20px; border-radius: 15px; border: 3px solid var(--wood-light);">
            <div style="font-family: 'Fredoka'; color: var(--leaf-dark); font-size: 18px; font-weight: 700;">🌺 KHU ĐẤT THỬ NGHIỆM XÂY DỰNG (SANDBOX)</div>
            <button class="btn btn-delete" onclick="closeSim()" style="padding: 10px 25px; font-size: 14px;">ĐÓNG LẠI [ESC]</button>
        </div>
        <div class="sim-window">
            <iframe id="simFrame"></iframe>
        </div>
    </div>

    <!-- TÍCH HỢP FILE IFRAME CỦA BẠN -->
    <script src="../main_js/iframe.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem",
            storageBucket: "banhkietgithunbpoem.firebasestorage.app",
            messagingSenderId: "429631951698",
            appId: "1:429631951698:web:8c5f6854de3ad22113a08b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- HÀM TỰ ĐỘNG CẬP NHẬT CHIỀU CAO ---
        function refreshIframe() {
            // Lấy chiều cao thực tế của thẻ bao ngoài cùng
            const height = document.getElementById('mainContainer').offsetHeight + 100; // Cộng thêm 100px dự phòng cho bóng đổ/grid
            
            // Ưu tiên gọi hàm từ iframe.js của bạn
            if (typeof sendHeight === "function") {
                sendHeight(); 
            } else {
                // Nếu không thấy hàm đó, gửi tin nhắn trực tiếp lên cha
                window.parent.postMessage({
                    type: 'setHeight',
                    height: height
                }, "*");
            }
        }

        // Theo dõi sự thay đổi của danh sách card để kéo dài iframe ngay lập tức
        const observer = new MutationObserver(() => {
            setTimeout(refreshIframe, 100);
        });
        observer.observe(document.getElementById('contributionList'), { childList: true, subtree: true });

        // --- ĐỒNG HỒ ---
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // --- LOAD DỮ LIỆU ---
        const listContainer = document.getElementById('contributionList');
        const loadingOverlay = document.getElementById('loading');

        onSnapshot(collection(db, "contributions"), (snapshot) => {
            loadingOverlay.style.display = 'none';
            listContainer.innerHTML = '';
            document.getElementById('countInfo').innerText = `CHỜ DUYỆT: ${snapshot.size}`;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = createCard(doc.id, data);
                listContainer.appendChild(card);
            });

            // Sau khi tải xong dữ liệu và vẽ xong Card, cập nhật chiều cao
            setTimeout(refreshIframe, 300);
        });

        function createCard(id, data) {
            const div = document.createElement('div');
            div.className = 'draft-card';
            // Dùng Base64 hoặc mã hóa URL để truyền code an toàn qua onclick
            const safeCode = btoa(unescape(encodeURIComponent(data.code)));
            
            // Nội dung được bọc lại class đúng chuẩn CSS mới tạo ở trên (Giữ nguyên cấu trúc logic)
            div.innerHTML = `
                <div class="card-header">
                    <div class="user-info">👷 ${data.username}</div>
                    <div class="type-tag">🌿 ${data.type || 'BẢN VẼ MỚI'}</div>
                </div>
                <div class="idea-box">
                    <strong>💡 Ghi chú của thợ:</strong><br> ${data.idea || 'Không có mô tả chi tiết'}
                    <div style="font-size:12px; margin-top:12px; color: var(--wood-dark); font-weight: 800;">🕒 Thời gian gửi: ${data.time}</div>
                </div>
                <div class="action-group">
                    <button class="btn btn-sim" onclick="simulateCode('${safeCode}')">👁️ XEM THỬ</button>
                    <button class="btn btn-copy" onclick="copyCode('${safeCode}')">📋 CHÉP MÃ</button>
                    <button class="btn btn-approve" onclick="approveContribution('${id}')">✅ DUYỆT XÂY</button>
                    <button class="btn btn-delete" onclick="deleteContribution('${id}')">🗑️ BỎ ĐI</button>
                </div>
            `;
            return div;
        }

        // --- LOGIC XỬ LÝ NÚT (GIỮ NGUYÊN 100%) ---
        window.simulateCode = (base64Code) => {
            const code = decodeURIComponent(escape(atob(base64Code)));
            document.getElementById('simOverlay').style.display = 'flex';
            document.getElementById('simFrame').srcdoc = code;
        };

        window.closeSim = () => {
            document.getElementById('simOverlay').style.display = 'none';
            document.getElementById('simFrame').srcdoc = '';
        };

        window.copyCode = (base64Code) => {
            const code = decodeURIComponent(escape(atob(base64Code)));
            navigator.clipboard.writeText(code).then(() => alert("🚀 Đã sao chép mã bản vẽ thành công!"));
        };

        window.deleteContribution = async (id) => {
            if (confirm("Xác nhận vứt bỏ bản vẽ này vào thùng rác?")) {
                await deleteDoc(doc(db, "contributions", id));
            }
        };

        window.approveContribution = (id) => {
            alert("Bản vẽ đã được đánh dấu lưu trữ và chuyển cho đội thi công!");
        };

        // Gửi chiều cao khi load trang
        window.addEventListener('load', refreshIframe);
        window.addEventListener('resize', refreshIframe);

    </script>
</body>
</html>
