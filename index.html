<!DOCTYPE html>
<html lang="vi">
<head>

    <select id="form">
      <option value="">Thể thơ</option>
      <option value="lục bát">Lục bát</option>
      <option value="tự do">Tự do</option>
      <option value="thất ngôn">Thất ngôn</option>

  <div id="poemList"></div>

<footer>
  © 2026 – Nguyễn Bành
</footer>

<script src="main.js"></script>
