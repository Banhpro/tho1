<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đổi mật khẩu</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow: hidden;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
color:#2e7d32;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#2e7d32;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.msg{
margin-top:15px;
color:#2e7d32;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h2>Đổi mật khẩu</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="oldpass" placeholder="Mật khẩu cũ">

<input type="password" id="newpass" placeholder="Mật khẩu mới">

<input type="password" id="confirmpass" placeholder="Xác nhận mật khẩu mới">

<button onclick="changePassword()">Đổi mật khẩu</button>

<div class="msg" id="msg"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
updatePassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain:"banhkietgithunbpoem.firebaseapp.com",
projectId:"banhkietgithunbpoem",
storageBucket:"banhkietgithunbpoem.firebasestorage.app",
messagingSenderId:"429631951698",
appId:"1:429631951698:web:8c5f6854de3ad22113a08b"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);



window.changePassword = async function(){

const email=document.getElementById("email").value;
const oldpass=document.getElementById("oldpass").value;
const newpass=document.getElementById("newpass").value;
const confirmpass=document.getElementById("confirmpass").value;

if(!email || !oldpass || !newpass || !confirmpass){
alert("Vui lòng nhập đầy đủ thông tin");
return;
}

if(newpass!==confirmpass){
alert("Mật khẩu xác nhận không đúng");
return;
}

try{

const userCredential = await signInWithEmailAndPassword(auth,email,oldpass);

await updatePassword(userCredential.user,newpass);

document.getElementById("msg").innerHTML="✅ Bạn đã đổi mật khẩu thành công!";

setTimeout(()=>{
history.back();
},2000);

}
catch(e){
alert("Sai email hoặc mật khẩu cũ");
}

}

</script>
<script src="../main_js/iframe.js"></script>
<script>

function sendHeight(){

const box=document.querySelector(".box");
if(!box) return;

const height=box.offsetHeight;

window.parent.postMessage(height,"*");

}

window.addEventListener("load",()=>{
setTimeout(sendHeight,200);
});

</script>
</body>
</html>
