<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thư viện thơ của Bành</title>

<style>

body{
font-family:"Times New Roman",serif;
background:linear-gradient(135deg,#f5f2eb,#e9e3d6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:15px;
}

.slogan{
text-align:center;
font-style:italic;
opacity:0.65;
margin-bottom:20px;
line-height:1.4;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:11px;
border:none;
border-radius:6px;
background:#2e7d32;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1b5e20;
}

.link{
text-align:center;
margin-top:12px;
}

.link a{
color:#2c5fb8;
cursor:pointer;
}

#registerForm{
display:none;
}

.message{
text-align:center;
margin-top:10px;
font-size:14px;
display:none;
}

.success{color:green;}
.error{color:red;}

.role-line{
display:flex;
align-items:center;
gap:15px;
margin:10px 0 15px 0;
flex-wrap:wrap;
}

.role-item{
display:flex;
align-items:center;
gap:6px;
font-style:italic;
opacity:0.8;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="slogan">
"Thơ là tiếng lòng lặng lẽ,<br>
chỉ người tri kỷ mới nghe."
</div>

<!-- LOGIN -->

<div id="loginForm">

<h2>Đăng nhập</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

<div class="message" id="loginMsg"></div>

<div class="link">
Bạn chưa có tài khoản? 
<a onclick="showRegister()">Đăng ký ngay</a>
</div>

</div>


<!-- REGISTER -->

<div id="registerForm">

<h2>Đăng ký</h2>

<input id="fullname" placeholder="Họ và tên đầy đủ">

<div class="role-line">

<label class="role-item">
<input type="checkbox" id="teacher">
<span>Giáo viên từng dạy Bành</span>
</label>

<label class="role-item">
<input type="checkbox" id="friend">
<span>Bạn bè</span>
</label>

</div>

<input id="username" placeholder="Tên đăng nhập">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký</button>

<div class="message" id="registerMsg"></div>

<div class="link">
Bạn đã có tài khoản?
<a onclick="showLogin()">Đăng nhập</a>
</div>

</div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
