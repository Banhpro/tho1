<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang cá nhân</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f6f8ff, #eef2ff);
            margin: 0;
            padding: 40px;
            overflow: hidden;
        }

        .container {
            max-width: 900px;
            margin: auto;
            display: none;

        }

        /* profile card */

        .profile-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c8cff, #4b5cff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
        }

        .profile-info h2 {
            margin: 0;
            font-size: 28px;
            color: #2c3e50;
        }

        .profile-info p {
            margin: 6px 0;
            color: #6c7a89;
        }

        .stat {
            margin-top: 6px;
            font-weight: 600;
            color: #4b5cff;
        }

        /* poem */

        .section-title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #34495e;
        }

        .poem {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: 0.25s;
        }

        .poem:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
        }

        .loading-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .loading-dots span {
            animation: blink 1.4s infinite;
        }



        @keyframes blink {
            0% {
                opacity: 0.2
            }

            50% {
                opacity: 1
            }

            100% {
                opacity: 0.2
            }
        }

        #loading {

            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            display: flex;
            flex-direction: column;

            align-items: center;
            justify-content: center;

            text-align: center;

            /* nền xanh biển */


            color: #1c6dd0;

            z-index: 9999;

        }

        /* tiêu đề */

        .loading-title {

            font-size: 30px;
            font-weight: bold;

            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);

        }

        /* chữ phụ */

        .loading-sub {

            font-size: 15px;

            margin-top: 10px;

            color: #1c6dd0;

        }

        .poem h4 {
            margin: 0 0 8px 0;
            color: #2c3e50;
        }

        .poem p {
            margin: 0;
            color: #555;
            line-height: 1.6;
        }

        .date {
            font-size: 13px;
            color: #999;
            margin-top: 6px;
        }

        /* nút mở nhật kí */
        /* ===== NHẬT KÝ THƠ TEXT ===== */

        .diary-text {

            margin-left: auto;

            font-size: 16px;
            font-weight: 600;

            color: #2ecc71;

            cursor: pointer;

            text-shadow:
                0 0 6px rgba(46, 204, 113, 0.6);

            animation: blinkDiary 1.8s infinite;

            transition: transform 0.2s;
        }

        /* hover */

        .diary-text:hover {

            transform: scale(1.08);

            text-shadow:
                0 0 12px rgba(46, 204, 113, 0.9),
                0 0 20px rgba(46, 204, 113, 0.6);
        }

        /* nhấp nháy */

        @keyframes blinkDiary {

            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.55;
            }

            100% {
                opacity: 1;
            }

        }
    </style>
</head>

<body>
    <div id="loading" class="loading-title">
        <span class="loading-dots">
            📜 Đang tải tài liệu <span>.</span><span>.</span><span>.</span>
        </span>

        <div class="loading-sub">
            Xin chờ một chút, web lỏ, load lâu, đợi tí, thông cảm !!!
        </div>

    </div>

    <div class="container">

        <div class="profile-card">

            <div class="avatar" id="avatar">?</div>

            <div class="profile-info">

                <h2 id="name">...</h2>

                <p id="role"></p>

                <div class="stat">
                    ✒️ Đã đăng <span id="count">0</span> bài thơ
                </div>
                <div id="openDiary" class="diary-text"> 📜 Nhật ký lưu thơ</div>
            </div>
        </div>

        <h3 class="section-title"> ✒️ Những bài thơ đã đăng</h3>

        <div id="poems"></div>

    </div>

    <script src="../poems/js/poems-data.js"></script>
    <script type="module">

        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

        import {
            getFirestore,
            collection,
            query,
            where,
            getDocs,
            doc,
            getDoc
        }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        import {
            getAuth,
            onAuthStateChanged
        }
            from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);


        /* kiểm tra đăng nhập */

        onAuthStateChanged(auth, async (user) => {

            if (!user) {

                document.getElementById("name").innerText = "Chưa đăng nhập";

                document.getElementById("loading").style.display = "none";
                document.querySelector(".container").style.display = "block";

                return;

            }

            const uid = user.uid;

            /* đọc user */

            const ref = doc(db, "users", uid);

            const snap = await getDoc(ref);

            if (!snap.exists()) return;

            const data = snap.data();

            const username = data.username;
            const role = data.role || "user";


            loadPoems(username, role);
            /* hiển thị */

            document.getElementById("name").innerText = username;
            document.getElementById("avatar").innerText = username[0].toUpperCase();

            /* ngày tham gia */

            if (data.created) {

                const date = new Date(data.created)
                    .toLocaleDateString("vi-VN");

                document.getElementById("role").innerHTML =
                    "📅 Thành viên từ <b>" + date + "</b>";

            }

            /* load thơ */


        });


        /* load poems */

        async function loadPoems(username, role) {

            const poemsDiv = document.getElementById("poems");
            poemsDiv.innerHTML = "";

            /* ===== ADMIN ===== */

            if (role === "admin") {

                const list = window.poems || [];

                document.getElementById("count").innerText = list.length;

                list.forEach(p => {

                    const div = document.createElement("div");
                    div.className = "poem";
                    div.style.cursor = "pointer";

                    div.onclick = function () {
                        window.location = "../../poems/" + p.file;
                    };

                    div.innerHTML = `

<h4>${p.title}</h4>
<p> ... </p>
<p>${p.author} • ${p.type}</p>

<div class="date">
📅 ${p.date}
</div>

`;

                    poemsDiv.appendChild(div);

                });

                document.getElementById("loading").style.display = "none";
                document.querySelector(".container").style.display = "block";

                return;
            }

            /* ===== USER ===== */

            const q = query(
                collection(db, "uploads"),
                where("username", "==", username)
            );

            const snap = await getDocs(q);

            document.getElementById("count").innerText = snap.size;

            snap.forEach(doc => {

                const data = doc.data();

                const div = document.createElement("div");

                div.className = "poem";
                div.style.cursor = "pointer";

                div.onclick = function () {
                    window.location = "poem.html?id=" + doc.id;
                };

                div.innerHTML = `

<h4>${data.title}</h4>

<p>${data.content.substring(0, 180)}...</p>

<div class="date">
📅 ${new Date(data.created).toLocaleDateString("vi-VN")}
</div>

`;

                poemsDiv.appendChild(div);

            });

            document.getElementById("loading").style.display = "none";
            document.querySelector(".container").style.display = "block";
        }
        document.getElementById("openDiary").onclick = function () {

            window.location = "../smart_mode/diary.html";

        };
    </script>
    <script src="../main_js/iframe.js"></script>

</body>

</html>
