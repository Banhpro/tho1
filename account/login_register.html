<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập / Đăng ký Thơ</title>

    <style>
        body {
            font-family: "Times New Roman", serif;
            background: linear-gradient(135deg, #f5f2eb, #e9e3d6);

            display: flex;
            justify-content: center;
            /* căn giữa ngang */
            align-items: center;
            /* căn giữa dọc */

            margin: 0;
            padding: 40px 0;
            /* tránh dính mép */
        }

        .container {
            background: white;
            padding: 35px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            margin-top: 60px;
            /* đẩy xuống */

        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .slogan {
            text-align: center;
            font-style: italic;
            opacity: 0.65;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 6px;
            background: #2e7d32;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1b5e20;
        }

        .link {
            text-align: center;
            margin-top: 12px;
        }

        .link a {
            color: #2c5fb8;
            cursor: pointer;
        }

        #registerForm {
            display: none;
        }

        .message {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .role-line {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0 15px 0;
            flex-wrap: wrap;
        }

        .role-title {
            font-style: italic;
            opacity: 0.8;
        }

        .role-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-style: italic;
            opacity: 0.8;
            font-size: 14px;
        }

        .role-item input {
            width: auto;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid #ddd;
            border-top: 3px solid #2e7d32;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .question-block {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #f7f7f7;
        }

        .question-block label {
            display: block;
            margin-top: 8px;
            font-size: 14px;
        }

        .question-block textarea,
        .question-block select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .errorField {
            border: 2px solid red !important;
            background: #ffecec;
        }
    </style>

</head>


<body>

    <div class="container">

        <div class="slogan">
            "Thơ là tiếng lòng lặng lẽ,<br>
            chỉ người tri kỷ mới nghe."
        </div>

        <!-- LOGIN -->

        <div id="loginForm">

            <h2>Đăng nhập</h2>

            <input id="loginEmail" placeholder="Email">

            <input id="loginPassword" type="password" placeholder="Mật khẩu">

            <button onclick="login()">Đăng nhập</button>

            <div class="loading" id="loginLoading">
                <div class="spinner"></div>
            </div>

            <div class="message" id="loginMsg"></div>

            <div class="link">
                Bạn chưa có tài khoản?
                <a onclick="showRegister()">Đăng ký ngay</a>
            </div>

        </div>


        <!-- REGISTER -->

        <div id="registerForm">

            <h2>Đăng ký</h2>

            <input id="fullname" placeholder="Họ và tên đầy đủ">

            <div class="role-line">

                <div class="role-title">Bạn là?</div>

                <label class="role-item">
                    <input type="radio" name="role" value="teacher" id="teacher">
                    <span>Giáo viên</span>
                </label>

                <label class="role-item">
                    <input type="radio" name="role" value="friend" id="friend">
                    <span>Bạn bè</span>
                </label>

                <label class="role-item">
                    <input type="radio" name="role" value="unknown" id="unknown">
                    <span>Người dưng</span>
                </label>

            </div>
            <div id="roleQuestions"></div>

            <input id="username" placeholder="Tên đăng nhập">

            <input id="email" placeholder="Email - không nhập email chính">

            <input id="password" type="password" placeholder="Mật khẩu - không nhập mật khẩu của email chính">

            <button onclick="register()">Đăng ký</button>

            <div class="loading" id="registerLoading">
                <div class="spinner"></div>
            </div>

            <div class="message" id="registerMsg"></div>

            <div class="link">
                Bạn đã có tài khoản?
                <a onclick="showLogin()">Đăng nhập</a>
            </div>

        </div>

    </div>


    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import {
            getFirestore,
            setDoc,
            doc,
            getDocs,
            collection,
            query,
            where
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
            authDomain: "banhkietgithunbpoem.firebaseapp.com",
            projectId: "banhkietgithunbpoem",
            storageBucket: "banhkietgithunbpoem.appspot.com",
            messagingSenderId: "429631951698",
            appId: "1:429631951698:web:8c5f6854de3ad22113a08b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);


        /* ROLE SELECT */

        const teacher = document.getElementById("teacher");
        const friend = document.getElementById("friend");

        console.log("Role system ready");
        friend.addEventListener("change", () => { if (friend.checked) { teacher.checked = false; } });


        /* SWITCH FORM */

        window.showRegister = () => {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
            sendHeight();
        }

        window.showLogin = () => {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("registerForm").style.display = "none";
            sendHeight();
        }

        async function usernameExists(username) {

            const q = query(
                collection(db, "users"),
                where("username", "==", username)
            );

            const snap = await getDocs(q);

            return !snap.empty;

        }

        /* REGISTER */

        window.register = async function () {
            if (!validateQuestions()) {
                alert("Bạn cần trả lời hết câu hỏi")
                return
            }
            const fullname = document.getElementById("fullname").value.trim();
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            const role = document.querySelector('input[name="role"]:checked')?.value || "";
            console.log("ROLE:", role);

            const msg = document.getElementById("registerMsg");
            const loading = document.getElementById("registerLoading");
 if (!role) {

                    alert("Bạn phải chọn 'Bạn là ai' trước khi đăng ký");

                    document.querySelector(".role-line").style.border = "2px solid red";
                    document.querySelector(".role-line").style.padding = "8px";

                    loading.style.display = "none";

                    return;

                }
            loading.style.display = "block";
            msg.style.display = "none";

            try {

                /* kiểm tra username */

                const exist = await usernameExists(username);

                if (exist) {

                    loading.style.display = "none";

                    msg.className = "message error";
                    msg.innerText = "Có đứa nào đó đặt tên này rồi, chọn tên khác i";
                    msg.style.display = "block";
                    clearRegisterForm();
                    return;

                }

                /* tạo tài khoản */

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);

                await setDoc(doc(db, "users", userCredential.user.uid), {
                    fullname,

                    username,
                    email,
                    role,
                    admin: false,
                    created: Date.now()
                });
                if (role === "teacher") {

                    console.log("Saving teacher answers")

                    await setDoc(doc(db, "signup", "teacher_" + userCredential.user.uid), {

                        tired: t1.value,
                        subject: t2.value,
                        school: t3.value,
                        sad: t4.value,
                        think: t5.value,
                        memory: t6.value,
                        score: t7.value

                    })

                }
                if (role === "friend") {

                    console.log("Saving friend answers")

                    await setDoc(doc(db, "signup", "friend_" + userCredential.user.uid), {

                        gender: f1.value,
                        level: f2.value,
                        call: f3.value,
                        punch: f4.value,
                        hate: f5.value,
                        reason: f6.value,
                        sentence: f7.value,
                        time: f8.value

                    })

                }
                if (role === "unknown") {

                    console.log("Saving unknown answers")

                    await setDoc(doc(db, "signup", "unknown_" + userCredential.user.uid), {

                        know: u1.value,
                        like: u2.value,
                        share: u3.value,
                        friend: u4.value

                    })

                }

               
                loading.style.display = "none";

                msg.className = "message success";
                msg.innerText = "Đăng ký thành công";
                clearRegisterForm();
                msg.style.display = "block";

                setTimeout(showLogin, 1500);

            } catch (err) {

                loading.style.display = "none";

                msg.className = "message error";
                msg.innerText = translateError(err.code);

                msg.style.display = "block";

            }

            console.log("REGISTER START")

            console.log("fullname:", fullname)
            console.log("username:", username)
            console.log("email:", email)
            console.log("role:", role)
        }


        /* LOGIN */

        window.login = async function () {

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            const msg = document.getElementById("loginMsg");
            const loading = document.getElementById("loginLoading");

            loading.style.display = "block";

            try {

                await signInWithEmailAndPassword(auth, email, password);

                loading.style.display = "none";

                msg.className = "message success";
                msg.innerText = "Đăng nhập thành công";
                msg.style.display = "block";

                setTimeout(() => {
                    window.top.location.href = "../index.html";
                }, 800);

            } catch (err) {

                loading.style.display = "none";

                msg.className = "message error";
                msg.innerText = translateError(err.code);
                msg.style.display = "block";

            }

        }

    </script>


    <!-- IFRAME AUTO RESIZE -->

    <script>
        /*
                function sendHeight() {
        
                    const container = document.querySelector(".container");
        
                    if (!container) return;
        
                    const height = container.offsetHeight;
        
                    window.parent.postMessage(height, "*");
        
                }
        
                window.addEventListener("load", () => {

        function translateError(code) {

            switch (code) {

                case "auth/email-already-in-use":
                    return "Email này đã được đăng ký rồi";

                case "auth/invalid-email":
                    return "Email không đúng định dạng";

                case "auth/weak-password":
                    return "Mật khẩu phải có ít nhất 6 ký tự";

                case "auth/user-not-found":
                    return "Không tìm thấy tài khoản";

                case "auth/wrong-password":
                    return "Sai mật khẩu";

                case "auth/invalid-credential":
                    return "Sai email hoặc mật khẩu";

                case "auth/too-many-requests":
                    return "Bạn thử sai quá nhiều lần, hãy thử lại sau";

                default:
                    return "Có lỗi xảy ra: " + code;

            }

        }
        const roleQuestions = document.getElementById("roleQuestions");

        document.querySelectorAll('input[name="role"]').forEach(r => {
            r.addEventListener("change", showQuestions);
        });

        function showQuestions() {

            const role = document.querySelector('input[name="role"]:checked').value;

            if (role === "teacher") {
                roleQuestions.innerHTML = `

<div class="question-block">

<label>1. Ngày hôm nay cô/thầy có mệt không?</label>
<textarea id="t1"></textarea>

<label>2. Cô/thầy dạy môn</label>
<textarea id="t2"></textarea>

<label>3. Trường đã dạy Bành</label>
<textarea id="t3"></textarea>

<label>4. Bành đã từng làm cô/thầy buồn chưa</label>
<textarea id="t4"></textarea>

<label>5. Cô/thầy nghĩ gì về Bành</label>
<textarea id="t5"></textarea>

<label>6. Kỉ niệm về Bành</label>
<textarea id="t6"></textarea>

<label>7. Điểm bài kiểm tra đầu tiên của Bành</label>
<textarea id="t7"></textarea>

</div>
`;
            }

            if (role === "friend") {
                roleQuestions.innerHTML = `

<div class="question-block">

<label>1. Bạn là nam hay nữ</label>

<select id="f1">
<option value="">--chọn--</option>
<option>Nam</option>
<option>Nữ</option>
</select>

<label>2. Bạn biết Bành năm cấp mấy</label>

<select id="f2">
<option value="">--chọn--</option>
<option>Cấp 1</option>
<option>Cấp 2</option>
<option>Cấp 3</option>
<option>Đại học</option>
<option>Đi làm</option>
</select>

<label>3. Bành hay gọi bạn là gì</label>
<textarea id="f3"></textarea>

<label>4. Bành có đấm bạn lần nào chưa</label>
<textarea id="f4"></textarea>

<label>5. Bạn ghét Bành ở điểm nào</label>
<textarea id="f5"></textarea>

<label>6. Lí do vẫn còn là bạn</label>
<textarea id="f6"></textarea>

<label>7. Bành hay nói câu gì nhất</label>
<textarea id="f7"></textarea>

<label>8. Bạn đồng ý kết bạn lúc mấy giờ</label>
<textarea id="f8"></textarea>

</div>
`;
            }

            if (role === "unknown") {
                roleQuestions.innerHTML = `

<div class="question-block">

<label>1. Bạn biết Bành do</label>
<select id="u1">
<option value="">--chọn--</option>
<option>Do Bành đẹp trai</option>
<option>Do không đẹp bằng Bành</option>
<option>Cả hai ý trên</option>
</select>

<label>2. Bạn thích thơ không</label>
<select id="u2">
<option value="">--chọn--</option>
<option>Có</option>
<option>Không</option>
<option>50-50</option>
</select>

<label>3. Bạn có sẵn sàng chia sẻ thơ</label>
<select id="u3">
<option value="">--chọn--</option>
<option>Có</option>
<option>Không</option>
<option>50-50</option>
</select>

<label>4. Bạn có thể làm bạn với Bành</label>
<select id="u4">
<option value="">--chọn--</option>
<option>Có</option>
<option>Không</option>
<option>50-50</option>
</select>

</div>
`;
            }

        }
        function validateQuestions(role) {

            let valid = true

            document.querySelectorAll("#roleQuestions textarea,#roleQuestions select")
                .forEach(el => {

                    if (!el.value) {

                        el.classList.add("errorField")
                        valid = false

                    } else {

                        el.classList.remove("errorField")

                    }

                })

            return valid

        }
        function clearRegisterForm() {

            console.log("Clearing register form");

            document.getElementById("fullname").value = "";
            document.getElementById("username").value = "";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";

            /* bỏ chọn role */

            document.querySelectorAll('input[name="role"]').forEach(r => {
                r.checked = false
            })

            /* xóa câu hỏi */

            document.getElementById("roleQuestions").innerHTML = "";

        }
        document.querySelectorAll('input[name="role"]').forEach(r => {

            r.addEventListener("change", () => {

                document.querySelector(".role-line").style.border = "none"

            })

        })
    </script>
    <script src="../main_js/iframe.js"></script>
</body>

</html>
