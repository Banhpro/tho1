<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý thành viên</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

h2{
margin-bottom:20px;
}

table{
width:900px;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#2e7d32;
color:white;
}

button{
padding:6px 10px;
border:none;
background:#2e7d32;
color:white;
cursor:pointer;
border-radius:4px;
}

button:hover{
opacity:0.9;
}

.delete{
background:#d32f2f;
}

.reset{
background:#1976d2;
}

.disabled{
opacity:0.35;
pointer-events:none;
}

.adminOnly{
color:#999;
font-style:italic;
}

</style>
</head>

<body>

<h2>Quản lý thành viên</h2>

<table>

<thead>
<tr>
<th>Họ tên</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Đổi mật khẩu</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
updatePassword,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain:"banhkietgithunbpoem.firebaseapp.com",
projectId:"banhkietgithunbpoem",
storageBucket:"banhkietgithunbpoem.firebasestorage.app",
messagingSenderId:"429631951698",
appId:"1:429631951698:web:8c5f6854de3ad22113a08b"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let currentUID=null;
let currentRole="user";



async function loadUsers(){

const snapshot = await getDocs(collection(db,"users"));

const table=document.getElementById("userTable");

table.innerHTML="";

snapshot.forEach((docSnap)=>{

const data=docSnap.data();
const uid=docSnap.id;

let rowClass="";

if(currentRole!=="admin" && uid!==currentUID){
rowClass="disabled";
}

let emailDisplay="";

if(currentRole==="admin"){
emailDisplay=data.email || "";
}else{
emailDisplay='<span class="adminOnly">🔒 Admin only</span>';
}

const tr=document.createElement("tr");

tr.className=rowClass;

tr.innerHTML=`

<td>${data.fullname || ""}</td>

<td>${data.username || ""}</td>

<td>${emailDisplay}</td>

<td>${data.role || "user"}</td>

<td>
<button onclick="changePassword('${uid}','${data.email}')">
Đổi
</button>
</td>

<td>

${currentRole==="admin" ? `
<button class="delete"
onclick="deleteUser('${uid}')">
Xóa
</button>
` : ""}

</td>

`;

table.appendChild(tr);

});

}



window.changePassword = async function(uid,email){

if(currentRole==="admin"){

await sendPasswordResetEmail(auth,email);

alert("Đã gửi email đổi mật khẩu");

return;

}

if(uid!==currentUID){
alert("Bạn chỉ có thể đổi mật khẩu của mình");
return;
}

const newPass=prompt("Nhập mật khẩu mới");

if(!newPass) return;

await updatePassword(auth.currentUser,newPass);

alert("Đổi mật khẩu thành công");

}



window.deleteUser = async function(uid){

if(currentRole!=="admin"){
alert("Bạn không có quyền");
return;
}

if(!confirm("Xóa user này?")) return;

await deleteDoc(doc(db,"users",uid));

alert("Đã xóa user");

loadUsers();

}



onAuthStateChanged(auth, async (user)=>{

if(!user){

alert("Bạn chưa đăng nhập");

location.href="index.html";

return;

}

currentUID=user.uid;

const snapshot=await getDocs(collection(db,"users"));

snapshot.forEach((docSnap)=>{

if(docSnap.id===currentUID){

const data=docSnap.data();

currentRole=data.role || "user";

}

});

loadUsers();

});

</script>

</body>
</html>
