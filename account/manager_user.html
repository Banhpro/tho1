<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý thành viên</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

h2{
margin-bottom:20px;
color:#2e7d32;
}

table{
width:900px;
border-collapse:collapse;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#2e7d32;
color:white;
}

.me{
background:#e8f5e9;
font-weight:bold;
}

.disabled{
opacity:0.5;
}

.username{
color:#2e7d32;
font-weight:bold;
text-decoration:none;
}

.username:hover{
text-decoration:underline;
}

button{
padding:6px 12px;
border:none;
background:#2e7d32;
color:white;
cursor:pointer;
border-radius:4px;
}

button:hover{
opacity:0.9;
}

.delete{
background:#d32f2f;
}

.role{
padding:4px 8px;
border-radius:5px;
font-size:12px;
font-weight:bold;
background:#e3f2fd;
color:#1565c0;
}

</style>
</head>

<body>

<h2>Quản lý thành viên</h2>

<table>

<thead>
<tr>

<th>Họ tên</th>
<th>Username</th>
<th>Role</th>
<th>Số tác phẩm</th>
<th>Action</th>

</tr>
</thead>

<tbody id="userTable"></tbody>

</table>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {
apiKey:"AIzaSyD5VotnEcZ6hQduMoF5AjL0024x1VTkEu4",
authDomain:"banhkietgithunbpoem.firebaseapp.com",
projectId:"banhkietgithunbpoem",
storageBucket:"banhkietgithunbpoem.firebasestorage.app",
messagingSenderId:"429631951698",
appId:"1:429631951698:web:8c5f6854de3ad22113a08b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUID=null;
let currentRole="user";


async function loadUsers(){

const snapshot = await getDocs(collection(db,"users"));

const table=document.getElementById("userTable");
table.innerHTML="";

let users=[];

snapshot.forEach(docSnap=>{
users.push({
uid:docSnap.id,
...docSnap.data()
});
});


/* đưa user hiện tại lên đầu */

users.sort((a,b)=>{
if(a.uid===currentUID) return -1;
if(b.uid===currentUID) return 1;
return 0;
});


users.forEach(user=>{

let rowClass="";
let actionHTML="";

let roleText=user.role || "user";

const roleHTML=`<span class="role">${roleText}</span>`;


/* user hiện tại */

if(user.uid===currentUID){

rowClass="me";

actionHTML=`
<button onclick="changePassword()">
Đổi mật khẩu
</button>
`;

}

/* user khác */

else{

if(currentRole!=="admin"){
rowClass="disabled";
}

if(currentRole==="admin"){

actionHTML=`
<button class="delete"
onclick="deleteUser('${user.uid}')">
Xóa
</button>
`;

}

}


const tr=document.createElement("tr");

tr.className=rowClass;

tr.innerHTML=`

<td>${user.fullname || ""}</td>

<td>
<a href="profile.html?username=${user.username}">
${user.username}
</a>
</td>

<td>${roleHTML}</td>

<td>--</td>

<td>${actionHTML}</td>

`;

table.appendChild(tr);

});

}


/* đổi mật khẩu */

window.changePassword=function(){
location.href="change-password.html";
}



/* XÓA USER */

window.deleteUser = async function(uid){

if(currentRole!=="admin"){
alert("❌ Bạn không có quyền xóa user");
return;
}

if(!confirm("Bạn chắc chắn muốn xóa user này?")) return;

try{

console.log("Đang xóa user:",uid);

await deleteDoc(doc(db,"users",uid));

alert("✅ Đã xóa user thành công!");

loadUsers();

}catch(error){

console.error("Lỗi xóa:",error);

alert("❌ Không thể xóa user\n\n"+error.message);

}

}



/* kiểm tra đăng nhập */

onAuthStateChanged(auth, async (user)=>{

if(!user){

alert("Bạn chưa đăng nhập");
location.href="index.html";
return;

}

currentUID=user.uid;


/* đọc role */

const userRef=doc(db,"users",currentUID);
const userSnap=await getDoc(userRef);

if(userSnap.exists()){
currentRole=userSnap.data().role || "user";
}

loadUsers();

});

</script>
<script src="../main_js/iframe.js"></script>

</body>
</html>
